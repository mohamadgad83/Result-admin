<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>نتيجة الطالب - مدرسة دشنا الثانوية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2b4f 0%, #1e3c72 50%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: auto; }
        
        .result-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }
        
        .card-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        .school-name { font-size: 22px; font-weight: bold; }
        .student-name { font-size: 26px; margin: 10px 0; font-weight: bold; }
        .student-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .student-info span {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .status-materials {
            background: #f0f7ff;
            padding: 15px 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid #eef2fa;
        }
        .status-box, .materials-box {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 12px 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .status-box .label, .materials-box .label {
            font-size: 12px;
            color: #666;
            display: block;
            margin-bottom: 5px;
        }
        .status-icon { font-size: 28px; display: block; margin-bottom: 5px; }
        .status-value { font-size: 18px; font-weight: bold; }
        .status-pass { color: #28a745; }
        .status-fail { color: #dc3545; }
        
        .total-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #eef2fa;
            flex-wrap: wrap;
        }
        .total-card {
            text-align: center;
            background: #f8f9fa;
            padding: 12px 25px;
            border-radius: 25px;
        }
        .total-number {
            font-size: 26px;
            font-weight: bold;
            color: #1e3c72;
        }
        .total-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .subjects-section { padding: 20px; }
        .subjects-title {
            font-size: 18px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #1e3c72;
        }
        .subjects-list { display: flex; flex-direction: column; gap: 10px; }
        .subject-card {
            background: #f8f9fa;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-right: 3px solid #1e3c72;
        }
        .subject-name { font-weight: bold; font-size: 16px; color: #1e3c72; }
        .subject-score { font-size: 18px; font-weight: bold; color: #1e3c72; }
        
        .signature-section {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #eef2fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .signature-box { text-align: center; }
        .signature-line {
            width: 120px;
            border-top: 1px solid #999;
            margin-top: 25px;
            margin-bottom: 5px;
        }
        .signature-name { font-size: 11px; color: #666; }
        
        .card-footer {
            background: #f8f9fa;
            padding: 10px 20px;
            text-align: center;
            font-size: 11px;
            color: #666;
            border-top: 1px solid #eef2fa;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #1e3c72; color: white; }
        .btn-primary:hover { background: #0f2b4f; }
        .btn-success { background: #28a745; color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
        
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            .card-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
        
        @media (max-width: 550px) {
            .total-row { gap: 15px; }
            .total-number { font-size: 20px; }
            .subject-card { flex-direction: column; text-align: center; gap: 5px; }
            .signature-section { flex-direction: column; text-align: center; }
            .signature-line { width: 100px; }
            .student-name { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="resultContainer"></div>
    <div class="action-buttons no-print">
        <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة</button>
        <button class="btn btn-success" id="downloadPdfBtn">📄 PDF</button>
        <button class="btn btn-whatsapp" id="shareWhatsappBtn">📱 واتساب</button>
        <button class="btn btn-primary" onclick="history.back()">🔙 رجوع</button>
    </div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  const studentId = sessionStorage.getItem('viewStudentId');
  if (!studentId) window.location.href = 'student-search.html';
  
  let currentStudentData = null;
  
  function formatNumber(value) {
      if (value === undefined || value === null) return '—';
      if (typeof value === 'number') return value.toFixed(1);
      return value;
  }
  
  function getMaxTotal(gradeName) {
      if (gradeName.includes('الأول') || gradeName.includes('أولى')) return 600;
      return 380;
  }
  
  async function loadResult() {
      let { data: student } = await supabase.from('student_results').select('*, schools(name)').eq('id', studentId).single();
      if (!student) {
          document.getElementById('resultContainer').innerHTML = '<div class="result-card"><div class="card-header">خطأ</div><div class="subjects-section"><p style="color:red; text-align:center">لا توجد بيانات</p></div></div>';
          return;
      }
      
      currentStudentData = student;
      let school = student.schools;
      let scores = student.scores || {};
      let gradeId = student.grade_id;
      let { data: grade } = await supabase.from('grades').select('name, subjects').eq('id', gradeId).single();
      let gradeName = grade?.name || '';
      let subjectsList = grade?.subjects?.sort((a,b)=>a.order-b.order) || [];
      
      let totalScore = 0;
      let maxTotal = getMaxTotal(gradeName);
      
      for (let sub of subjectsList) {
          let score = scores[sub.name];
          if (typeof score === 'number') totalScore += score;
      }
      
      let percentage = maxTotal > 0 ? ((totalScore / maxTotal) * 100).toFixed(1) : 0;
      let status = student.status || '—';
      let materials = student.materials || '—';
      let isPass = status === 'ناجح' || status === 'نجاح' || (percentage >= 50);
      
      let subjectsHtml = '';
      for (let sub of subjectsList) {
          let scoreValue = scores[sub.name];
          let displayScore = formatNumber(scoreValue);
          subjectsHtml += `
              <div class="subject-card">
                  <span class="subject-name">📖 ${sub.name}</span>
                  <span class="subject-score">${displayScore}</span>
              </div>
          `;
      }
      
      if (subjectsHtml === '') {
          subjectsHtml = '<div style="text-align:center; padding:30px; color:#dc3545;">⚠️ لا توجد نتائج مسجلة</div>';
      }
      
      let html = `
          <div class="result-card" id="resultCard">
              <div class="card-header">
                  <div class="school-name">🏫 ${school?.name || 'مدرسة دشنا الثانوية'}</div>
                  <div class="student-name">👨‍🎓 ${student.student_name}</div>
                  <div class="student-info">
                      <span>📌 رقم الجلوس: ${student.seat_number || '-'}</span>
                      <span>🔑 الكود: ${student.code || '-'}</span>
                      <span>🆔 الرقم القومي: ${student.national_id || '-'}</span>
                      <span>📚 الصف: ${gradeName || '-'}</span>
                      <span>📅 السنة: ${student.academic_year || '2024/2025'}</span>
                  </div>
              </div>
              
              <div class="status-materials">
                  <div class="status-box">
                      <span class="status-icon">${isPass ? '✅' : '⚠️'}</span>
                      <span class="label">الحالة</span>
                      <span class="status-value ${isPass ? 'status-pass' : 'status-fail'}">${status !== '—' ? status : (isPass ? 'ناجح' : 'راسب')}</span>
                  </div>
                  <div class="materials-box">
                      <span class="label">📚 المواد</span>
                      <span class="status-value">${materials}</span>
                  </div>
              </div>
                                        
              <div class="subjects-section">
                  <div class="subjects-title">📊 المواد الدراسية</div>
                  <div class="subjects-list">${subjectsHtml}</div>
              </div>
              
              <div class="signature-section">
                  <div class="signature-box"><div class="signature-line"></div><div class="signature-name">رئيس الكنترول</div><div class="signature-name">أ/ محرم فؤاد</div></div>
                  <div class="signature-box"><div class="signature-line"></div><div class="signature-name">مدير المدرسة</div><div class="signature-name">أ/ عبدالرحمن فهمي</div></div>
              </div>
              
              <div class="card-footer">
                  <div>📅 ${new Date().toLocaleDateString('ar-EG')} | © نظام النتائج المدرسية</div>
              </div>
          </div>
      `;
      
      document.getElementById('resultContainer').innerHTML = html;
  }
  
  document.getElementById('downloadPdfBtn')?.addEventListener('click', async () => {
      const { jsPDF } = window.jspdf;
      const element = document.getElementById('resultCard');
      if (!element) return;
      const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#ffffff' });
      const imgData = canvas.toDataURL('image/png');
      const pdf = new jsPDF('p', 'mm', 'a4');
      const imgWidth = 190;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
      pdf.save(`نتيجة_${currentStudentData?.student_name || 'طالب'}.pdf`);
  });
  
  document.getElementById('shareWhatsappBtn')?.addEventListener('click', () => {
      let text = `نتيجة الطالب ${currentStudentData?.student_name || ''}\nرقم الجلوس: ${currentStudentData?.seat_number || '-'}\nللاطلاع على النتيجة: ${window.location.href}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  });
  
  loadResult();
</script>
</body>
</html>
