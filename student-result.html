<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>نتيجة الطالب - مدرسة دشنا الثانوية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 16px; }
        .container { max-width: 800px; margin: auto; }
        .result-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .card-header { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 24px 20px; text-align: center; }
        .school-name { font-size: 20px; font-weight: bold; }
        .student-name { font-size: 24px; margin: 8px 0; }
        .student-info { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
        .student-info span { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .card-body { padding: 20px; }
        .subjects-list { display: flex; flex-direction: column; gap: 12px; }
        .subject-card { background: #f8f9fa; border-radius: 16px; overflow: hidden; border-right: 4px solid #1e3c72; }
        .subject-header { background: #eef2fa; padding: 12px 16px; font-weight: bold; }
        .score-value { padding: 12px 16px; font-size: 18px; font-weight: bold; color: #1e3c72; }
        .card-footer { background: #f8f9fa; padding: 12px; text-align: center; font-size: 12px; color: #666; }
        .btn { padding: 12px 24px; border: none; border-radius: 30px; font-size: 14px; cursor: pointer; margin-top: 20px; width: 100%; }
        .btn-primary { background: #1e3c72; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        @media print { body { background: white; } .no-print { display: none; } .card-header { -webkit-print-color-adjust: exact; } }
    </style>
</head>
<body>
<div class="container">
    <div id="resultContainer"></div>
    <div class="no-print" style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة النتيجة</button>
        <button class="btn btn-info" id="printReportBtn" style="display:none;">📄 طباعة كشف تفصيلي</button>
        <button class="btn btn-success" onclick="history.back()">🔙 رجوع</button>
    </div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  const studentId = sessionStorage.getItem('viewStudentId');
  if (!studentId) window.location.href = 'student-search.html';
  
  async function loadResult() {
      let { data: student } = await supabase.from('student_results').select('*, schools(name)').eq('id', studentId).single();
      if (!student) {
          document.getElementById('resultContainer').innerHTML = '<div class="result-card"><div class="card-header">خطأ</div><div class="card-body">لا توجد بيانات</div></div>';
          return;
      }
      let school = student.schools;
      let scores = student.scores || {};
      let gradeId = student.grade_id;
      let { data: grade } = await supabase.from('grades').select('name, subjects').eq('id', gradeId).single();
      let subjectsList = grade?.subjects?.sort((a,b)=>a.order-b.order) || [];
      
      let subjectsHtml = '';
      for (let sub of subjectsList) {
          let score = scores[sub.name] !== undefined ? scores[sub.name] : '—';
          subjectsHtml += `
              <div class="subject-card">
                  <div class="subject-header">📖 ${sub.name}</div>
                  <div class="score-value">الدرجة: ${score}</div>
              </div>
          `;
      }
      
      let html = `
          <div class="result-card">
              <div class="card-header">
                  <div class="school-name">🏫 ${school?.name || 'مدرسة دشنا الثانوية'}</div>
                  <div class="student-name">👨‍🎓 ${student.student_name}</div>
                  <div class="student-info">
                      <span>📌 رقم الجلوس: ${student.seat_number || '-'}</span>
                      <span>🔑 الكود: ${student.code || '-'}</span>
                      <span>🆔 الرقم القومي: ${student.national_id || '-'}</span>
                      <span>📅 السنة: ${student.academic_year || '2024/2025'}</span>
                  </div>
              </div>
              <div class="card-body">
                  <div class="subjects-list">${subjectsHtml}</div>
              </div>
              <div class="card-footer">© نظام النتائج المدرسية - مدرسة دشنا الثانوية</div>
          </div>
      `;
      document.getElementById('resultContainer').innerHTML = html;
      
      // إظهار زر الطباعة التفصيلية
      let printBtn = document.getElementById('printReportBtn');
      printBtn.style.display = 'block';
      printBtn.onclick = () => printDetailedReport(student);
  }
  
  function printDetailedReport(student) {
      let printWindow = window.open('', '_blank');
      printWindow.document.write(`
          <html dir="rtl">
          <head><title>كشف درجات ${student.student_name}</title>
          <style>
              body { font-family: 'Segoe UI', sans-serif; padding: 30px; }
              .header { text-align: center; margin-bottom: 30px; }
              .school { font-size: 24px; font-weight: bold; color: #1e3c72; }
              .student { font-size: 20px; margin: 10px 0; }
              table { width: 100%; border-collapse: collapse; margin-top: 20px; }
              th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
              th { background: #1e3c72; color: white; }
              .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #666; }
          </style>
          </head>
          <body>
          <div class="header">
              <div class="school">🏫 مدرسة دشنا الثانوية</div>
              <div class="student">👨‍🎓 ${student.student_name}</div>
              <div>📌 رقم الجلوس: ${student.seat_number} | 🔑 الكود: ${student.code || '-'}</div>
              <div>🆔 الرقم القومي: ${student.national_id || '-'}</div>
              <div>📅 السنة الدراسية: ${student.academic_year || '2024/2025'}</div>
          </div>
          <table>
              <thead><tr><th>المادة</th><th>الدرجة</th></tr></thead>
              <tbody>
                  ${Object.entries(student.scores || {}).map(([subject, score]) => `<tr><td>${subject}</td><td>${score}</td></tr>`).join('')}
              </tbody>
          </table>
          <div class="footer">تم الطباعة من نظام النتائج المدرسية - مدرسة دشنا الثانوية</div>
          </body>
          </html>
      `);
      printWindow.document.close();
      printWindow.print();
  }
  
  loadResult();
</script>
</body>
</html>
