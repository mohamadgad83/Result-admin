<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة الطالب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: auto; }
        .result-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .card-header { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 25px; text-align: center; }
        .school-name { font-size: 22px; font-weight: bold; }
        .student-name { font-size: 26px; margin: 10px 0; }
        .student-info { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; font-size: 14px; opacity: 0.9; }
        .card-body { padding: 25px; }
        .results-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .results-table th { background: #1e3c72; color: white; padding: 12px; }
        .results-table td { padding: 12px; text-align: center; border-bottom: 1px solid #eef2fa; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .stat-item { background: #f0f7ff; padding: 12px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #1e3c72; }
        .grade-A { background: #d4edda; color: #155724; font-weight: bold; }
        .grade-B { background: #d1ecf1; color: #0c5460; font-weight: bold; }
        .grade-C { background: #fff3cd; color: #856404; font-weight: bold; }
        .grade-D { background: #ffe2d6; color: #cc6b2c; font-weight: bold; }
        .grade-F { background: #f8d7da; color: #721c24; font-weight: bold; }
        .total-row { background: #eef2fa; font-weight: bold; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 100%; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
<div class="container">
    <div id="resultContainer"></div>
    <div class="no-print" style="display: flex; gap: 10px; margin-top: 15px;">
        <button onclick="window.print()">🖨️ طباعة</button>
        <button onclick="history.back()">🔙 رجوع</button>
    </div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  const studentId = sessionStorage.getItem('viewStudentId');
  if (!studentId) window.location.href = 'student-search.html';
  
  function getGradeInfo(percentage) {
      if (percentage >= 90) return { class: 'grade-A', text: 'ممتاز', icon: '🌟' };
      if (percentage >= 80) return { class: 'grade-B', text: 'جيد جداً', icon: '⭐' };
      if (percentage >= 70) return { class: 'grade-C', text: 'جيد', icon: '👍' };
      if (percentage >= 60) return { class: 'grade-D', text: 'مقبول', icon: '📘' };
      return { class: 'grade-F', text: 'راسب', icon: '⚠️' };
  }
  
  async function loadResult() {
      let { data: student, error } = await supabase
          .from('student_results')
          .select('*, schools(id, name, search_field_label)')
          .eq('id', studentId)
          .single();
      
      if (error || !student) {
          document.getElementById('resultContainer').innerHTML = '<div class="result-card"><div class="card-header">خطأ</div><div class="card-body"><p style="color:red">لا توجد بيانات</p></div></div>';
          return;
      }
      
      let school = student.schools;
      let scores = student.scores || {};
      let totalScore = 0, totalMax = 0;
      let subjectsHtml = '';
      let subjectCount = Object.keys(scores).length;
      
      for (let [subject, subjectScores] of Object.entries(scores)) {
          let total = 0, maxTotal = 0;
          let detailsHtml = '';
          for (let [field, value] of Object.entries(subjectScores)) {
              detailsHtml += `<span style="display:inline-block; background:#eef2fa; padding:2px 8px; border-radius:15px; margin:2px; font-size:12px">${field}: ${value}</span>`;
              total += value;
              maxTotal += 100;
          }
          let percentage = maxTotal > 0 ? (total / maxTotal) * 100 : 0;
          let gradeInfo = getGradeInfo(percentage);
          
          subjectsHtml += `
              <tr>
                  <td style="font-weight:bold">${subject}</td>
                  <td>${detailsHtml || '-'}</td>
                  <td>${total}/${maxTotal}</td>
                  <td class="${gradeInfo.class}">${percentage.toFixed(1)}%</td>
                  <td class="${gradeInfo.class}">${gradeInfo.icon} ${gradeInfo.text}</td>
              </td>
          `;
          totalScore += total;
          totalMax += maxTotal;
      }
      
      let totalPercentage = totalMax > 0 ? (totalScore / totalMax) * 100 : 0;
      let totalGradeInfo = getGradeInfo(totalPercentage);
      
      let html = `
          <div class="result-card">
              <div class="card-header">
                  <div class="school-name">🏫 ${school?.name || 'المدرسة'}</div>
                  <div class="student-name">👨‍🎓 ${student.student_name}</div>
                  <div class="student-info">
                      <span>📌 رقم الجلوس: ${student.seat_number || '-'}</span>
                      <span>🔑 الكود: ${student.code || '-'}</span>
                      <span>🆔 الرقم القومي: ${student.national_id || '-'}</span>
                  </div>
              </div>
              <div class="card-body">
                  <div class="stats-grid">
                      <div class="stat-item"><div class="stat-value">${subjectCount}</div><div class="stat-label">المواد</div></div>
                      <div class="stat-item"><div class="stat-value">${totalScore}/${totalMax}</div><div class="stat-label">المجموع الكلي</div></div>
                      <div class="stat-item"><div class="stat-value ${totalGradeInfo.class}" style="font-size:28px">${totalPercentage.toFixed(1)}%</div><div class="stat-label">النسبة المئوية</div></div>
                      <div class="stat-item"><div class="stat-value ${totalGradeInfo.class}">${totalGradeInfo.icon} ${totalGradeInfo.text}</div><div class="stat-label">التقدير العام</div></div>
                  </div>
                  <table class="results-table">
                      <thead><tr><th>المادة</th><th>تفاصيل الدرجات</th><th>المجموع</th><th>النسبة</th><th>التقدير</th></tr></thead>
                      <tbody>${subjectsHtml}</tbody>
                  </table>
              </div>
              <div class="card-footer" style="background:#f8f9fa; padding:15px; text-align:center; font-size:12px; color:#666">
                  <div>📅 تاريخ الإصدار: ${new Date().toLocaleDateString('ar-EG')}</div>
                  <div>© نظام إدارة النتائج المدرسية</div>
              </div>
          </div>
      `;
      
      document.getElementById('resultContainer').innerHTML = html;
  }
  
  loadResult();
</script>
</body>
</html>
