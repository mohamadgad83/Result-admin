<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة الطالب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .header { text-align: center; border-bottom: 2px solid #1e3c72; padding-bottom: 15px; margin-bottom: 20px; }
        .school-name { font-size: 24px; font-weight: bold; color: #1e3c72; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #1e3c72; color: white; }
        .total { background: #eef2fa; font-weight: bold; }
        .grade-A { color: #28a745; font-weight: bold; }
        .grade-B { color: #17a2b8; font-weight: bold; }
        .grade-C { color: #ffc107; font-weight: bold; }
        .grade-D { color: #fd7e14; font-weight: bold; }
        .grade-F { color: #dc3545; font-weight: bold; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 100%; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
<div class="container">
    <div id="resultContainer"></div>
    <button class="no-print" onclick="window.print()">🖨️ طباعة النتيجة</button>
    <button class="no-print" onclick="history.back()">🔙 رجوع للبحث</button>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';
  const studentId = sessionStorage.getItem('viewStudentId');
  if (!studentId) window.location.href = 'student-search.html';
  async function load() {
    const { data: student } = await supabase.from('students').select('*, schools(id, name, search_field_label)').eq('id', studentId).single();
    if (!student) { document.getElementById('resultContainer').innerHTML = '<div class="card"><p style="color:red">⚠️ لا توجد بيانات</p></div>'; return; }
    const school = student.schools;
    const multi = student.multi_scores || {};
    let totalScore = 0, totalMax = 0, subjectsHtml = '';
    for (const [sub, d] of Object.entries(multi)) {
        const work = d.scores?.['أعمال سنة']?.score || 0;
        const exam = d.scores?.['امتحان نهائي']?.score || 0;
        const percent = parseFloat(d.percentage);
        const gradeClass = percent >= 90 ? 'grade-A' : percent >= 80 ? 'grade-B' : percent >= 70 ? 'grade-C' : percent >= 60 ? 'grade-D' : 'grade-F';
        const gradeText = percent >= 90 ? 'ممتاز' : percent >= 80 ? 'جيد جداً' : percent >= 70 ? 'جيد' : percent >= 60 ? 'مقبول' : 'راسب';
        subjectsHtml += `<tr><td><strong>${sub}</strong></td><td>${work}</td><td>${exam}</td><td>${d.total}/${d.max}</td><td class="${gradeClass}">${percent}%</td><td class="${gradeClass}">${gradeText}</td></tr>`;
        totalScore += d.total; totalMax += d.max;
    }
    if (Object.keys(multi).length === 0) subjectsHtml = '<tr><td colspan="6" style="text-align:center">⚠️ لا توجد نتائج مسجلة</td></tr>';
    const totalPercent = totalMax ? ((totalScore / totalMax) * 100).toFixed(1) : 0;
    const totalClass = totalPercent >= 90 ? 'grade-A' : totalPercent >= 80 ? 'grade-B' : totalPercent >= 70 ? 'grade-C' : totalPercent >= 60 ? 'grade-D' : 'grade-F';
    const html = `<div class="card"><div class="header"><div class="school-name">🏫 ${school?.name}</div><div style="font-size:20px;margin:10px 0">👨‍🎓 ${student.name}</div><div>📌 رقم الجلوس: ${student.seat_number} | الصف: ${student.grade || '-'}</div></div><table><thead><tr><th>المادة</th><th>أعمال سنة</th><th>امتحان نهائي</th><th>المجموع</th><th>النسبة</th><th>التقدير</th></tr></thead><tbody>${subjectsHtml}</tbody><tfoot>${Object.keys(multi).length > 0 ? `<tr class="total"><td colspan="3"><strong>الإجمالي</strong></td><td><strong>${totalScore}/${totalMax}</strong></td><td class="${totalClass}"><strong>${totalPercent}%</strong></td><td class="${totalClass}"><strong>${totalPercent >= 50 ? 'نجاح' : 'رسوب'}</strong></td></tr>` : ''}</tfoot></table></div>`;
    document.getElementById('resultContainer').innerHTML = html;
  }
  load();
</script>
</body>
</html>
