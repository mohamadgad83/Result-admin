<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة السوبر أدمن</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>👑 لوحة التحكم العامة</h1>
  <button id="logoutBtn">تسجيل خروج</button>
  <hr>
  <h2>إدارة أنواع المدارس</h2>
  <input type="text" id="newTypeName" placeholder="مثلاً: ابتدائي">
  <button id="addTypeBtn">إضافة نوع</button>
  <div id="typesList"></div>

  <h2>إدارة المدارس</h2>
  <select id="typeSelect"></select>
  <input type="text" id="newSchoolName" placeholder="اسم المدرسة">
  <input type="email" id="schoolAdminEmail" placeholder="بريد مدير المدرسة">
  <button id="addSchoolBtn">إضافة مدرسة</button>
  <div id="schoolsList"></div>

  <h2>رفع CSV لمدرسة معينة</h2>
  <select id="csvSchoolSelect"></select>
  <input type="file" id="csvFile" accept=".csv">
  <button id="uploadCsvBtn">رفع CSV</button>
</div>
<script type="module">
  import { auth, db } from './firebase-config.js';
  import { signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { collection, getDocs, addDoc, doc, setDoc, getDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  if (!auth.currentUser) window.location.href = 'login.html';

  async function loadTypes() {
    const snap = await getDocs(collection(db, "schoolTypes"));
    const types = [];
    snap.forEach(d => types.push({ id: d.id, ...d.data() }));
    return types;
  }

  async function renderTypes() {
    const types = await loadTypes();
    const div = document.getElementById('typesList');
    div.innerHTML = types.map(t => `<div>${t.name} <button onclick="deleteType('${t.id}')">حذف</button></div>`).join('');
    const select = document.getElementById('typeSelect');
    select.innerHTML = '<option value="">اختر نوع</option>' + types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  }

  window.deleteType = async (id) => {
    if (confirm("حذف النوع سيؤثر على المدارس المرتبطة!")) {
      await deleteDoc(doc(db, "schoolTypes", id));
      renderTypes();
      renderSchools();
    }
  };

  async function renderSchools() {
    const snap = await getDocs(collection(db, "schools"));
    const schools = [];
    snap.forEach(d => schools.push({ id: d.id, ...d.data() }));
    const div = document.getElementById('schoolsList');
    div.innerHTML = schools.map(s => `<div>${s.name} (نوع: ${s.typeId}) - مدير: ${s.adminEmail || 'غير محدد'} 
      <button onclick="openSchoolImpersonate('${s.id}')">فتح لوحة المدرسة</button>
      <button onclick="deleteSchool('${s.id}')">حذف</button></div>`).join('');
    const csvSelect = document.getElementById('csvSchoolSelect');
    csvSelect.innerHTML = '<option value="">اختر مدرسة</option>' + schools.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  }

  window.openSchoolImpersonate = (schoolId) => {
    sessionStorage.setItem('impersonatedSchoolId', schoolId);
    window.location.href = 'school-admin.html';
  };

  window.deleteSchool = async (id) => {
    if (confirm("حذف المدرسة سيحذف كل طلابها!")) {
      await deleteDoc(doc(db, "schools", id));
      renderSchools();
    }
  };

  document.getElementById('addTypeBtn').onclick = async () => {
    const name = document.getElementById('newTypeName').value.trim();
    if (!name) return;
    await addDoc(collection(db, "schoolTypes"), { name, grades: [] });
    renderTypes();
  };

  document.getElementById('addSchoolBtn').onclick = async () => {
    const typeId = document.getElementById('typeSelect').value;
    const name = document.getElementById('newSchoolName').value.trim();
    const adminEmail = document.getElementById('schoolAdminEmail').value.trim();
    if (!typeId || !name || !adminEmail) return alert("املأ جميع الحقول");
    const typeDoc = await getDoc(doc(db, "schoolTypes", typeId));
    const defaultGrades = typeDoc.data().grades || [];
    const schoolRef = await addDoc(collection(db, "schools"), {
      name,
      typeId,
      customGrades: defaultGrades,
      studentIdentifierField: "seatNumber",
      studentIdentifierLabel: "رقم الجلوس"
    });
    const tempPass = Math.random().toString(36).slice(-8);
    const userCred = await createUserWithEmailAndPassword(auth, adminEmail, tempPass);
    await setDoc(doc(db, "users", userCred.user.uid), {
      email: adminEmail,
      role: "schoolAdmin",
      schoolId: schoolRef.id
    });
    alert(`تم إنشاء مدير المدرسة بنجاح، كلمة المرور المؤقتة: ${tempPass}`);
    renderSchools();
  };

  document.getElementById('uploadCsvBtn').onclick = async () => {
    const schoolId = document.getElementById('csvSchoolSelect').value;
    const file = document.getElementById('csvFile').files[0];
    if (!schoolId || !file) return alert("اختر مدرسة وملف CSV");
    const text = await file.text();
    const rows = text.split('\n').filter(r => r.trim());
    if (rows.length < 2) return alert("الملف فارغ");
    const batch = writeBatch(db);
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(',');
      if (cols.length < 5) continue;
      const [name, seat, subject, score, gradeId] = cols.map(c => c.trim());
      const studentRef = doc(db, "schools", schoolId, "students", seat);
      batch.set(studentRef, {
        name,
        seatNumber: seat,
        gradeId,
        results: { [subject]: parseInt(score) }
      }, { merge: true });
    }
    await batch.commit();
    alert("تم رفع CSV بنجاح");
  };

  document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href='login.html');

  renderTypes();
  renderSchools();
</script>
</body>
</html>
