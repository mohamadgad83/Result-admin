<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة السوبر أدمن</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>👑 لوحة التحكم العامة</h1>
  <button id="logoutBtn">تسجيل خروج</button>
  <hr>
  <h2>➕ إضافة مدرسة جديدة</h2>
  <input type="text" id="newSchoolName" placeholder="اسم المدرسة">
  <input type="text" id="schoolUsername" placeholder="اسم مستخدم مدير المدرسة">
  <button id="addSchoolBtn">إضافة مدرسة</button>
  
  <h2>🏫 المدارس</h2>
  <div id="schoolsList"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';

  // التحقق من تسجيل الدخول
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    window.location.href = 'login.html';
  }

  // تسجيل الخروج
  document.getElementById('logoutBtn').onclick = () => {
    supabase.auth.signOut();
    window.location.href = 'login.html';
  };

  // عرض المدارس
  async function renderSchools() {
    const { data: schools } = await supabase.from('schools').select('id, name');
    const div = document.getElementById('schoolsList');
    if (!schools || schools.length === 0) {
      div.innerHTML = 'لا توجد مدارس';
      return;
    }
    div.innerHTML = schools.map(s => `
      <div style="background:#f5f5f5; padding:10px; margin:5px 0; border-radius:8px">
        ${s.name}
      </div>
    `).join('');
  }

  // إضافة مدرسة
  document.getElementById('addSchoolBtn').onclick = async () => {
    const name = document.getElementById('newSchoolName').value.trim();
    const username = document.getElementById('schoolUsername').value.trim();
    if (!name || !username) {
      alert("املأ جميع الحقول");
      return;
    }

    const tempPass = Math.random().toString(36).slice(-8);
    const fakeEmail = `${username}@school.local`;

    // إضافة المدرسة
    const { data: newSchool, error: schoolError } = await supabase
      .from('schools')
      .insert([{ name, custom_grades: [] }])
      .select()
      .single();

    if (schoolError) {
      alert("خطأ في إضافة المدرسة: " + schoolError.message);
      return;
    }

    // إنشاء حساب Auth
    const { data: authUser, error: authError } = await supabase.auth.signUp({
      email: fakeEmail,
      password: tempPass
    });

    if (authError) {
      await supabase.from('schools').delete().eq('id', newSchool.id);
      alert("فشل إنشاء حساب: " + authError.message);
      return;
    }

    // إضافة المستخدم في جدول users
    await supabase.from('users').insert([{
      id: authUser.user.id,
      email: fakeEmail,
      username: username,
      role: 'schoolAdmin',
      school_id: newSchool.id
    }]);

    alert(`✅ تمت الإضافة!\n\nاسم المستخدم: ${username}\nكلمة المرور: ${tempPass}`);
    document.getElementById('newSchoolName').value = '';
    document.getElementById('schoolUsername').value = '';
    renderSchools();
  };

  renderSchools();
</script>
</body>
</html>
