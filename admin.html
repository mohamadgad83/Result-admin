<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - مدرسة دشنا الثانوية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #eef2fa;
            padding: 10px;
            border-radius: 15px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 25px;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.2s;
        }
        .tab-btn.active { background: #1e3c72; color: white; }
        .tab-btn:hover:not(.active) { background: #cfe3ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
        button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #1e3c72; color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0f2b4f; transform: scale(1.02); }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-info { background: #17a2b8; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        
        .grade-card, .school-card {
            background: #eef2fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #cfe3ff;
        }
        .grade-header, .school-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1e3c72;
        }
        .grade-title, .school-title { font-size: 20px; font-weight: bold; color: #1e3c72; }
        .subjects-list { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .subject-item {
            background: white;
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-right: 3px solid #1e3c72;
        }
        .subject-name { font-weight: bold; font-size: 16px; }
        .subject-order { background: #eef2fa; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .add-subject-row { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .add-subject-row input { flex: 2; }
        .add-subject-row input[type="number"] { flex: 0.5; min-width: 80px; }
        
        .settings-card {
            background: #f0f7ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #cfe3ff;
        }
        .checkbox-group { display: flex; gap: 20px; flex-wrap: wrap; margin: 10px 0; }
        .checkbox-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
        }
        .toast.error { background: #dc3545; }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        @media (max-width: 600px) {
            .grade-header, .school-header { flex-direction: column; text-align: center; }
            .subject-item { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between" style="margin-bottom: 20px;">
        <h1>👑 لوحة التحكم - مدرسة دشنا الثانوية</h1>
        <button onclick="logout()" class="btn-danger">🚪 تسجيل خروج</button>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('materials')">📚 المواد والصفوف</button>
        <button class="tab-btn" onclick="showTab('schools')">🏫 المدارس</button>
        <button class="tab-btn" onclick="showTab('search')">🔍 إعدادات البحث</button>
    </div>
    
    <!-- تبويب المواد -->
    <div id="tab-materials" class="tab-content active">
        <div id="gradesContainer"></div>
        <button onclick="showAddGradeModal()" class="btn-success" style="margin-top: 15px;">➕ إضافة صف جديد</button>
    </div>
    
    <!-- تبويب المدارس -->
    <div id="tab-schools" class="tab-content">
        <div id="schoolsList"></div>
        <button onclick="showAddSchoolModal()" class="btn-success" style="margin-top: 15px;">➕ إضافة مدرسة جديدة</button>
    </div>
    
    <!-- تبويب إعدادات البحث -->
    <div id="tab-search" class="tab-content">
        <div class="settings-card">
            <h3>🔍 إعدادات البحث للطلاب</h3>
            <p style="font-size:12px; color:#666;">اختر الحقول التي سيتم البحث بها (يمكن اختيار أكثر من حقل)</p>
            <div class="checkbox-group">
                <label><input type="checkbox" id="searchSeat" value="seat_number"> رقم الجلوس</label>
                <label><input type="checkbox" id="searchCode" value="code"> الكود</label>
                <label><input type="checkbox" id="searchNational" value="national_id"> الرقم القومي</label>
            </div>
            <button onclick="saveSearchSettings()" class="btn-success">💾 حفظ إعدادات البحث</button>
        </div>
    </div>
</div>

<!-- نافذة إضافة صف -->
<div id="addGradeModal" class="modal">
    <div class="modal-content">
        <h3>➕ إضافة صف جديد</h3>
        <input type="text" id="newGradeName" placeholder="اسم الصف" style="width:100%; margin:10px 0">
        <div class="flex-between">
            <button onclick="saveNewGrade()" class="btn-success">💾 حفظ</button>
            <button onclick="closeModal('addGradeModal')" class="btn-danger">إلغاء</button>
        </div>
    </div>
</div>

<!-- نافذة تعديل اسم الصف -->
<div id="editGradeModal" class="modal">
    <div class="modal-content">
        <h3>✏️ تعديل اسم الصف</h3>
        <input type="text" id="editGradeName" placeholder="الاسم الجديد" style="width:100%; margin:10px 0">
        <div class="flex-between">
            <button onclick="saveGradeEdit()" class="btn-success">💾 حفظ</button>
            <button onclick="closeModal('editGradeModal')" class="btn-danger">إلغاء</button>
        </div>
    </div>
</div>

<!-- نافذة إضافة مدرسة -->
<div id="addSchoolModal" class="modal">
    <div class="modal-content">
        <h3>➕ إضافة مدرسة جديدة</h3>
        <input type="text" id="newSchoolName" placeholder="اسم المدرسة" style="width:100%; margin:10px 0">
        <div class="flex-between">
            <button onclick="addNewSchool()" class="btn-success">💾 حفظ</button>
            <button onclick="closeModal('addSchoolModal')" class="btn-danger">إلغاء</button>
        </div>
    </div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  let currentEditGradeId = null;
  let currentSchoolId = 1;
  
  const role = sessionStorage.getItem('userRole');
  if (role !== 'superAdmin') window.location.href = 'login.html';
  
  function showToast(msg, isErr = false) {
      let t = document.createElement('div');
      t.className = `toast ${isErr ? 'error' : ''}`;
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
  }
  
  // التبويبات
  window.showTab = (tabId) => {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      if (tabId === 'materials') {
          document.querySelectorAll('.tab-btn')[0].classList.add('active');
          document.getElementById('tab-materials').classList.add('active');
          loadGrades();
      } else if (tabId === 'schools') {
          document.querySelectorAll('.tab-btn')[1].classList.add('active');
          document.getElementById('tab-schools').classList.add('active');
          loadSchools();
      } else {
          document.querySelectorAll('.tab-btn')[2].classList.add('active');
          document.getElementById('tab-search').classList.add('active');
      }
  };
  
  // إعدادات البحث
  async function loadSearchSettings() {
      let { data: school } = await supabase.from('schools').select('search_fields').eq('id', currentSchoolId).single();
      let fields = school?.search_fields || ['code', 'national_id'];
      document.getElementById('searchSeat').checked = fields.includes('seat_number');
      document.getElementById('searchCode').checked = fields.includes('code');
      document.getElementById('searchNational').checked = fields.includes('national_id');
  }
  
  window.saveSearchSettings = async () => {
      let searchFields = [];
      if (document.getElementById('searchSeat').checked) searchFields.push('seat_number');
      if (document.getElementById('searchCode').checked) searchFields.push('code');
      if (document.getElementById('searchNational').checked) searchFields.push('national_id');
      if (searchFields.length === 0) { showToast("اختر حقل بحث واحد على الأقل", true); return; }
      let { error } = await supabase.from('schools').update({ search_fields: searchFields }).eq('id', currentSchoolId);
      if (error) showToast("خطأ: " + error.message, true);
      else showToast("✅ تم حفظ إعدادات البحث");
  };
  
  // إدارة المدارس
  async function loadSchools() {
      let { data: schools } = await supabase.from('schools').select('*');
      const div = document.getElementById('schoolsList');
      if (!schools || schools.length === 0) {
          div.innerHTML = '<p>لا توجد مدارس</p>';
          return;
      }
      div.innerHTML = schools.map(s => `
          <div class="school-card">
              <div><strong>🏫 ${s.name}</strong></div>
              <div>
                  <button onclick="openSchool(${s.id})" class="btn-info">👁️ فتح لوحة المدرسة</button>
                  <button onclick="deleteSchool(${s.id})" class="btn-danger">🗑️ حذف</button>
              </div>
          </div>
      `).join('');
  }
  
  window.openSchool = (id) => {
      sessionStorage.setItem('impersonatedSchoolId', id);
      window.location.href = 'school-admin.html';
  };
  
  window.deleteSchool = async (id) => {
      if (!confirm("حذف المدرسة سيحذف جميع بياناتها؟")) return;
      await supabase.from('student_results').delete().eq('school_id', id);
      await supabase.from('schools').delete().eq('id', id);
      showToast("✅ تم حذف المدرسة");
      loadSchools();
  };
  
  window.showAddSchoolModal = () => {
      document.getElementById('newSchoolName').value = '';
      document.getElementById('addSchoolModal').style.display = 'flex';
  };
  
  window.addNewSchool = async () => {
      let name = document.getElementById('newSchoolName').value.trim();
      if (!name) { showToast("اسم المدرسة مطلوب", true); return; }
      let { error } = await supabase.from('schools').insert([{ name, search_fields: ['code', 'national_id'] }]);
      if (error) showToast("خطأ: " + error.message, true);
      else { showToast("✅ تم إضافة المدرسة"); closeModal('addSchoolModal'); loadSchools(); }
  };
  
  // إدارة المواد والصفوف
  async function loadGrades() {
      let { data: grades } = await supabase.from('grades').select('*').order('id');
      const container = document.getElementById('gradesContainer');
      if (!grades || grades.length === 0) {
          container.innerHTML = '<p>لا توجد صفوف. أضف صفاً جديداً</p>';
          return;
      }
      container.innerHTML = '';
      for (let grade of grades) {
          let subjects = grade.subjects || [];
          subjects.sort((a, b) => (a.order || 0) - (b.order || 0));
          container.innerHTML += `
              <div class="grade-card">
                  <div class="grade-header">
                      <div class="grade-title">🎓 ${grade.name}</div>
                      <div>
                          <button onclick="editGradeName(${grade.id}, '${grade.name}')" class="btn-warning btn-sm">✏️ تعديل الاسم</button>
                          <button onclick="deleteGrade(${grade.id})" class="btn-danger btn-sm">🗑️ حذف الصف</button>
                      </div>
                  </div>
                  <div class="subjects-list">
                      ${subjects.map((sub, idx) => `
                          <div class="subject-item">
                              <div class="subject-name">📖 ${sub.name} <span class="subject-order">ترتيب: ${sub.order || idx+1}</span></div>
                              <div>
                                  <button onclick="editSubject(${grade.id}, ${idx}, '${sub.name}', ${sub.order || idx+1})" class="btn-warning btn-sm">✏️ تعديل</button>
                                  <button onclick="deleteSubject(${grade.id}, ${idx}, '${sub.name}')" class="btn-danger btn-sm">🗑️ حذف</button>
                              </div>
                          </div>
                      `).join('')}
                  </div>
                  <div class="add-subject-row">
                      <input type="text" id="newSubject-${grade.id}" placeholder="مادة جديدة">
                      <input type="number" id="newOrder-${grade.id}" placeholder="الترتيب" value="${subjects.length + 1}">
                      <button onclick="addSubject(${grade.id})" class="btn-success">+ إضافة</button>
                  </div>
              </div>
          `;
      }
  }
  
  window.showAddGradeModal = () => {
      document.getElementById('newGradeName').value = '';
      document.getElementById('addGradeModal').style.display = 'flex';
  };
  
  window.saveNewGrade = async () => {
      let name = document.getElementById('newGradeName').value.trim();
      if (!name) { showToast("اسم الصف مطلوب", true); return; }
      let { error } = await supabase.from('grades').insert([{ name, subjects: [] }]);
      if (error) showToast("خطأ: " + error.message, true);
      else { showToast("✅ تم إضافة الصف"); closeModal('addGradeModal'); loadGrades(); }
  };
  
  window.editGradeName = (id, currentName) => {
      currentEditGradeId = id;
      document.getElementById('editGradeName').value = currentName;
      document.getElementById('editGradeModal').style.display = 'flex';
  };
  
  window.saveGradeEdit = async () => {
      let newName = document.getElementById('editGradeName').value.trim();
      if (!newName) { showToast("اسم الصف مطلوب", true); return; }
      let { error } = await supabase.from('grades').update({ name: newName }).eq('id', currentEditGradeId);
      if (error) showToast("خطأ: " + error.message, true);
      else { showToast("✅ تم تعديل اسم الصف"); closeModal('editGradeModal'); loadGrades(); }
  };
  
  window.deleteGrade = async (id) => {
      if (!confirm("حذف هذا الصف سيحذف جميع بيانات الطلاب المرتبطة به! استمر؟")) return;
      await supabase.from('grades').delete().eq('id', id);
      showToast("✅ تم حذف الصف");
      loadGrades();
  };
  
  window.addSubject = async (gradeId) => {
      let name = document.getElementById(`newSubject-${gradeId}`).value.trim();
      let order = parseInt(document.getElementById(`newOrder-${gradeId}`).value);
      if (!name) { showToast("أدخل اسم المادة", true); return; }
      if (isNaN(order)) order = 0;
      let { data: grade } = await supabase.from('grades').select('subjects').eq('id', gradeId).single();
      let subjects = grade.subjects || [];
      if (subjects.find(s => s.name === name)) { showToast("هذه المادة موجودة", true); return; }
      subjects.push({ name, order });
      subjects.sort((a, b) => (a.order || 0) - (b.order || 0));
      await supabase.from('grades').update({ subjects }).eq('id', gradeId);
      showToast(`✅ تم إضافة "${name}"`);
      loadGrades();
  };
  
  window.editSubject = async (gradeId, idx, oldName, oldOrder) => {
      let newName = prompt("الاسم الجديد:", oldName);
      if (!newName) return;
      let newOrder = parseInt(prompt("الترتيب الجديد:", oldOrder));
      if (isNaN(newOrder)) newOrder = oldOrder;
      let { data: grade } = await supabase.from('grades').select('subjects').eq('id', gradeId).single();
      let subjects = grade.subjects || [];
      subjects[idx] = { name: newName, order: newOrder };
      subjects.sort((a, b) => (a.order || 0) - (b.order || 0));
      await supabase.from('grades').update({ subjects }).eq('id', gradeId);
      showToast("✅ تم تعديل المادة");
      loadGrades();
  };
  
  window.deleteSubject = async (gradeId, idx, subjectName) => {
      if (!confirm(`حذف "${subjectName}"؟`)) return;
      let { data: grade } = await supabase.from('grades').select('subjects').eq('id', gradeId).single();
      let subjects = grade.subjects || [];
      subjects.splice(idx, 1);
      subjects.forEach((sub, i) => { sub.order = i + 1; });
      await supabase.from('grades').update({ subjects }).eq('id', gradeId);
      showToast("✅ تم حذف المادة");
      loadGrades();
  };
  
  window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  
  loadSearchSettings();
  loadGrades();
  loadSchools();
</script>
</body>
</html>
