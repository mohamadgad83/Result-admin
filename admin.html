<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم العامة - Super Admin</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .school-card {
      background: #f9f9ff;
      padding: 10px;
      margin: 10px 0;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logs-panel {
      max-height: 300px;
      overflow-y: auto;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .log-entry {
      border-bottom: 1px solid #ddd;
      padding: 5px;
      font-family: monospace;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>👑 لوحة التحكم العامة</h1>
  <button id="logoutBtn">تسجيل خروج</button>
  <button id="darkModeBtn" style="background:#666">🌙</button>
  <hr>
  
  <h2>➕ إضافة مدرسة جديدة</h2>
  <div style="background:#eef2fa; padding:15px; border-radius:12px">
    <input type="text" id="newSchoolName" placeholder="اسم المدرسة" style="width:100%; margin-bottom:10px">
    <input type="text" id="schoolUsername" placeholder="اسم مستخدم مدير المدرسة" style="width:100%; margin-bottom:10px">
    <button id="addSchoolBtn">➕ إضافة مدرسة</button>
  </div>
  
  <h2>🏫 المدارس</h2>
  <div id="schoolsList"></div>
  
  <h2>📤 رفع CSV لمدرسة معينة</h2>
  <select id="csvSchoolSelect" style="width:100%; margin-bottom:10px">
    <option value="">-- اختر مدرسة --</option>
  </select>
  <input type="file" id="csvFile" accept=".csv, .xlsx">
  <button id="uploadCsvBtn">رفع CSV</button>
  
  <h2>📊 سجل العمليات (Logs)</h2>
  <div id="logsPanel" class="logs-panel">جاري التحميل...</div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';

  // التحقق من تسجيل الدخول والصلاحية
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) window.location.href = 'login.html';
  
  const { data: userData } = await supabase.from('users').select('role').eq('id', user.id).single();
  if (!userData || userData.role !== 'superAdmin') window.location.href = 'login.html';
  
  // تسجيل الخروج
  document.getElementById('logoutBtn').onclick = () => supabase.auth.signOut().then(() => window.location.href='login.html');
  
  // سجل العمليات
  async function addLog(action, details) {
    await supabase.from('logs').insert([{
      user_id: user.id,
      action: action,
      details: details,
      created_at: new Date()
    }]);
    loadLogs();
  }
  
  async function loadLogs() {
    const { data: logs } = await supabase.from('logs').select('*').order('created_at', { ascending: false }).limit(50);
    const panel = document.getElementById('logsPanel');
    if (!logs || logs.length === 0) {
      panel.innerHTML = 'لا توجد سجلات';
      return;
    }
    panel.innerHTML = logs.map(log => `
      <div class="log-entry">
        <strong>${new Date(log.created_at).toLocaleString()}</strong> - 
        ${log.action}: ${log.details}
      </div>
    `).join('');
  }
  
  // عرض المدارس
  async function renderSchools() {
    const { data: schools } = await supabase.from('schools').select('id, name');
    const div = document.getElementById('schoolsList');
    div.innerHTML = schools ? schools.map(s => `
      <div class="school-card">
        <span>${s.name}</span>
        <div>
          <button onclick="openSchoolImpersonate('${s.id}')" style="background:#e94560">فتح لوحة المدرسة</button>
          <button onclick="deleteSchool('${s.id}')" style="background:#dc3545">حذف</button>
        </div>
      </div>
    `).join('') : 'لا توجد مدارس';
    
    const csvSelect = document.getElementById('csvSchoolSelect');
    csvSelect.innerHTML = '<option value="">-- اختر مدرسة --</option>' + (schools ? schools.map(s => `<option value="${s.id}">${s.name}</option>`).join('') : '');
  }
  
  window.openSchoolImpersonate = (schoolId) => {
    sessionStorage.setItem('impersonatedSchoolId', schoolId);
    window.location.href = 'school-admin.html';
  };
  
  window.deleteSchool = async (id) => {
    if (!confirm("حذف المدرسة سيحذف كل بياناتها! هل أنت متأكد؟")) return;
    await supabase.from('schools').delete().eq('id', id);
    await addLog('حذف مدرسة', `تم حذف المدرسة رقم ${id}`);
    renderSchools();
  };
  
  // إضافة مدرسة جديدة
document.getElementById('addSchoolBtn').onclick = async () => {
  const name = document.getElementById('newSchoolName').value.trim();
  const username = document.getElementById('schoolUsername').value.trim();
  
  if (!name || !username) {
    alert("❌ املأ جميع الحقول");
    return;
  }

  const tempPass = Math.random().toString(36).slice(-8);
  const fakeEmail = `${username}@school.local`;

  // 1. إضافة المدرسة
  const { data: newSchool, error: schoolError } = await supabase
    .from('schools')
    .insert([{ 
      name, 
      custom_grades: [], 
      student_identifier_field: 'seat_number', 
      student_identifier_label: 'رقم الجلوس' 
    }])
    .select()
    .single();

  if (schoolError) {
    alert("❌ خطأ في إضافة المدرسة: " + schoolError.message);
    return;
  }

  // 2. إنشاء حساب Auth
  const { data: authUser, error: authError } = await supabase.auth.signUp({
    email: fakeEmail,
    password: tempPass
  });

  if (authError) {
    await supabase.from('schools').delete().eq('id', newSchool.id);
    alert("❌ فشل إنشاء حساب: " + authError.message);
    return;
  }

  // 3. إضافة المستخدم في جدول users
  const { error: userError } = await supabase
    .from('users')
    .insert([{
      id: authUser.user.id,
      email: fakeEmail,
      username: username,
      role: 'schoolAdmin',
      school_id: newSchool.id
    }]);

  if (userError) {
    alert("❌ فشل إضافة المستخدم: " + userError.message);
    return;
  }

  // 4. تسجيل في الـ logs
  await supabase.from('logs').insert([{
    user_id: authUser.user.id,
    action: 'إضافة مدرسة',
    details: `تم إضافة مدرسة "${name}" مع مدير "${username}"`
  }]);

  alert(`✅ تمت الإضافة بنجاح!\n\n👤 اسم المستخدم: ${username}\n🔑 كلمة المرور المؤقتة: ${tempPass}\n\n⚠️ يرجى حفظ كلمة المرور وإبلاغ مدير المدرسة بها.`);
  
  document.getElementById('newSchoolName').value = '';
  document.getElementById('schoolUsername').value = '';
  renderSchools();
};
  
  // رفع CSV
  document.getElementById('uploadCsvBtn').onclick = async () => {
    const schoolId = document.getElementById('csvSchoolSelect').value;
    const file = document.getElementById('csvFile').files[0];
    if (!schoolId || !file) {
      alert("اختر مدرسة وملف CSV");
      return;
    }
    
    const text = await file.text();
    const rows = text.split('\n').filter(r => r.trim());
    if (rows.length < 2) {
      alert("الملف فارغ");
      return;
    }
    
    const students = [];
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(',');
      if (cols.length < 4) continue;
      const [name, seat, subject, score] = cols.map(c => c.trim());
      if (name && seat && subject && score) {
        students.push({
          school_id: parseInt(schoolId),
          name: name,
          seat_number: seat,
          results: { [subject]: parseInt(score) }
        });
      }
    }
    
    const { error } = await supabase.from('students').upsert(students);
    if (error) {
      alert("خطأ في رفع CSV: " + error.message);
    } else {
      await addLog('رفع CSV', `تم رفع ${students.length} طالب للمدرسة ${schoolId}`);
      alert(`تم رفع ${students.length} طالب بنجاح`);
    }
  };
  
  // الوضع المظلم
  document.getElementById('darkModeBtn').onclick = () => document.body.classList.toggle('dark-mode');
  
  renderSchools();
  loadLogs();
</script>
</body>
</html>
