<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة السوبر أدمن</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
    .container { max-width: 1000px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
    button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
    button { background: #1e3c72; color: white; border: none; cursor: pointer; }
    button:hover { background: #0f2b4f; }
    .school-card { background: #eef2fa; padding: 15px; margin: 10px 0; border-radius: 12px; }
    .school-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .school-details { margin-top: 10px; padding-top: 10px; border-top: 1px solid #ccc; display: none; }
    .school-details.show { display: block; }
    .custom-field-row { display: flex; gap: 10px; margin: 5px 0; align-items: center; flex-wrap: wrap; }
    @media (max-width: 600px) { .school-header { flex-direction: column; text-align: center; } button, input, select { width: 100%; margin: 5px 0; } }
  </style>
</head>
<body>
<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px">
    <h1 style="margin:0">👑 لوحة التحكم العامة</h1>
    <div>
      <button onclick="window.location.href='index.html'" style="background:#28a745">🏠 الرئيسية</button>
      <button onclick="logout()" style="background:#dc3545">تسجيل خروج</button>
    </div>
  </div>
  
  <div style="background:#eef2fa; padding:15px; border-radius:12px; margin-bottom:20px">
    <h3>👤 المستخدم الحالي: <span id="currentUsername"></span></h3>
    <button onclick="showEditUserModal()" style="background:#ffc107; color:#333">✏️ تعديل بياناتي</button>
  </div>
  <hr>
  
  <h2>➕ إضافة مدرسة جديدة</h2>
  <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin-bottom:20px">
    <input type="text" id="newSchoolName" placeholder="اسم المدرسة" style="width:100%; margin-bottom:10px">
    
    <select id="schoolStage" style="width:100%; margin-bottom:10px">
      <option value="">-- اختر المرحلة الدراسية --</option>
    </select>
    
    <div id="gradesContainer" style="margin-bottom:10px"></div>
    
    <h4>🔍 إعدادات البحث</h4>
    <div style="background:white; padding:10px; border-radius:8px; margin-bottom:15px">
      <select id="searchField" style="width:100%; margin-bottom:10px">
        <option value="seat_number">رقم الجلوس</option>
        <option value="code">الكود</option>
        <option value="national_id">الرقم القومي</option>
      </select>
      <input type="text" id="searchFieldLabel" placeholder="التسمية الظاهرة (مثال: رقم الجلوس)" style="width:100%">
    </div>
    
    <h4>📋 حقول إضافية لبيانات الطلاب</h4>
    <div id="studentCustomFieldsContainer"></div>
    <button onclick="addStudentCustomField()" style="background:#28a745; margin-bottom:15px">+ إضافة حقل</button>
    
    <h4>📊 حقول إضافية للنتائج</h4>
    <div id="resultCustomFieldsContainer"></div>
    <button onclick="addResultCustomField()" style="background:#28a745; margin-bottom:15px">+ إضافة حقل</button>
    
    <input type="text" id="schoolUsername" placeholder="اسم مستخدم مدير المدرسة" style="width:100%; margin-bottom:10px">
    <input type="password" id="schoolPassword" placeholder="كلمة سر مدير المدرسة" style="width:100%; margin-bottom:10px">
    <button id="addSchoolBtn">➕ إضافة مدرسة</button>
  </div>
  
  <h2>🏫 المدارس</h2>
  <div id="schoolsList">جاري التحميل...</div>
</div>

<!-- نافذة تعديل المستخدم -->
<div id="editUserModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000">
  <div style="background:white; padding:20px; border-radius:20px; max-width:400px; width:90%">
    <h3>✏️ تعديل بيانات المستخدم</h3>
    <input type="text" id="editUsername" placeholder="اسم المستخدم الجديد" style="width:100%; margin:10px 0">
    <input type="password" id="editPassword" placeholder="كلمة المرور الجديدة" style="width:100%; margin:10px 0">
    <button onclick="updateUser()" style="background:#28a745">💾 حفظ</button>
    <button onclick="closeModal()" style="background:#dc3545">إلغاء</button>
  </div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  let currentUser = null;
  let stagesData = [];
  
  const role = sessionStorage.getItem('userRole');
  const userId = sessionStorage.getItem('userId');
  if (role !== 'superAdmin') window.location.href = 'login.html';
  
  async function loadCurrentUser() {
    const { data: user } = await supabase.from('users').select('*').eq('id', userId).single();
    if (user) {
      currentUser = user;
      document.getElementById('currentUsername').innerText = user.username;
    }
  }
  
  async function loadStages() {
    const { data: stages } = await supabase.from('stages').select('*');
    stagesData = stages || [];
    const select = document.getElementById('schoolStage');
    select.innerHTML = '<option value="">-- اختر المرحلة الدراسية --</option>';
    stages.forEach(stage => {
      select.innerHTML += `<option value="${stage.id}">${stage.name}</option>`;
    });
  }
  
  window.addStudentCustomField = () => {
    const container = document.getElementById('studentCustomFieldsContainer');
    const div = document.createElement('div');
    div.className = 'custom-field-row';
    div.innerHTML = `
      <input type="text" placeholder="اسم الحقل (مثال: ولي الأمر)" class="student-field-name" style="flex:2">
      <select class="student-field-type" style="flex:1">
        <option value="text">نص</option>
        <option value="number">رقم</option>
        <option value="date">تاريخ</option>
      </select>
      <button onclick="this.parentElement.remove()" style="background:#dc3545; width:auto">✖</button>
    `;
    container.appendChild(div);
  };
  
  window.addResultCustomField = () => {
    const container = document.getElementById('resultCustomFieldsContainer');
    const div = document.createElement('div');
    div.className = 'custom-field-row';
    div.innerHTML = `
      <input type="text" placeholder="اسم الحقل (مثال: تقدير)" class="result-field-name" style="flex:2">
      <select class="result-field-type" style="flex:1">
        <option value="text">نص</option>
        <option value="number">رقم</option>
        <option value="date">تاريخ</option>
      </select>
      <button onclick="this.parentElement.remove()" style="background:#dc3545; width:auto">✖</button>
    `;
    container.appendChild(div);
  };
  
  document.getElementById('schoolStage').addEventListener('change', async (e) => {
    const stageId = e.target.value;
    const gradesDiv = document.getElementById('gradesContainer');
    if (!stageId) {
      gradesDiv.innerHTML = '';
      return;
    }
    const stage = stagesData.find(s => s.id == stageId);
    if (stage && stage.grades) {
      const grades = JSON.parse(stage.grades);
      gradesDiv.innerHTML = '<label style="display:block; margin-bottom:5px">اختر الصفوف والمواد:</label>';
      grades.forEach((g, idx) => {
        gradesDiv.innerHTML += `
          <div style="background:white; padding:10px; margin:5px 0; border-radius:8px">
            <label><strong>${g.grade}</strong></label>
            <div id="subjects-${idx}">
              ${g.subjects.map(sub => `<label style="margin-left:10px"><input type="checkbox" class="subject-checkbox" data-grade="${g.grade}" data-subject="${sub}" checked> ${sub}</label>`).join('')}
            </div>
          </div>
        `;
      });
    }
  });
  
  async function renderSchools() {
    const { data: schools } = await supabase.from('schools').select('*, stages(name)');
    const div = document.getElementById('schoolsList');
    if (!schools || schools.length === 0) {
      div.innerHTML = '<p>لا توجد مدارس</p>';
      return;
    }
    div.innerHTML = schools.map(s => `
      <div class="school-card">
        <div class="school-header">
          <div>
            <strong>${s.name}</strong><br>
            <small>المرحلة: ${s.stages?.name || 'غير محدد'}</small><br>
            <small>بحث بـ: ${s.search_field_label || s.search_field || 'رقم الجلوس'}</small>
          </div>
          <div>
            <button onclick="toggleSchoolDetails(${s.id})">⚙️ إعدادات</button>
            <button onclick="openSchool(${s.id})">👁️ فتح المدرسة</button>
            <button onclick="deleteSchool(${s.id})" style="background:#dc3545">🗑️ حذف</button>
          </div>
        </div>
        <div id="details-${s.id}" class="school-details">
          <h4>🔍 إعدادات البحث</h4>
          <select id="searchField-${s.id}" class="search-field-select" data-school="${s.id}">
            <option value="seat_number" ${s.search_field === 'seat_number' ? 'selected' : ''}>رقم الجلوس</option>
            <option value="code" ${s.search_field === 'code' ? 'selected' : ''}>الكود</option>
            <option value="national_id" ${s.search_field === 'national_id' ? 'selected' : ''}>الرقم القومي</option>
          </select>
          <input type="text" id="searchLabel-${s.id}" placeholder="التسمية الظاهرة" value="${s.search_field_label || ''}" style="width:100%; margin-top:5px">
          <button onclick="updateSearchSettings(${s.id})" style="background:#28a745; margin-top:5px">💾 حفظ إعدادات البحث</button>
        </div>
      </div>
    `).join('');
  }
  
  window.toggleSchoolDetails = (id) => {
    const details = document.getElementById(`details-${id}`);
    details.classList.toggle('show');
  };
  
  window.updateSearchSettings = async (id) => {
    const searchField = document.getElementById(`searchField-${id}`).value;
    const searchLabel = document.getElementById(`searchLabel-${id}`).value;
    
    const { error } = await supabase
      .from('schools')
      .update({ search_field: searchField, search_field_label: searchLabel })
      .eq('id', id);
    
    if (error) alert("خطأ في تحديث الإعدادات: " + error.message);
    else {
      alert("✅ تم تحديث إعدادات البحث");
      renderSchools();
    }
  };
  
  window.openSchool = (schoolId) => {
    sessionStorage.setItem('impersonatedSchoolId', schoolId);
    window.location.href = 'school-admin.html';
  };
  
  window.deleteSchool = async (id) => {
    if (!confirm("هل أنت متأكد من حذف هذه المدرسة؟")) return;
    await supabase.from('schools').delete().eq('id', id);
    renderSchools();
  };
  
  document.getElementById('addSchoolBtn').onclick = async () => {
    const name = document.getElementById('newSchoolName').value.trim();
    const stageId = document.getElementById('schoolStage').value;
    const username = document.getElementById('schoolUsername').value.trim();
    const password = document.getElementById('schoolPassword').value.trim();
    const searchField = document.getElementById('searchField').value;
    const searchFieldLabel = document.getElementById('searchFieldLabel').value.trim() || 
      (searchField === 'seat_number' ? 'رقم الجلوس' : searchField === 'code' ? 'الكود' : 'الرقم القومي');
    
    if (!name || !stageId || !username || !password) {
      alert("❌ املأ جميع الحقول");
      return;
    }
    
    const selectedSubjects = [];
    document.querySelectorAll('.subject-checkbox:checked').forEach(cb => {
      selectedSubjects.push({
        grade: cb.dataset.grade,
        subject: cb.dataset.subject
      });
    });
    
    const studentCustomFields = [];
    document.querySelectorAll('#studentCustomFieldsContainer .custom-field-row').forEach(row => {
      const nameInput = row.querySelector('.student-field-name');
      const typeSelect = row.querySelector('.student-field-type');
      if (nameInput && nameInput.value.trim()) {
        studentCustomFields.push({
          name: nameInput.value.trim(),
          type: typeSelect.value
        });
      }
    });
    
    const resultCustomFields = [];
    document.querySelectorAll('#resultCustomFieldsContainer .custom-field-row').forEach(row => {
      const nameInput = row.querySelector('.result-field-name');
      const typeSelect = row.querySelector('.result-field-type');
      if (nameInput && nameInput.value.trim()) {
        resultCustomFields.push({
          name: nameInput.value.trim(),
          type: typeSelect.value
        });
      }
    });
    
    const { data: newSchool, error: schoolError } = await supabase
      .from('schools')
      .insert([{ 
        name, 
        stage_id: stageId, 
        custom_subjects: selectedSubjects,
        student_custom_fields: studentCustomFields,
        result_custom_fields: resultCustomFields,
        search_field: searchField,
        search_field_label: searchFieldLabel
      }])
      .select()
      .single();
    
    if (schoolError) {
      alert("خطأ في إضافة المدرسة: " + schoolError.message);
      return;
    }
    
    const { error: userError } = await supabase
      .from('users')
      .insert([{
        username: username,
        password: password,
        role: 'schoolAdmin',
        school_id: newSchool.id
      }]);
    
    if (userError) {
      await supabase.from('schools').delete().eq('id', newSchool.id);
      alert("خطأ في إضافة المستخدم: " + userError.message);
      return;
    }
    
    alert(`✅ تمت الإضافة!\n\n👤 اسم المستخدم: ${username}\n🔑 كلمة المرور: ${password}`);
    document.getElementById('newSchoolName').value = '';
    document.getElementById('schoolUsername').value = '';
    document.getElementById('schoolPassword').value = '';
    renderSchools();
  };
  
  window.showEditUserModal = () => {
    document.getElementById('editUsername').value = currentUser?.username || '';
    document.getElementById('editPassword').value = '';
    document.getElementById('editUserModal').style.display = 'flex';
  };
  
  window.closeModal = () => {
    document.getElementById('editUserModal').style.display = 'none';
  };
  
  window.updateUser = async () => {
    const newUsername = document.getElementById('editUsername').value.trim();
    const newPassword = document.getElementById('editPassword').value.trim();
    if (!newUsername) return alert("اسم المستخدم مطلوب");
    
    const updateData = { username: newUsername };
    if (newPassword) updateData.password = newPassword;
    
    const { error } = await supabase.from('users').update(updateData).eq('id', userId);
    if (error) alert("خطأ: " + error.message);
    else {
      alert("✅ تم التحديث");
      closeModal();
      loadCurrentUser();
    }
  };
  
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  
  loadCurrentUser();
  loadStages();
  renderSchools();
</script>
</body>
</html>
