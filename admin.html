<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة السوبر أدمن</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
    .container { max-width: 1200px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
    button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
    button { background: #1e3c72; color: white; border: none; cursor: pointer; }
    button:hover { background: #0f2b4f; }
    .stage-card, .school-card { background: #eef2fa; padding: 15px; margin: 15px 0; border-radius: 12px; }
    .stage-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .grade-item { background: white; padding: 10px; margin: 10px 0; border-radius: 8px; }
    .subjects-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .subject-tag { background: #1e3c72; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 20px; border-radius: 20px; max-width: 500px; width: 90%; }
    @media (max-width: 600px) { button, input, select { width: 100%; margin: 5px 0; } .stage-header { flex-direction: column; text-align: center; } }
  </style>
</head>
<body>
<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px">
    <h1 style="margin:0">👑 لوحة التحكم العامة</h1>
    <div>
      <button onclick="window.location.href='index.html'" style="background:#28a745">🏠 الرئيسية</button>
      <button onclick="logout()" style="background:#dc3545">تسجيل خروج</button>
    </div>
  </div>
  
  <div style="background:#eef2fa; padding:15px; border-radius:12px; margin-bottom:20px">
    <h3>👤 المستخدم الحالي: <span id="currentUsername"></span></h3>
    <button onclick="showEditUserModal()" style="background:#ffc107; color:#333">✏️ تعديل بياناتي</button>
  </div>
  <hr>

  <h2>📚 إدارة المراحل الدراسية والصفوف والمواد</h2>
  <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin-bottom:20px">
    <button onclick="showAddStageModal()" style="background:#28a745">➕ إضافة مرحلة جديدة</button>
    <div id="stagesList"></div>
  </div>

  <h2>🏫 المدارس</h2>
  <button onclick="showAddSchoolModal()" style="background:#28a745; margin-bottom:10px">➕ إضافة مدرسة جديدة</button>
  <div id="schoolsList">جاري التحميل...</div>
</div>

<!-- نافذة إضافة مرحلة -->
<div id="addStageModal" class="modal">
  <div class="modal-content">
    <h3>➕ إضافة مرحلة جديدة</h3>
    <input type="text" id="stageName" placeholder="اسم المرحلة (مثال: ابتدائي)" style="width:100%; margin:10px 0">
    <div id="stageGradesContainer"></div>
    <button onclick="addGradeToStage()" style="background:#28a745; margin:5px 0">+ إضافة صف</button>
    <button onclick="saveStage()" style="background:#1e3c72">💾 حفظ المرحلة</button>
    <button onclick="closeModal('addStageModal')" style="background:#dc3545">إلغاء</button>
  </div>
</div>

<!-- نافذة تعديل مرحلة -->
<div id="editStageModal" class="modal">
  <div class="modal-content">
    <h3>✏️ تعديل المرحلة</h3>
    <input type="text" id="editStageName" placeholder="اسم المرحلة" style="width:100%; margin:10px 0">
    <div id="editStageGradesContainer"></div>
    <button onclick="addGradeToEditStage()" style="background:#28a745; margin:5px 0">+ إضافة صف</button>
    <button onclick="updateStage()" style="background:#1e3c72">💾 حفظ التغييرات</button>
    <button onclick="closeModal('editStageModal')" style="background:#dc3545">إلغاء</button>
  </div>
</div>

<!-- نافذة إضافة مدرسة -->
<div id="addSchoolModal" class="modal">
  <div class="modal-content">
    <h3>➕ إضافة مدرسة جديدة</h3>
    <input type="text" id="newSchoolName" placeholder="اسم المدرسة" style="width:100%; margin:10px 0">
    <select id="schoolStageSelect" style="width:100%; margin:10px 0">
      <option value="">-- اختر المرحلة --</option>
    </select>
    <input type="text" id="schoolUsername" placeholder="اسم مستخدم مدير المدرسة" style="width:100%; margin:10px 0">
    <input type="password" id="schoolPassword" placeholder="كلمة سر مدير المدرسة" style="width:100%; margin:10px 0">
    <button onclick="addSchool()" style="background:#1e3c72">➕ إضافة مدرسة</button>
    <button onclick="closeModal('addSchoolModal')" style="background:#dc3545">إلغاء</button>
  </div>
</div>

<!-- نافذة تعديل المستخدم -->
<div id="editUserModal" class="modal">
  <div class="modal-content">
    <h3>✏️ تعديل بيانات المستخدم</h3>
    <input type="text" id="editUsername" placeholder="اسم المستخدم الجديد" style="width:100%; margin:10px 0">
    <input type="password" id="editPassword" placeholder="كلمة المرور الجديدة" style="width:100%; margin:10px 0">
    <button onclick="updateUser()" style="background:#1e3c72">💾 حفظ</button>
    <button onclick="closeModal('editUserModal')" style="background:#dc3545">إلغاء</button>
  </div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  let currentUser = null;
  let currentStageId = null;
  let tempGrades = [];
  let tempEditGrades = [];
  
  const role = sessionStorage.getItem('userRole');
  const userId = sessionStorage.getItem('userId');
  if (role !== 'superAdmin') window.location.href = 'login.html';
  
  async function loadCurrentUser() {
    const { data: user } = await supabase.from('users').select('*').eq('id', userId).single();
    if (user) { currentUser = user; document.getElementById('currentUsername').innerText = user.username; }
  }
  
  async function loadStages() {
    const { data: stages } = await supabase.from('stages').select('*');
    const container = document.getElementById('stagesList');
    if (!stages || stages.length === 0) { container.innerHTML = '<p>لا توجد مراحل</p>'; return; }
    container.innerHTML = stages.map(stage => {
      const grades = typeof stage.grades === 'string' ? JSON.parse(stage.grades) : (stage.grades || []);
      return `
        <div class="stage-card">
          <div class="stage-header">
            <h3>📖 ${stage.name}</h3>
            <div>
              <button onclick="editStage(${stage.id}, '${stage.name}', '${encodeURIComponent(JSON.stringify(grades))}')" style="background:#ffc107; color:#333">✏️ تعديل</button>
              <button onclick="deleteStage(${stage.id})" style="background:#dc3545">🗑️ حذف</button>
            </div>
          </div>
          ${grades.map(g => `
            <div class="grade-item">
              <strong>🎓 ${g.grade}</strong>
              <div class="subjects-list">
                ${g.subjects.map(s => `<span class="subject-tag">${s}</span>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
    
    // تحديث قائمة المراحل في نافذة إضافة مدرسة
    const schoolStageSelect = document.getElementById('schoolStageSelect');
    schoolStageSelect.innerHTML = '<option value="">-- اختر المرحلة --</option>' + stages.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  }
  
  async function loadSchools() {
    const { data: schools } = await supabase.from('schools').select('*, stages(name)');
    const div = document.getElementById('schoolsList');
    if (!schools || schools.length === 0) { div.innerHTML = '<p>لا توجد مدارس</p>'; return; }
    div.innerHTML = schools.map(s => `
      <div class="school-card">
        <div>
          <strong>${s.name}</strong><br>
          <small>المرحلة: ${s.stages?.name || 'غير محدد'}</small>
        </div>
        <div>
          <button onclick="openSchool(${s.id})">👁️ فتح المدرسة</button>
          <button onclick="deleteSchool(${s.id})" style="background:#dc3545">🗑️ حذف</button>
        </div>
      </div>
    `).join('');
  }
  
  window.showAddStageModal = () => {
    tempGrades = [];
    document.getElementById('stageName').value = '';
    document.getElementById('stageGradesContainer').innerHTML = '';
    document.getElementById('addStageModal').style.display = 'flex';
  };
  
  window.addGradeToStage = () => {
    const container = document.getElementById('stageGradesContainer');
    const idx = tempGrades.length;
    container.innerHTML += `
      <div style="background:white; padding:10px; margin:10px 0; border-radius:8px" id="grade-${idx}">
        <input type="text" placeholder="اسم الصف (مثال: الصف الأول)" id="grade-name-${idx}" style="width:100%; margin-bottom:5px">
        <input type="text" placeholder="المواد (مفصولة بفواصل)" id="grade-subjects-${idx}" style="width:100%; margin-bottom:5px">
        <button onclick="removeGrade(${idx})" style="background:#dc3545">حذف الصف</button>
      </div>
    `;
    tempGrades.push({ grade: '', subjects: [] });
  };
  
  window.removeGrade = (idx) => {
    tempGrades.splice(idx, 1);
    document.getElementById('stageGradesContainer').innerHTML = '';
    tempGrades.forEach((_, i) => {
      const grade = tempGrades[i];
      document.getElementById('stageGradesContainer').innerHTML += `
        <div style="background:white; padding:10px; margin:10px 0; border-radius:8px" id="grade-${i}">
          <input type="text" placeholder="اسم الصف" id="grade-name-${i}" value="${grade.grade}" style="width:100%; margin-bottom:5px">
          <input type="text" placeholder="المواد (مفصولة بفواصل)" id="grade-subjects-${i}" value="${grade.subjects.join(', ')}" style="width:100%; margin-bottom:5px">
          <button onclick="removeGrade(${i})" style="background:#dc3545">حذف الصف</button>
        </div>
      `;
    });
  };
  
  window.saveStage = async () => {
    const name = document.getElementById('stageName').value.trim();
    if (!name) { alert("اسم المرحلة مطلوب"); return; }
    
    const grades = [];
    for (let i = 0; i < tempGrades.length; i++) {
      const gradeName = document.getElementById(`grade-name-${i}`)?.value.trim();
      const subjectsStr = document.getElementById(`grade-subjects-${i}`)?.value.trim();
      if (gradeName && subjectsStr) {
        grades.push({
          grade: gradeName,
          subjects: subjectsStr.split(',').map(s => s.trim())
        });
      }
    }
    
    if (grades.length === 0) { alert("أضف صف واحد على الأقل"); return; }
    
    const { error } = await supabase.from('stages').insert([{ name, grades: JSON.stringify(grades) }]);
    if (error) alert("خطأ: " + error.message);
    else { alert("✅ تمت إضافة المرحلة"); closeModal('addStageModal'); loadStages(); }
  };
  
  window.editStage = (id, name, gradesJson) => {
    currentStageId = id;
    document.getElementById('editStageName').value = name;
    const grades = JSON.parse(decodeURIComponent(gradesJson));
    tempEditGrades = grades;
    renderEditGrades();
    document.getElementById('editStageModal').style.display = 'flex';
  };
  
  function renderEditGrades() {
    const container = document.getElementById('editStageGradesContainer');
    container.innerHTML = '';
    tempEditGrades.forEach((grade, idx) => {
      container.innerHTML += `
        <div style="background:white; padding:10px; margin:10px 0; border-radius:8px">
          <input type="text" placeholder="اسم الصف" id="edit-grade-name-${idx}" value="${grade.grade}" style="width:100%; margin-bottom:5px">
          <input type="text" placeholder="المواد (مفصولة بفواصل)" id="edit-grade-subjects-${idx}" value="${grade.subjects.join(', ')}" style="width:100%; margin-bottom:5px">
          <button onclick="removeEditGrade(${idx})" style="background:#dc3545">حذف الصف</button>
        </div>
      `;
    });
  }
  
  window.addGradeToEditStage = () => {
    tempEditGrades.push({ grade: '', subjects: [] });
    renderEditGrades();
  };
  
  window.removeEditGrade = (idx) => {
    tempEditGrades.splice(idx, 1);
    renderEditGrades();
  };
  
  window.updateStage = async () => {
    const name = document.getElementById('editStageName').value.trim();
    if (!name) { alert("اسم المرحلة مطلوب"); return; }
    
    const grades = [];
    for (let i = 0; i < tempEditGrades.length; i++) {
      const gradeName = document.getElementById(`edit-grade-name-${i}`)?.value.trim();
      const subjectsStr = document.getElementById(`edit-grade-subjects-${i}`)?.value.trim();
      if (gradeName && subjectsStr) {
        grades.push({
          grade: gradeName,
          subjects: subjectsStr.split(',').map(s => s.trim())
        });
      }
    }
    
    const { error } = await supabase.from('stages').update({ name, grades: JSON.stringify(grades) }).eq('id', currentStageId);
    if (error) alert("خطأ: " + error.message);
    else { alert("✅ تم التحديث"); closeModal('editStageModal'); loadStages(); }
  };
  
  window.deleteStage = async (id) => {
    if (!confirm("حذف المرحلة سيؤثر على المدارس المرتبطة! استمر؟")) return;
    await supabase.from('stages').delete().eq('id', id);
    loadStages();
  };
  
  window.showAddSchoolModal = () => {
    document.getElementById('newSchoolName').value = '';
    document.getElementById('schoolUsername').value = '';
    document.getElementById('schoolPassword').value = '';
    document.getElementById('addSchoolModal').style.display = 'flex';
  };
  
  window.addSchool = async () => {
    const name = document.getElementById('newSchoolName').value.trim();
    const stageId = document.getElementById('schoolStageSelect').value;
    const username = document.getElementById('schoolUsername').value.trim();
    const password = document.getElementById('schoolPassword').value.trim();
    
    if (!name || !stageId || !username || !password) { alert("املأ جميع الحقول"); return; }
    
    const { data: stage } = await supabase.from('stages').select('grades').eq('id', stageId).single();
    const customSubjects = typeof stage.grades === 'string' ? JSON.parse(stage.grades) : (stage.grades || []);
    
    const { data: newSchool, error: schoolError } = await supabase.from('schools').insert([{ name, stage_id: stageId, custom_subjects: customSubjects }]).select().single();
    if (schoolError) { alert("خطأ: " + schoolError.message); return; }
    
    const { error: userError } = await supabase.from('users').insert([{ username, password, role: 'schoolAdmin', school_id: newSchool.id }]);
    if (userError) { await supabase.from('schools').delete().eq('id', newSchool.id); alert("خطأ: " + userError.message); return; }
    
    alert(`✅ تمت الإضافة!\n👤 اسم المستخدم: ${username}\n🔑 كلمة المرور: ${password}`);
    closeModal('addSchoolModal');
    loadSchools();
  };
  
  window.openSchool = (schoolId) => { sessionStorage.setItem('impersonatedSchoolId', schoolId); window.location.href = 'school-admin.html'; };
  window.deleteSchool = async (id) => { if (confirm("حذف المدرسة؟")) await supabase.from('schools').delete().eq('id', id); loadSchools(); };
  window.showEditUserModal = () => { document.getElementById('editUsername').value = currentUser?.username || ''; document.getElementById('editPassword').value = ''; document.getElementById('editUserModal').style.display = 'flex'; };
  window.updateUser = async () => { const newUsername = document.getElementById('editUsername').value.trim(); const newPassword = document.getElementById('editPassword').value.trim(); if (!newUsername) return alert("اسم المستخدم مطلوب"); const updateData = { username: newUsername }; if (newPassword) updateData.password = newPassword; await supabase.from('users').update(updateData).eq('id', userId); alert("✅ تم التحديث"); closeModal('editUserModal'); loadCurrentUser(); };
  window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  
  loadCurrentUser();
  loadStages();
  loadSchools();
</script>
</body>
</html>
