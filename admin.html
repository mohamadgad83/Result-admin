<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f7ff;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    h1, h2 {
      color: #1e3c72;
    }
    button, input, select {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    button {
      background: #1e3c72;
      color: white;
      cursor: pointer;
    }
    .school-item {
      background: #f5f5f5;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>👑 لوحة التحكم العامة</h1>
  <button onclick="logout()">تسجيل خروج</button>
  <hr>
  
  <h2>➕ إضافة مدرسة جديدة</h2>
  <input type="text" id="schoolName" placeholder="اسم المدرسة">
  <input type="text" id="adminUsername" placeholder="اسم مستخدم المدير">
  <input type="password" id="adminPassword" placeholder="كلمة سر المدير">
  <button onclick="addSchool()">إضافة مدرسة</button>
  
  <h2>🏫 المدارس</h2>
  <div id="schoolsList">جاري التحميل...</div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  async function loadSchools() {
    const { data: schools } = await supabase.from('schools').select('*');
    const div = document.getElementById('schoolsList');
    if (!schools || schools.length === 0) {
      div.innerHTML = 'لا توجد مدارس';
      return;
    }
    div.innerHTML = schools.map(s => `
      <div class="school-item">
        <span>${s.name}</span>
        <button onclick="openSchool(${s.id})">فتح المدرسة</button>
      </div>
    `).join('');
  }
  
  window.openSchool = (id) => {
    sessionStorage.setItem('impersonatedSchoolId', id);
    window.location.href = 'school-admin.html';
  };
  
  window.addSchool = async () => {
    const name = document.getElementById('schoolName').value;
    const username = document.getElementById('adminUsername').value;
    const password = document.getElementById('adminPassword').value;
    
    if (!name || !username || !password) {
      alert('املأ جميع الحقول');
      return;
    }
    
    // إضافة المدرسة
    const { data: school, error: schoolError } = await supabase
      .from('schools')
      .insert([{ name }])
      .select();
    
    if (schoolError) {
      alert('خطأ: ' + schoolError.message);
      return;
    }
    
    // إضافة المستخدم
    const { error: userError } = await supabase
      .from('users')
      .insert([{
        username: username,
        password: password,
        role: 'schoolAdmin',
        school_id: school[0].id
      }]);
    
    if (userError) {
      alert('خطأ في إضافة المستخدم: ' + userError.message);
      return;
    }
    
    alert(`✅ تمت الإضافة!\nاسم المستخدم: ${username}\nكلمة المرور: ${password}`);
    document.getElementById('schoolName').value = '';
    document.getElementById('adminUsername').value = '';
    document.getElementById('adminPassword').value = '';
    loadSchools();
  };
  
  window.logout = () => {
    sessionStorage.clear();
    window.location.href = 'login.html';
  };
  
  // التحقق من الجلسة
  const role = sessionStorage.getItem('userRole');
  if (role !== 'superAdmin') {
    window.location.href = 'login.html';
  }
  
  loadSchools();
</script>
</body>
</html>
