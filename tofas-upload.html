<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع نتائج توفاس</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: auto; }
        .upload-card {
            background: white;
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo { font-size: 55px; margin-bottom: 10px; }
        h1 { color: #1a2a6c; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 25px; font-size: 14px; }
        .format-box {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            text-align: right;
            font-size: 13px;
        }
        .format-box table { width: 100%; border-collapse: collapse; }
        .format-box td, .format-box th { padding: 6px; border-bottom: 1px solid #ddd; text-align: center; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 15px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.02); opacity: 0.95; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
        }
        .toast.error { background: #dc3545; }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .back-btn { background: #6c757d; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="upload-card">
        <div class="logo">📊</div>
        <h1>رفع نتائج اختبار توفاس</h1>
        <p class="subtitle">إدارة دشنا التعليمية - إدارة التعليم الثانوي</p>
        
        <div class="format-box">
            <strong>📋 تنسيق ملف Excel المطلوب:</strong>
            <table dir="ltr" style="margin-top:10px;">
                <tr><th>العمود</th><th>المحتوى</th></tr>
                <tr><td>A</td><td>كود الطالب</td></tr>
                <tr><td>B</td><td>الإجابات الصحيحة</td></tr>
                <tr><td>C</td><td>إجمالي الأسئلة</td></tr>
                <tr><td>D</td><td>النسبة المئوية</td></tr>
                <tr><td>E</td><td>النتيجة النهائية (ناجح/راسب)</td></tr>
                <tr><td>F</td><td>اسم المدرسة</td></tr>
                <tr><td>G</td><td>اسم الطالب</td></tr>
            </table>
            <p style="margin-top:10px; font-size:12px; color:#666;">⚠️ يتم أخذ النسبة والحالة من ملف Excel كما هما بدون أي تعديل</p>
        </div>
        
        <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">
        <button id="uploadBtn">📤 استيراد البيانات</button>
        <div id="result" style="margin-top:10px; font-size:13px;"></div>
        <button onclick="window.location.href='tofas-search.html'" class="back-btn" style="background:#28a745;">🔍 صفحة البحث عن النتيجة</button>
        <button onclick="window.location.href='index.html'" style="background:#6c757d; margin-top:10px;">🏠 الرئيسية</button>
    </div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';

  function showToast(msg, isErr = false) {
      let t = document.createElement('div');
      t.className = `toast ${isErr ? 'error' : ''}`;
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
  }

  document.getElementById('uploadBtn').onclick = async () => {
      let file = document.getElementById('excelFile').files[0];
      if (!file) { showToast("اختر ملف Excel أولاً", true); return; }

      let data = await file.arrayBuffer();
      let workbook = XLSX.read(data);
      let rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" });

      if (!rows || rows.length < 2) { showToast("الملف فارغ", true); return; }

      let success = 0, error = 0;
      let errorsList = [];

      for (let i = 1; i < rows.length; i++) {
          let row = rows[i];
          if (!row || row.length < 7) continue;

          let code = row[0]?.toString().trim();
          let correctAnswers = row[1]?.toString().trim();
          let totalQuestions = row[2]?.toString().trim();
          let percentageRaw = row[3];
          let finalResult = row[4]?.toString().trim();
          let schoolName = row[5]?.toString().trim();
          let studentName = row[6]?.toString().trim();

          if (!code || !studentName) { 
              error++; 
              errorsList.push(`الصف ${i+1}: كود أو اسم الطالب مفقود`);
              continue; 
          }
          
          // تحويل النسبة المئوية إلى رقم (بدون تعديل)
          let percentage = 0;
          if (percentageRaw !== undefined && percentageRaw !== null) {
              if (typeof percentageRaw === 'number') {
                  percentage = percentageRaw;
              } else {
                  let cleaned = percentageRaw.toString().replace('%', '').trim();
                  percentage = parseFloat(cleaned);
                  if (isNaN(percentage)) percentage = 0;
              }
          }
          
          // تحديد الحالة من الملف
          let status = finalResult === 'ناجح' || finalResult === 'نجاح' ? 'ناجح' : 'راسب';

          let { error: upsertError } = await supabase
              .from('tofas_results')
              .upsert({ 
                  student_code: code, 
                  student_name: studentName, 
                  percentage: percentage, 
                  status: status,
                  school_name: schoolName
              })
              .eq('student_code', code);

          if (upsertError) {
              error++;
              errorsList.push(`${code}: ${upsertError.message}`);
          } else {
              success++;
          }
      }

      if (error > 0) {
          console.log("أخطاء الاستيراد:", errorsList);
      }
      showToast(`✅ تم استيراد ${success} طالب${error ? `, ❌ فشل ${error}` : ''}`, error > 0);
      document.getElementById('result').innerHTML = `<span style="color:green;">✅ استوردت ${success} طالب${error ? ` - ❌ فشل ${error}` : ''}</span>`;
      document.getElementById('excelFile').value = '';
  };
</script>
</body>
</html>
