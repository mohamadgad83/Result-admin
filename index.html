<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتائج الطلاب</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    h1 { color: #1e3c72; text-align: center; margin-bottom: 20px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    select, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
    button { background: #1e3c72; color: white; border: none; cursor: pointer; }
    button:hover { background: #0f2b4f; }
    .card { background: #eef2fa; padding: 20px; border-radius: 15px; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #b0c4de; padding: 10px; text-align: center; }
    th { background: #cfe3ff; }
    @media (max-width: 600px) { .container { padding: 15px; } }
  </style>
</head>
<body>
<div class="container">
  <h1>🏫 نظام النتائج المدرسية</h1>
  <label>اختر المدرسة:</label>
  <select id="schoolSelect"></select>
  <div id="searchContainer">
    <label id="searchLabel">رقم الجلوس:</label>
    <input type="text" id="searchValue" placeholder="أدخل رقم الجلوس">
  </div>
  <button id="searchBtn">🔍 عرض النتيجة</button>
  <div id="resultCard"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';
  
  const schoolSelect = document.getElementById('schoolSelect');
  const searchValue = document.getElementById('searchValue');
  const searchLabel = document.getElementById('searchLabel');
  const searchBtn = document.getElementById('searchBtn');
  const resultDiv = document.getElementById('resultCard');
  
  let currentSchoolId = null;
  let currentSearchField = 'seat_number';
  let studentCustomFields = [];
  
  async function loadSchools() {
    const { data: schools } = await supabase.from('schools').select('id, name, search_field, search_field_label');
    schoolSelect.innerHTML = '<option value="">-- اختر مدرسة --</option>';
    schools.forEach(school => {
      const option = document.createElement('option');
      option.value = school.id;
      option.dataset.searchField = school.search_field || 'seat_number';
      option.dataset.searchLabel = school.search_field_label || 'رقم الجلوس';
      option.textContent = school.name;
      schoolSelect.appendChild(option);
    });
  }
  
  schoolSelect.addEventListener('change', async (e) => {
    const option = e.target.options[e.target.selectedIndex];
    currentSchoolId = option.value;
    if (!currentSchoolId) return;
    
    currentSearchField = option.dataset.searchField;
    const label = option.dataset.searchLabel;
    
    searchLabel.textContent = label + ':';
    searchValue.placeholder = `أدخل ${label}`;
    
    // جلب الحقول المخصصة للطالب في هذه المدرسة
    const { data: school } = await supabase.from('schools').select('student_custom_fields').eq('id', currentSchoolId).single();
    studentCustomFields = school?.student_custom_fields || [];
  });
  
  searchBtn.addEventListener('click', async () => {
    const searchId = searchValue.value.trim();
    if (!currentSchoolId || !searchId) {
      alert("يرجى اختيار المدرسة وإدخال بيانات البحث");
      return;
    }
    
    // البحث باستخدام الحقل المحدد من إعدادات المدرسة
    const { data: student } = await supabase
      .from('students')
      .select('*')
      .eq('school_id', currentSchoolId)
      .eq(currentSearchField, searchId)
      .single();
    
    if (!student) {
      resultDiv.innerHTML = "<p style='color:red;text-align:center'>⚠️ لا يوجد طالب بهذه البيانات</p>";
      return;
    }
    
    let html = `<div class="card"><h2>${student.name}</h2>`;
    
    // عرض حقل البحث المستخدم
    const fieldLabel = schoolSelect.options[schoolSelect.selectedIndex]?.dataset.searchLabel || 'رقم الجلوس';
    html += `<p><strong>${fieldLabel}:</strong> ${student[currentSearchField] || '-'}</p>`;
    html += `<p><strong>الصف:</strong> ${student.grade || '-'}</p>`;
    
    // عرض الحقول المخصصة للطالب
    if (studentCustomFields.length > 0) {
      html += `<h4>📋 بيانات إضافية</h4>`;
      studentCustomFields.forEach(field => {
        html += `<p><strong>${field.name}:</strong> ${student.custom_data?.[field.name] || '-'}</p>`;
      });
    }
    
    // عرض النتائج
    html += `<h4>📊 النتائج</h4><table border="1"><tr><th>المادة</th><th>الدرجة</th></tr>`;
    for (const [subject, score] of Object.entries(student.results || {})) {
      html += `<tr><td>${subject}</td><td>${score}</td></tr>`;
    }
    html += `</table><button onclick="window.print()" style="margin-top:15px">🖨️ طباعة</button></div>`;
    
    resultDiv.innerHTML = html;
  });
  
  loadSchools();
</script>
</body>
</html>
