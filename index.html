<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتائج الطلاب</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    h1 { color: #1e3c72; text-align: center; margin-bottom: 20px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    select, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
    button { background: #1e3c72; color: white; border: none; cursor: pointer; }
    button:hover { background: #0f2b4f; }
    .card { background: #eef2fa; padding: 20px; border-radius: 15px; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #b0c4de; padding: 10px; text-align: center; }
    th { background: #cfe3ff; }
    @media (max-width: 600px) { .container { padding: 15px; } }
  </style>
</head>
<body>
<div class="container">
  <h1>🏫 نظام النتائج المدرسية</h1>
  <label>اختر المدرسة:</label>
  <select id="schoolSelect"></select>
  <label>رقم الجلوس:</label>
  <input type="text" id="studentSeat" placeholder="أدخل رقم الجلوس">
  <button id="searchBtn">🔍 عرض النتيجة</button>
  <div id="resultCard"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';
  
  const schoolSelect = document.getElementById('schoolSelect');
  const studentSeat = document.getElementById('studentSeat');
  const searchBtn = document.getElementById('searchBtn');
  const resultDiv = document.getElementById('resultCard');
  
  let studentCustomFields = [];
  
  async function loadSchools() {
    const { data: schools } = await supabase.from('schools').select('id, name');
    schoolSelect.innerHTML = '<option value="">-- اختر مدرسة --</option>';
    schools.forEach(school => {
      const option = document.createElement('option');
      option.value = school.id;
      option.textContent = school.name;
      schoolSelect.appendChild(option);
    });
  }
  
  searchBtn.addEventListener('click', async () => {
    const schoolId = schoolSelect.value;
    const seat = studentSeat.value.trim();
    
    if (!schoolId || !seat) {
      alert("يرجى اختيار المدرسة وإدخال رقم الجلوس");
      return;
    }
    
    const { data: school } = await supabase.from('schools').select('student_custom_fields').eq('id', schoolId).single();
    studentCustomFields = school?.student_custom_fields || [];
    
    const { data: student } = await supabase
      .from('students')
      .select('*')
      .eq('school_id', schoolId)
      .eq('seat_number', seat)
      .single();
    
    if (!student) {
      resultDiv.innerHTML = "<p style='color:red;text-align:center'>⚠️ لا يوجد طالب بهذا الرقم</p>";
      return;
    }
    
    let html = `<div class="card"><h2>${student.name}</h2>`;
    html += `<p><strong>رقم الجلوس:</strong> ${student.seat_number}</p>`;
    html += `<p><strong>الصف:</strong> ${student.grade || '-'}</p>`;
    
    if (studentCustomFields.length > 0) {
      html += `<h4>📋 بيانات إضافية</h4>`;
      studentCustomFields.forEach(field => {
        html += `<p><strong>${field.name}:</strong> ${student.custom_data?.[field.name] || '-'}</p>`;
      });
    }
    
    html += `<h4>📊 النتائج</h4><table border="1"><tr><th>المادة</th><th>الدرجة</th></tr>`;
    for (const [subject, score] of Object.entries(student.results || {})) {
      html += `<tr><td>${subject}</td><td>${score}</td></tr>`;
    }
    html += `<table><button onclick="window.print()" style="margin-top:15px">🖨️ طباعة</button></div>`;
    
    resultDiv.innerHTML = html;
  });
  
  loadSchools();
</script>
</body>
</html>
