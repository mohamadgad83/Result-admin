<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتائج الطلاب</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>🏫 نظام النتائج المدرسية</h1>
  <label>اختر المدرسة:</label>
  <select id="schoolSelect"></select>
  <label id="identifierLabel">رقم الجلوس:</label>
  <input type="text" id="studentId" placeholder="أدخل رقم الطالب">
  <button id="searchBtn">🔍 عرض النتيجة</button>
  <div id="resultCard"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';

  const schoolSelect = document.getElementById('schoolSelect');
  const identifierLabel = document.getElementById('identifierLabel');
  const studentIdInput = document.getElementById('studentId');
  const searchBtn = document.getElementById('searchBtn');
  const resultDiv = document.getElementById('resultCard');

  async function loadSchools() {
    const { data: schools, error } = await supabase.from('schools').select('id, name, student_identifier_label, student_identifier_field, custom_grades');
    if (error) return console.error(error);
    schoolSelect.innerHTML = '<option value="">-- اختر مدرسة --</option>';
    schools.forEach(school => {
      const option = document.createElement('option');
      option.value = school.id;
      option.textContent = school.name;
      schoolSelect.appendChild(option);
    });
  }

  schoolSelect.addEventListener('change', async () => {
    const schoolId = schoolSelect.value;
    if (!schoolId) return;
    const { data: school, error } = await supabase.from('schools').select('student_identifier_label, student_identifier_field').eq('id', schoolId).single();
    if (error) return;
    identifierLabel.textContent = (school.student_identifier_label || "رقم الجلوس") + ":";
    studentIdInput.placeholder = `أدخل ${school.student_identifier_label || "رقم الجلوس"}`;
  });

  searchBtn.addEventListener('click', async () => {
    const schoolId = schoolSelect.value;
    const idValue = studentIdInput.value.trim();
    if (!schoolId || !idValue) {
      alert("يرجى اختيار المدرسة وإدخال رقم الطالب");
      return;
    }

    const { data: school, error: schoolError } = await supabase.from('schools').select('student_identifier_field, student_identifier_label, custom_grades').eq('id', schoolId).single();
    if (schoolError) return;

    const idField = school.student_identifier_field || "seat_number";
    const { data: students, error: studentsError } = await supabase
      .from('students')
      .select('*')
      .eq('school_id', schoolId)
      .eq(idField, idValue)
      .limit(1);

    if (studentsError || !students || students.length === 0) {
      resultDiv.innerHTML = "<p style='color:red;text-align:center'>⚠️ لا يوجد طالب بهذا الرقم</p>";
      return;
    }

    const student = students[0];
    const gradeId = student.grade_id;
    let subjects = [];
    if (school.custom_grades && Array.isArray(school.custom_grades)) {
      const grade = school.custom_grades.find(g => g.gradeId === gradeId);
      if (grade) subjects = grade.subjects;
    }

    let html = `<div class="card"><h2>${student.name}</h2>
      <p><strong>${school.student_identifier_label || "رقم الجلوس"}:</strong> ${student[idField]}</p>
      <table border="1"><tr><th>المادة</th><th>الدرجة</th></tr>`;
    subjects.forEach(sub => {
      let score = student.results?.[sub.subId] || "—";
      html += `<tr><td>${sub.name}</td><td>${score}</td><tr>`;
    });
    html += `</table></div>`;
    resultDiv.innerHTML = html;
  });

  loadSchools();
</script>
</body>
</html>
