<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام النتائج المدرسية</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    h1 { color: #1e3c72; margin-bottom: 10px; }
    .subtitle { color: #666; margin-bottom: 30px; }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }
    .btn-primary { background: #1e3c72; color: white; }
    .btn-primary:hover { background: #0f2b4f; }
    .btn-secondary { background: #28a745; color: white; }
    .btn-secondary:hover { background: #1e6b2f; }
  </style>
</head>
<body>
<div class="container">
  <h1>🏫 نظام النتائج المدرسية</h1>
  <p class="subtitle">نظام متكامل لإدارة النتائج لجميع المراحل الدراسية</p>
  <a href="login.html" class="btn btn-primary">🔐 تسجيل الدخول (للمدراء)</a>
  <a href="student-search.html" class="btn btn-secondary">🔍 عرض النتيجة (للطلاب)</a>
  <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; font-size: 12px; color: #999;">
    © 2025 نظام إدارة النتائج المدرسية
  </div>
</div>
<script>
  if (sessionStorage.getItem('userRole') === 'superAdmin') window.location.href = 'admin.html';
  else if (sessionStorage.getItem('userRole') === 'schoolAdmin') window.location.href = 'school-admin.html';
</script>
</body>
</html>
