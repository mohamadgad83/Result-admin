<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مدير المدرسة</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
        button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #1e3c72; color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0f2b4f; transform: scale(1.02); }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-info { background: #17a2b8; }
        .info-card { background: #eef2fa; border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .student-card { background: #eef2fa; padding: 15px; margin: 10px 0; border-radius: 12px; }
        .subject-score { background: white; border-radius: 8px; padding: 10px; margin: 8px 0; }
        .loading { display: none; text-align: center; padding: 20px; background: #eef2fa; border-radius: 12px; margin: 10px 0; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #28a745; color: white; padding: 12px; border-radius: 10px; text-align: center; z-index: 1000; animation: fadeOut 3s ease forwards; }
        .toast.error { background: #dc3545; }
        @keyframes fadeOut { 0% { opacity: 0; transform: translateY(20px); } 10% { opacity: 1; transform: translateY(0); } 90% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between" style="margin-bottom: 20px">
        <h1 style="margin:0">🏫 لوحة إدارة المدرسة</h1>
        <div>
            <button onclick="window.location.href='index.html'" class="btn-info">🏠 الرئيسية</button>
            <button onclick="window.location.href='student-search.html'" class="btn-success">🔍 عرض النتائج</button>
            <button onclick="logout()" class="btn-danger">🚪 خروج</button>
        </div>
    </div>
    
    <div id="schoolInfo"></div>
    
    <div class="info-card">
        <div class="flex-between">
            <select id="selectedGrade" style="flex:3">
                <option value="">-- اختر الصف --</option>
            </select>
            <button id="syncBtn" class="btn-info">🔄 مزامنة المواد من المرحلة</button>
        </div>
    </div>
    
    <div id="subjectsContainer"></div>
    
    <div class="flex-between" style="gap:20px; flex-wrap:wrap; margin: 20px 0">
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📥 تحميل قالب Excel</h3>
            <button id="downloadBtn" class="btn-info" style="width:100%">📥 تحميل القالب</button>
        </div>
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📤 رفع ملف Excel</h3>
            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" style="width:100%">
            <button id="uploadBtn" class="btn-success" style="width:100%; margin-top:10px">📊 استيراد البيانات</button>
            <div id="uploadResult" style="margin-top:10px; font-size:12px"></div>
        </div>
    </div>
    
    <h2>📚 قائمة الطلاب</h2>
    <div id="studentsList">جاري التحميل...</div>
    
    <div class="danger-zone" style="background:#fff5f5; border:1px solid #dc3545; border-radius:12px; padding:15px; margin-top:20px">
        <h3 style="color:#dc3545">⚠️ إدارة البيانات</h3>
        <div class="flex-between">
            <button id="clearResultsBtn" class="btn-danger">🗑️ مسح نتائج الصف الحالي</button>
            <button id="deleteStudentsBtn" class="btn-danger">💀 حذف طلاب الصف الحالي</button>
            <button id="exportBtn" class="btn-info">📥 تصدير النتائج</button>
        </div>
    </div>
    
    <div class="loading" id="loadingIndicator">⏳ جاري المعالجة...</div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  let schoolId = sessionStorage.getItem('userSchoolId') || sessionStorage.getItem('impersonatedSchoolId');
  if (!schoolId) window.location.href = 'login.html';
  
  let schoolData = null;
  let schoolSubjects = [];
  let subjectFields = {};
  let currentGrade = '';
  let currentGradeId = null;
  let availableGrades = [];
  
  function showToast(msg, isErr = false) {
      let t = document.createElement('div');
      t.className = `toast ${isErr ? 'error' : ''}`;
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
  }
  
  async function loadSchool() {
      let { data: school } = await supabase.from('schools').select('*').eq('id', schoolId).single();
      if (!school) return;
      schoolData = school;
      document.getElementById('schoolInfo').innerHTML = `<h2>🏫 ${school.name}</h2>`;
      
      // تحميل الصفوف من جدول grades
      let { data: grades } = await supabase.from('grades').select('*').eq('stage_id', 1);
      if (grades) {
          availableGrades = grades;
          let gradeSelect = document.getElementById('selectedGrade');
          gradeSelect.innerHTML = '<option value="">-- اختر الصف --</option>' + grades.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
      }
      
      document.getElementById('selectedGrade').onchange = () => {
          currentGradeId = document.getElementById('selectedGrade').value;
          if (currentGradeId) {
              let grade = availableGrades.find(g => g.id == currentGradeId);
              if (grade) {
                  currentGrade = grade.name;
                  let subjects = grade.subjects || [];
                  schoolSubjects = subjects;
                  subjectFields = {};
                  subjects.forEach(sub => { subjectFields[sub.name] = sub.fields || ['أعمال سنة', 'امتحان نهائي']; });
                  renderSubjects();
                  loadStudents();
              }
          } else {
              document.getElementById('subjectsContainer').innerHTML = '';
          }
      };
  }
  
  function renderSubjects() {
      let container = document.getElementById('subjectsContainer');
      if (schoolSubjects.length === 0) {
          container.innerHTML = '<div class="info-card"><p style="color:#dc3545">⚠️ لا توجد مواد لهذا الصف. قم بمزامنة المواد من المرحلة أولاً</p></div>';
          return;
      }
      
      container.innerHTML = `
          <div class="info-card">
              <h3>📚 مواد الصف ${currentGrade}</h3>
              ${schoolSubjects.map(sub => {
                  let fields = sub.fields || ['أعمال سنة', 'امتحان نهائي'];
                  return `
                      <div style="background:white; border-radius:10px; padding:10px; margin:10px 0">
                          <strong>📖 ${sub.name}</strong>
                          <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px">
                              ${fields.map(f => `<span style="background:#1e3c72; color:white; padding:4px 12px; border-radius:20px; font-size:12px">${f}</span>`).join('')}
                          </div>
                      </div>
                  `;
              }).join('')}
          </div>
      `;
  }
  
  // مزامنة المواد من المرحلة (من جدول grades)
  document.getElementById('syncBtn').onclick = async () => {
      if (!confirm("سيتم مزامنة المواد من المرحلة الأساسية. استمر؟")) return;
      showToast("جاري مزامنة المواد...");
      
      // جلب المواد من جدول grades
      let { data: grades } = await supabase.from('grades').select('*');
      if (!grades || grades.length === 0) {
          showToast("لا توجد مواد في المرحلة الأساسية", true);
          return;
      }
      
      // تحديث جدول grades في المدرسة
      for (let grade of grades) {
          let { error } = await supabase
              .from('grades')
              .update({ subjects: grade.subjects })
              .eq('id', grade.id);
          if (error) console.error("خطأ في تحديث grade:", error);
      }
      
      // تحديث المتغيرات المحلية
      availableGrades = grades;
      let gradeSelect = document.getElementById('selectedGrade');
      gradeSelect.innerHTML = '<option value="">-- اختر الصف --</option>' + grades.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
      
      if (currentGradeId) {
          let grade = grades.find(g => g.id == currentGradeId);
          if (grade) {
              currentGrade = grade.name;
              schoolSubjects = grade.subjects || [];
              subjectFields = {};
              schoolSubjects.forEach(sub => { subjectFields[sub.name] = sub.fields || ['أعمال سنة', 'امتحان نهائي']; });
              renderSubjects();
          }
      }
      
      showToast("✅ تمت مزامنة المواد بنجاح");
  };
  
  // تحميل القالب
  document.getElementById('downloadBtn').onclick = () => {
      if (!currentGrade) { showToast("اختر الصف أولاً", true); return; }
      if (schoolSubjects.length === 0) { showToast("لا توجد مواد لهذا الصف. قم بالمزامنة أولاً", true); return; }
      
      let headers = ["اسم الطالب", "رقم الجلوس", "الكود", "الرقم القومي"];
      schoolSubjects.forEach(subject => {
          let fields = subject.fields || ['أعمال سنة', 'امتحان نهائي'];
          fields.forEach(field => { headers.push(`${subject.name} (${field})`); });
      });
      
      let sheetData = [headers];
      let exampleRow = ["مثال: أحمد محمد", "101", "A123", "12345678901234"];
      schoolSubjects.forEach(() => { exampleRow.push(""); });
      sheetData.push(exampleRow);
      
      for (let i = 0; i < 15; i++) {
          let emptyRow = ["", "", "", ""];
          schoolSubjects.forEach(() => { emptyRow.push(""); });
          sheetData.push(emptyRow);
      }
      
      let ws = XLSX.utils.aoa_to_sheet(sheetData);
      ws['!cols'] = headers.map(() => ({ wch: 18 }));
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `قالب_${currentGrade}`);
      XLSX.writeFile(wb, `قالب_استيراد_${currentGrade}_${new Date().toISOString().slice(0,10)}.xlsx`);
      showToast("✅ تم تحميل القالب");
  };
  
  // استيراد البيانات
  document.getElementById('uploadBtn').onclick = async () => {
      let file = document.getElementById('excelFile').files[0];
      if (!file) { showToast("اختر ملف Excel أولاً", true); return; }
      if (!currentGradeId) { showToast("اختر الصف أولاً", true); return; }
      if (schoolSubjects.length === 0) { showToast("لا توجد مواد لهذا الصف. قم بالمزامنة أولاً", true); return; }
      
      document.getElementById('loadingIndicator').style.display = 'block';
      
      try {
          let data = await file.arrayBuffer();
          let workbook = XLSX.read(data);
          let rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" });
          
          let successCount = 0, errorCount = 0;
          
          for (let i = 2; i < rows.length; i++) {
              let row = rows[i];
              if (!row || !row[0] || !row[1]) continue;
              
              let name = row[0]?.toString().trim();
              let seat = row[1]?.toString().trim();
              let code = row[2]?.toString().trim() || null;
              let nationalId = row[3]?.toString().trim() || null;
              
              if (!name || !seat) { errorCount++; continue; }
              
              // البحث عن الطالب
              let { data: existingStudent } = await supabase
                  .from('student_results')
                  .select('id')
                  .eq('school_id', schoolId)
                  .eq('seat_number', seat)
                  .maybeSingle();
              
              let scores = {};
              let colIndex = 4;
              for (let s = 0; s < schoolSubjects.length; s++) {
                  let subject = schoolSubjects[s].name;
                  let fields = schoolSubjects[s].fields || ['أعمال سنة', 'امتحان نهائي'];
                  let subjectScores = {};
                  for (let f = 0; f < fields.length; f++) {
                      let value = parseFloat(row[colIndex + f]) || 0;
                      subjectScores[fields[f]] = value;
                  }
                  scores[subject] = subjectScores;
                  colIndex += fields.length;
              }
              
              if (!existingStudent) {
                  await supabase.from('student_results').insert([{
                      school_id: schoolId,
                      student_name: name,
                      seat_number: seat,
                      code: code,
                      national_id: nationalId,
                      grade_id: currentGradeId,
                      scores: scores
                  }]);
              } else {
                  await supabase.from('student_results').update({
                      student_name: name,
                      code: code,
                      national_id: nationalId,
                      scores: scores,
                      updated_at: new Date()
                  }).eq('id', existingStudent.id);
              }
              successCount++;
          }
          
          showToast(`✅ تم استيراد ${successCount} طالب`, errorCount > 0);
          document.getElementById('excelFile').value = '';
          loadStudents();
      } catch (err) {
          console.error(err);
          showToast("❌ خطأ: " + err.message, true);
      } finally {
          document.getElementById('loadingIndicator').style.display = 'none';
      }
  };
  
  async function loadStudents() {
      if (!currentGradeId) { document.getElementById('studentsList').innerHTML = '<p>اختر الصف أولاً</p>'; return; }
      
      let { data: students } = await supabase
          .from('student_results')
          .select('*')
          .eq('school_id', schoolId)
          .eq('grade_id', currentGradeId);
      
      let container = document.getElementById('studentsList');
      if (!students?.length) { container.innerHTML = '<p>لا يوجد طلاب في هذا الصف</p>'; return; }
      
      container.innerHTML = students.map(s => {
          let scores = s.scores || {};
          return `
              <div class="student-card">
                  <div class="flex-between">
                      <div>
                          <strong>${s.student_name}</strong><br>
                          <small>رقم الجلوس: ${s.seat_number} | الكود: ${s.code || '-'}</small>
                      </div>
                      <div>
                          <button onclick="viewStudentResult('${s.id}')" class="btn-info">📊 عرض النتيجة</button>
                          <button onclick="deleteStudent(${s.id})" class="btn-danger">🗑️ حذف</button>
                      </div>
                  </div>
                  ${Object.entries(scores).map(([subject, subjectScores]) => `
                      <div class="subject-score">
                          <strong>${subject}:</strong> ${Object.entries(subjectScores).map(([k,v]) => `${k}: ${v}`).join(' | ')}
                      </div>
                  `).join('')}
              </div>
          `;
      }).join('');
  }
  
  window.viewStudentResult = (studentId) => { sessionStorage.setItem('viewStudentId', studentId); window.open('student-result.html', '_blank'); };
  window.deleteStudent = async (id) => { if (confirm("حذف الطالب؟")) { await supabase.from('student_results').delete().eq('id', id); loadStudents(); } };
  
  document.getElementById('clearResultsBtn').onclick = async () => { if (confirm(`مسح نتائج الصف ${currentGrade}؟`)) { await supabase.from('student_results').update({ scores: {} }).eq('school_id', schoolId).eq('grade_id', currentGradeId); showToast("✅ تم مسح النتائج"); loadStudents(); } };
  document.getElementById('deleteStudentsBtn').onclick = async () => { if (confirm(`حذف جميع طلاب الصف ${currentGrade}؟`)) { await supabase.from('student_results').delete().eq('school_id', schoolId).eq('grade_id', currentGradeId); showToast("✅ تم الحذف"); loadStudents(); } };
  document.getElementById('exportBtn').onclick = async () => { let { data: students } = await supabase.from('student_results').select('*').eq('school_id', schoolId); if (!students?.length) return; let headers = ['الاسم', 'رقم الجلوس', 'الكود', 'الصف', 'المادة', 'التفاصيل']; let rows = [headers]; for (let s of students) { let scores = s.scores || {}; for (let [subject, subjectScores] of Object.entries(scores)) { let details = Object.entries(subjectScores).map(([k,v]) => `${k}: ${v}`).join(' | '); rows.push([s.student_name, s.seat_number, s.code || '', s.grade_id || '', subject, details]); } } let ws = XLSX.utils.aoa_to_sheet(rows); let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'نتائج'); XLSX.writeFile(wb, `نتائج_${new Date().toISOString().slice(0,10)}.xlsx`); showToast("✅ تم التصدير"); };
  
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  
  loadSchool();
</script>
</body>
</html>
