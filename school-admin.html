<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة مدير المدرسة</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
    .container { max-width: 1000px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
    button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
    button { background: #1e3c72; color: white; border: none; cursor: pointer; }
    button:hover { background: #0f2b4f; }
    .student-card { background: #eef2fa; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .grade-selector { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
    @media (max-width: 600px) { .student-card { flex-direction: column; text-align: center; } button, input, select { width: 100%; margin: 5px 0; } }
  </style>
</head>
<body>
<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px">
    <h1 style="margin:0">🏫 لوحة إدارة المدرسة</h1>
    <div>
      <button onclick="window.location.href='index.html'" style="background:#28a745">🏠 الرئيسية</button>
      <button onclick="logout()" style="background:#dc3545">تسجيل خروج</button>
    </div>
  </div>
  
  <div id="schoolInfo"></div>
  <div id="subjectsContainer" style="background:#eef2fa; padding:15px; border-radius:12px; margin:10px 0"></div>
  <hr>

  <h2>📥 تحميل قالب Excel جاهز</h2>
  <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
    <p>اختر الصف لتحميل قالب Excel جاهز يحتوي على المواد المحددة لهذا الصف:</p>
    <div class="grade-selector" id="gradeSelector"></div>
    <button id="downloadTemplateBtn" style="background:#17a2b8">📥 تحميل قالب Excel للصف المختار</button>
  </div>

  <h2>📤 رفع ملف Excel بعد التعبئة</h2>
  <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
    <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
    <button onclick="uploadExcel()" style="background:#28a745">📊 رفع الملف واستيراد</button>
    <div id="uploadResult"></div>
  </div>
  
  <h2>➕ إضافة طالب جديد</h2>
  <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
    <input type="text" id="studentName" placeholder="اسم الطالب" style="width:100%; margin-bottom:10px">
    <input type="text" id="studentSeat" placeholder="رقم الجلوس" style="width:100%; margin-bottom:10px">
    <select id="studentGrade" style="width:100%; margin-bottom:10px"></select>
    <button onclick="addStudent()">➕ إضافة طالب</button>
  </div>
  
  <h2>📝 إضافة نتيجة لطالب</h2>
  <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
    <input type="text" id="resultSeat" placeholder="رقم الجلوس" style="width:100%; margin-bottom:10px">
    <select id="resultSubject" style="width:100%; margin-bottom:10px"></select>
    <input type="number" id="resultScore" placeholder="الدرجة" style="width:100%; margin-bottom:10px">
    <button onclick="addResult()">📝 إضافة نتيجة</button>
  </div>
  
  <h2>📚 قائمة الطلاب</h2>
  <div id="studentsList">جاري التحميل...</div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  let schoolId = sessionStorage.getItem('userSchoolId');
  const impersonatedId = sessionStorage.getItem('impersonatedSchoolId');
  if (impersonatedId) schoolId = impersonatedId;
  if (!schoolId) window.location.href = 'login.html';
  
  let schoolSubjects = [];
  let schoolGrades = [];
  let selectedGrade = '';
  
  async function loadSchool() {
    const { data: school } = await supabase.from('schools').select('*, stages(name)').eq('id', schoolId).single();
    document.getElementById('schoolInfo').innerHTML = `<h2>🏫 ${school?.name}</h2><p>المرحلة: ${school?.stages?.name}</p>`;
    
    if (school.custom_subjects && school.custom_subjects.length > 0) {
      schoolSubjects = school.custom_subjects;
      schoolGrades = [...new Set(schoolSubjects.map(s => s.grade))];
      
      let subjectsHtml = '<h3>📚 المواد المتاحة حسب الصف</h3>';
      schoolGrades.forEach(grade => {
        const subjects = schoolSubjects.filter(s => s.grade === grade).map(s => s.subject);
        subjectsHtml += `<div><strong>${grade}:</strong> ${subjects.join(' - ')}</div>`;
      });
      document.getElementById('subjectsContainer').innerHTML = subjectsHtml;
      
      // تعبئة قائمة الصفوف
      const gradeSelect = document.getElementById('studentGrade');
      gradeSelect.innerHTML = schoolGrades.map(g => `<option value="${g}">${g}</option>`).join('');
      
      const subjectSelect = document.getElementById('resultSubject');
      const allSubjects = [...new Set(schoolSubjects.map(s => s.subject))];
      subjectSelect.innerHTML = allSubjects.map(s => `<option value="${s}">${s}</option>`).join('');
      
      // تعبئة محدد الصف لتحميل القالب
      const gradeSelector = document.getElementById('gradeSelector');
      gradeSelector.innerHTML = schoolGrades.map(g => `
        <label style="margin-left:10px"><input type="radio" name="templateGrade" value="${g}"> ${g}</label>
      `).join('');
    }
  }
  
  // تحميل قالب Excel جاهز
  document.getElementById('downloadTemplateBtn').onclick = () => {
    const selected = document.querySelector('input[name="templateGrade"]:checked');
    if (!selected) { alert("اختر الصف أولاً"); return; }
    const grade = selected.value;
    const subjects = schoolSubjects.filter(s => s.grade === grade).map(s => s.subject);
    
    // إنشاء قالب Excel
    const headers = ['اسم الطالب', 'رقم الجلوس', ...subjects];
    const wsData = [headers];
    // إضافة صف فارغ كمثال
    wsData.push(['مثال: أحمد محمد', '123', ...subjects.map(() => '')]);
    
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, `قالب_${grade}`);
    XLSX.writeFile(wb, `قالب_${grade}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };
  
  // استيراد Excel بعد التعبئة
  window.uploadExcel = async () => {
    const file = document.getElementById('excelFile').files[0];
    if (!file) return alert("اختر ملف أولاً");
    
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
    
    if (rows.length < 2) return alert("الملف فارغ");
    
    const headers = rows[0].map(h => h?.toString().trim() || '');
    const nameIdx = 0;
    const seatIdx = 1;
    const subjectStartIdx = 2;
    
    let successCount = 0, errorCount = 0;
    
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const name = row[nameIdx]?.toString().trim();
      const seat = row[seatIdx]?.toString().trim();
      if (!name || !seat) { errorCount++; continue; }
      
      // البحث عن الطالب أو إضافته
      let { data: student } = await supabase
        .from('students')
        .select('id, results')
        .eq('school_id', schoolId)
        .eq('seat_number', seat)
        .single();
      
      if (!student) {
        const { data: newStudent, error } = await supabase
          .from('students')
          .insert([{ school_id: schoolId, name, seat_number: seat, results: {} }])
          .select()
          .single();
        if (error) { errorCount++; continue; }
        student = newStudent;
      }
      
      // إضافة النتائج
      const newResults = { ...(student.results || {}) };
      for (let j = subjectStartIdx; j < headers.length; j++) {
        const subject = headers[j];
        const score = parseFloat(row[j]);
        if (subject && !isNaN(score)) {
          newResults[subject] = score;
        }
      }
      
      const { error } = await supabase
        .from('students')
        .update({ results: newResults })
        .eq('id', student.id);
      
      if (error) errorCount++;
      else successCount++;
    }
    
    alert(`✅ تم استيراد ${successCount} طالب\n❌ فشل ${errorCount}`);
    document.getElementById('excelFile').value = '';
    loadStudents();
  };
  
  async function loadStudents() {
    const { data: students } = await supabase.from('students').select('*').eq('school_id', schoolId);
    const div = document.getElementById('studentsList');
    if (!students || students.length === 0) { div.innerHTML = '<p>لا يوجد طلاب</p>'; return; }
    div.innerHTML = students.map(s => `
      <div class="student-card">
        <div>
          <strong>${s.name}</strong><br>
          <small>رقم الجلوس: ${s.seat_number || '-'}</small><br>
          <small>النتائج: ${Object.entries(s.results || {}).map(([k,v]) => `${k}: ${v}`).join(' | ') || 'لا توجد نتائج'}</small>
        </div>
        <button onclick="deleteStudent(${s.id})" style="background:#dc3545">🗑️ حذف</button>
      </div>
    `).join('');
  }
  
  window.addStudent = async () => {
    const name = document.getElementById('studentName').value.trim();
    const seat = document.getElementById('studentSeat').value.trim();
    const grade = document.getElementById('studentGrade').value;
    if (!name || !seat || !grade) return alert("املأ الحقول");
    const { error } = await supabase.from('students').insert([{ school_id: schoolId, name, seat_number: seat, grade, results: {} }]);
    if (error) alert("خطأ: " + error.message);
    else { alert("✅ تمت الإضافة"); document.getElementById('studentName').value = ''; document.getElementById('studentSeat').value = ''; loadStudents(); }
  };
  
  window.addResult = async () => {
    const seat = document.getElementById('resultSeat').value.trim();
    const subject = document.getElementById('resultSubject').value;
    const score = parseInt(document.getElementById('resultScore').value);
    if (!seat || !subject || isNaN(score)) return alert("املأ الحقول");
    const { data: student } = await supabase.from('students').select('id, results').eq('school_id', schoolId).eq('seat_number', seat).single();
    if (!student) return alert("لا يوجد طالب بهذا الرقم");
    const newResults = { ...(student.results || {}), [subject]: score };
    await supabase.from('students').update({ results: newResults }).eq('id', student.id);
    alert("✅ تمت إضافة النتيجة");
    document.getElementById('resultSeat').value = ''; document.getElementById('resultScore').value = '';
    loadStudents();
  };
  
  window.deleteStudent = async (id) => { if (confirm("هل أنت متأكد؟")) { await supabase.from('students').delete().eq('id', id); loadStudents(); } };
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  
  loadSchool();
  loadStudents();
</script>
</body>
</html>
