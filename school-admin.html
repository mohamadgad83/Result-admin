<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مدير المدرسة - النظام المتكامل</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
        button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #1e3c72; color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0f2b4f; transform: scale(1.02); }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-info { background: #17a2b8; }
        .card { background: #f8f9fa; border-radius: 12px; padding: 15px; margin: 10px 0; }
        .grade-box { background: #eef2fa; border-radius: 12px; padding: 15px; margin: 15px 0; border-right: 4px solid #1e3c72; }
        .subject-item { background: white; border-radius: 10px; padding: 10px; margin: 8px 0; }
        .subject-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .fields-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .field-tag { background: #1e3c72; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .student-card { background: #eef2fa; padding: 15px; margin: 10px 0; border-radius: 12px; }
        .subject-score { background: white; border-radius: 8px; padding: 10px; margin: 8px 0; }
        .loading { display: none; text-align: center; padding: 20px; background: #eef2fa; border-radius: 12px; margin: 10px 0; }
        .danger-zone { background: #fff5f5; border: 1px solid #dc3545; border-radius: 12px; padding: 15px; margin: 15px 0; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 10px; text-align: center; z-index: 1000; animation: fadeInOut 3s ease; }
        @keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; max-width: 500px; width: 90%; }
        @media (max-width: 768px) { button, input, select { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between" style="margin-bottom: 20px">
        <h1 style="margin:0">🏫 لوحة إدارة المدرسة</h1>
        <div>
            <button onclick="window.location.href='index.html'" class="btn-info">🏠 الرئيسية</button>
            <button onclick="window.location.href='student-search.html'" class="btn-success">🔍 عرض النتائج</button>
            <button onclick="logout()" class="btn-danger">🚪 خروج</button>
        </div>
    </div>
    
    <div id="schoolInfo"></div>
    
    <!-- اختيار الصف -->
    <div class="card">
        <h3>📚 اختر الصف الدراسي</h3>
        <select id="selectedGrade" style="width:100%">
            <option value="">-- اختر الصف --</option>
        </select>
    </div>
    
    <!-- عرض المواد حسب الصف -->
    <div id="subjectsContainer" style="margin: 15px 0"></div>
    
    <!-- تحميل ورفع Excel -->
    <div class="flex-between" style="gap:20px; flex-wrap:wrap; margin: 20px 0">
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📥 تحميل قالب Excel</h3>
            <button id="downloadTemplateBtn" class="btn-info" style="width:100%">📥 تحميل القالب</button>
        </div>
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📤 رفع ملف Excel</h3>
            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" style="width:100%">
            <button id="uploadExcelBtn" class="btn-success" style="width:100%; margin-top:10px">📊 استيراد البيانات</button>
            <div id="uploadResult" style="margin-top:10px; font-size:12px; color:#666"></div>
        </div>
    </div>
    
    <!-- إضافة طالب -->
    <h2>➕ إضافة طالب</h2>
    <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
        <div class="flex-between">
            <input type="text" id="studentName" placeholder="الاسم" style="flex:2">
            <input type="text" id="studentSeat" placeholder="رقم الجلوس" style="flex:1">
        </div>
        <div class="flex-between">
            <input type="text" id="studentCode" placeholder="الكود" style="flex:1">
            <input type="text" id="studentNationalId" placeholder="الرقم القومي" style="flex:2">
        </div>
        <button onclick="addStudent()" class="btn-success">➕ إضافة طالب</button>
    </div>
    
    <!-- إضافة نتيجة -->
    <h2>📝 إضافة نتيجة لطالب</h2>
    <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
        <input type="text" id="resultSeat" placeholder="رقم الجلوس" style="width:100%">
        <select id="resultSubject" style="width:100%"></select>
        <div id="resultFieldsContainer" class="flex-between" style="margin:10px 0"></div>
        <button onclick="addResult()" class="btn-success">📝 إضافة نتيجة</button>
    </div>
    
    <!-- قائمة الطلاب -->
    <h2>📚 قائمة الطلاب</h2>
    <div id="studentsList">جاري التحميل...</div>
    
    <!-- منطقة الحذف -->
    <div class="danger-zone">
        <h3 style="color:#dc3545">⚠️ منطقة حذف البيانات</h3>
        <div class="flex-between">
            <button onclick="clearAllStudentResults()" class="btn-danger">🗑️ مسح نتائج جميع الطلاب</button>
            <button onclick="deleteAllStudents()" class="btn-danger">💀 حذف جميع الطلاب نهائياً</button>
            <button onclick="exportSchoolResults()" class="btn-info">📥 تصدير نتائج المدرسة</button>
        </div>
    </div>
    
    <div class="loading" id="loadingIndicator">⏳ جاري المعالجة...</div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  let schoolId = sessionStorage.getItem('userSchoolId') || sessionStorage.getItem('impersonatedSchoolId');
  if (!schoolId) window.location.href = 'login.html';
  
  let schoolData = null;
  let schoolSubjects = [];
  let schoolGrades = [];
  let subjectFields = {};
  let currentGrade = '';
  let studentCustomFields = [];
  
  function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.background = type === 'error' ? '#dc3545' : '#28a745';
      toast.innerText = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
  }
  
  async function loadSchool() {
      const { data: school } = await supabase.from('schools').select('*, stages(name)').eq('id', schoolId).single();
      if (!school) return;
      schoolData = school;
      document.getElementById('schoolInfo').innerHTML = `<h2>🏫 ${school.name}</h2><p>المرحلة: ${school.stages?.name}</p>`;
      
      studentCustomFields = school.student_custom_fields || [];
      schoolSubjects = school.custom_subjects || [];
      subjectFields = school.subject_fields || {};
      
      // استخراج الصفوف الفريدة
      schoolGrades = [...new Set(schoolSubjects.map(s => s.grade))];
      
      const gradeSelect = document.getElementById('selectedGrade');
      gradeSelect.innerHTML = '<option value="">-- اختر الصف --</option>' + schoolGrades.map(g => `<option value="${g}">${g}</option>`).join('');
      
      gradeSelect.onchange = () => {
          currentGrade = gradeSelect.value;
          if (currentGrade) {
              renderSubjectsByGrade();
              loadStudents();
          } else {
              document.getElementById('subjectsContainer').innerHTML = '';
          }
      };
      
      await loadStudents();
  }
  
  function renderSubjectsByGrade() {
      const subjects = schoolSubjects.filter(s => s.grade === currentGrade);
      const container = document.getElementById('subjectsContainer');
      if (subjects.length === 0) {
          container.innerHTML = '<div class="card"><p style="color:#dc3545">⚠️ لا توجد مواد لهذا الصف</p></div>';
          return;
      }
      
      container.innerHTML = `
          <div class="card">
              <h3>📚 مواد الصف ${currentGrade}</h3>
              ${subjects.map(sub => {
                  const fields = subjectFields[sub.subject] || ['أعمال سنة', 'امتحان نهائي'];
                  return `
                      <div class="subject-item">
                          <div class="subject-header">
                              <strong>📖 ${sub.subject}</strong>
                          </div>
                          <div class="fields-list">
                              ${fields.map(f => `<span class="field-tag">${f}</span>`).join('')}
                          </div>
                      </div>
                  `;
              }).join('')}
          </div>
      `;
      
      // تحديث قائمة المواد في نموذج إضافة نتيجة
      const subjectSelect = document.getElementById('resultSubject');
      subjectSelect.innerHTML = subjects.map(s => `<option value="${s.subject}">${s.subject}</option>`).join('');
      subjectSelect.onchange = () => renderResultFields();
      renderResultFields();
  }
  
  function renderResultFields() {
      const subject = document.getElementById('resultSubject').value;
      const fields = subjectFields[subject] || ['أعمال سنة', 'امتحان نهائي'];
      const container = document.getElementById('resultFieldsContainer');
      container.innerHTML = fields.map((field, idx) => `
          <div style="flex:1">
              <label style="font-size:12px">${field}</label>
              <input type="number" id="resultField_${idx}" placeholder="${field}" style="width:100%">
          </div>
      `).join('');
  }
  
  window.downloadTemplate = () => {
      if (!currentGrade) { showToast("اختر الصف أولاً", 'error'); return; }
      
      const subjects = schoolSubjects.filter(s => s.grade === currentGrade);
      if (subjects.length === 0) { showToast("لا توجد مواد لهذا الصف", 'error'); return; }
      
      const headers = ["اسم الطالب", "رقم الجلوس", "الكود", "الرقم القومي"];
      subjects.forEach(subject => {
          const fields = subjectFields[subject.subject] || ['أعمال سنة', 'امتحان نهائي'];
          fields.forEach(field => { headers.push(`${subject.subject} (${field})`); });
      });
      if (studentCustomFields.length > 0) studentCustomFields.forEach(f => headers.push(f.name));
      
      const sheetData = [headers];
      let exampleRow = ["مثال: أحمد محمد", "101", "A123", "12345678901234"];
      subjects.forEach(subject => {
          const fields = subjectFields[subject.subject] || ['أعمال سنة', 'امتحان نهائي'];
          fields.forEach(() => { exampleRow.push(""); });
      });
      if (studentCustomFields.length > 0) studentCustomFields.forEach(() => exampleRow.push(""));
      sheetData.push(exampleRow);
      
      for (let i = 0; i < 15; i++) {
          let emptyRow = ["", "", "", ""];
          subjects.forEach(subject => {
              const fields = subjectFields[subject.subject] || ['أعمال سنة', 'امتحان نهائي'];
              fields.forEach(() => { emptyRow.push(""); });
          });
          if (studentCustomFields.length > 0) studentCustomFields.forEach(() => emptyRow.push(""));
          sheetData.push(emptyRow);
      }
      
      const ws = XLSX.utils.aoa_to_sheet(sheetData);
      ws['!cols'] = headers.map(() => ({ wch: 18 }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `قالب_${currentGrade}`);
      XLSX.writeFile(wb, `قالب_استيراد_الطلاب_${currentGrade}_${new Date().toISOString().slice(0,10)}.xlsx`);
      showToast("✅ تم تحميل القالب");
  };
  
  document.getElementById('downloadTemplateBtn').onclick = window.downloadTemplate;
  
  document.getElementById('uploadExcelBtn').onclick = async () => {
      const file = document.getElementById('excelFile').files[0];
      if (!file) { showToast("اختر ملف Excel أولاً", 'error'); return; }
      if (!currentGrade) { showToast("اختر الصف أولاً", 'error'); return; }
      
      const subjects = schoolSubjects.filter(s => s.grade === currentGrade);
      if (subjects.length === 0) { showToast("لا توجد مواد لهذا الصف", 'error'); return; }
      
      document.getElementById('loadingIndicator').style.display = 'block';
      
      try {
          const data = await file.arrayBuffer();
          const workbook = XLSX.read(data);
          const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" });
          
          let successCount = 0, errorCount = 0;
          
          for (let i = 2; i < rows.length; i++) {
              const row = rows[i];
              if (!row || !row[0] || !row[1]) continue;
              
              const name = row[0]?.toString().trim();
              const seat = row[1]?.toString().trim();
              const code = row[2]?.toString().trim() || null;
              const nationalId = row[3]?.toString().trim() || null;
              
              if (!name || !seat) { errorCount++; continue; }
              
              let { data: student } = await supabase
                  .from('students')
                  .select('id, multi_scores')
                  .eq('school_id', schoolId)
                  .eq('seat_number', seat)
                  .maybeSingle();
              
              if (!student) {
                  const { data: newStudent } = await supabase
                      .from('students')
                      .insert([{ school_id: schoolId, name, seat_number: seat, code, national_id: nationalId, grade: currentGrade, multi_scores: {} }])
                      .select()
                      .single();
                  student = newStudent;
              } else {
                  await supabase.from('students').update({ code, national_id: nationalId }).eq('id', student.id);
              }
              
              const multiScores = student.multi_scores || {};
              let colIndex = 4;
              
              for (let s = 0; s < subjects.length; s++) {
                  const subject = subjects[s].subject;
                  const fields = subjectFields[subject] || ['أعمال سنة', 'امتحان نهائي'];
                  const scores = {};
                  let total = 0, maxTotal = 0;
                  
                  for (let f = 0; f < fields.length; f++) {
                      const value = parseFloat(row[colIndex + f]) || 0;
                      scores[fields[f]] = value;
                      total += value;
                      maxTotal += 100;
                  }
                  
                  multiScores[subject] = {
                      scores: scores,
                      total: total,
                      max: maxTotal,
                      percentage: maxTotal > 0 ? ((total / maxTotal) * 100).toFixed(1) : 0
                  };
                  colIndex += fields.length;
              }
              
              await supabase.from('students').update({ multi_scores: multiScores }).eq('id', student.id);
              successCount++;
          }
          
          showToast(`✅ تم استيراد ${successCount} طالب\n⚠️ فشل ${errorCount}`);
          document.getElementById('excelFile').value = '';
          loadStudents();
      } catch (err) {
          showToast("❌ خطأ: " + err.message, 'error');
      } finally {
          document.getElementById('loadingIndicator').style.display = 'none';
      }
  };
  
  window.addStudent = async () => {
      const name = document.getElementById('studentName').value.trim();
      const seat = document.getElementById('studentSeat').value.trim();
      const code = document.getElementById('studentCode').value.trim();
      const nationalId = document.getElementById('studentNationalId').value.trim();
      if (!name || !seat || !currentGrade) return showToast("املأ الحقول الأساسية واختر الصف", 'error');
      
      const { error } = await supabase.from('students').insert([{ school_id: schoolId, name, seat_number: seat, code: code || null, national_id: nationalId || null, grade: currentGrade, multi_scores: {} }]);
      if (error) showToast("خطأ: " + error.message, 'error');
      else {
          showToast("✅ تمت إضافة الطالب");
          document.getElementById('studentName').value = '';
          document.getElementById('studentSeat').value = '';
          document.getElementById('studentCode').value = '';
          document.getElementById('studentNationalId').value = '';
          loadStudents();
      }
  };
  
  window.addResult = async () => {
      const seat = document.getElementById('resultSeat').value.trim();
      const subject = document.getElementById('resultSubject').value;
      if (!seat || !subject) return showToast("املأ البيانات", 'error');
      
      const fields = subjectFields[subject] || ['أعمال سنة', 'امتحان نهائي'];
      const scores = {};
      let total = 0, maxTotal = 0;
      
      for (let i = 0; i < fields.length; i++) {
          const value = parseFloat(document.getElementById(`resultField_${i}`)?.value) || 0;
          scores[fields[i]] = value;
          total += value;
          maxTotal += 100;
      }
      
      const { data: student } = await supabase.from('students').select('id, multi_scores').eq('school_id', schoolId).eq('seat_number', seat).single();
      if (!student) return showToast("لا يوجد طالب بهذا الرقم", 'error');
      
      const multiScores = student.multi_scores || {};
      multiScores[subject] = {
          scores: scores,
          total: total,
          max: maxTotal,
          percentage: maxTotal > 0 ? ((total / maxTotal) * 100).toFixed(1) : 0
      };
      
      await supabase.from('students').update({ multi_scores: multiScores }).eq('id', student.id);
      showToast("✅ تمت إضافة النتيجة");
      loadStudents();
  };
  
  async function loadStudents() {
      const { data: students } = await supabase.from('students').select('*').eq('school_id', schoolId);
      const container = document.getElementById('studentsList');
      if (!students?.length) { container.innerHTML = '<p>لا يوجد طلاب</p>'; return; }
      
      const filtered = currentGrade ? students.filter(s => s.grade === currentGrade) : students;
      if (filtered.length === 0) { container.innerHTML = '<p>لا يوجد طلاب في هذا الصف</p>'; return; }
      
      container.innerHTML = filtered.map(s => {
          const multi = s.multi_scores || {};
          return `
              <div class="student-card">
                  <div class="flex-between">
                      <div>
                          <strong>${s.name}</strong><br>
                          <small>رقم الجلوس: ${s.seat_number} | الكود: ${s.code || '-'} | الرقم القومي: ${s.national_id || '-'}</small>
                      </div>
                      <div>
                          <button onclick="viewStudentResult('${s.id}')" class="btn-info">📊 عرض النتيجة</button>
                          <button onclick="deleteStudent(${s.id})" class="btn-danger">🗑️ حذف</button>
                      </div>
                  </div>
                  ${Object.entries(multi).map(([sub, d]) => `
                      <div class="subject-score">
                          <strong>${sub}:</strong> ${Object.entries(d.scores).map(([k,v]) => `${k}: ${v}`).join(' | ')} | المجموع: ${d.total} (${d.percentage}%)
                      </div>
                  `).join('')}
              </div>
          `;
      }).join('');
  }
  
  window.viewStudentResult = (studentId) => {
      sessionStorage.setItem('viewStudentId', studentId);
      window.open('student-result.html', '_blank');
  };
  
  window.deleteStudent = async (id) => { if (confirm("حذف الطالب؟")) { await supabase.from('students').delete().eq('id', id); loadStudents(); } };
  
  window.clearAllStudentResults = async () => {
      if (!confirm("مسح نتائج جميع الطلاب؟")) return;
      const { data: students } = await supabase.from('students').select('id').eq('school_id', schoolId);
      for (const student of students) { await supabase.from('students').update({ multi_scores: {} }).eq('id', student.id); }
      showToast("✅ تم مسح النتائج"); loadStudents();
  };
  
  window.deleteAllStudents = async () => {
      if (!confirm("حذف جميع الطلاب نهائياً؟")) return;
      await supabase.from('students').delete().eq('school_id', schoolId);
      showToast("✅ تم حذف جميع الطلاب"); loadStudents();
  };
  
  window.exportSchoolResults = async () => {
      const { data: students } = await supabase.from('students').select('*').eq('school_id', schoolId);
      if (!students?.length) return showToast("لا يوجد طلاب", 'error');
      
      const headers = ['اسم الطالب', 'رقم الجلوس', 'الكود', 'الرقم القومي', 'الصف', 'المادة', 'التفاصيل', 'المجموع', 'النسبة'];
      const rows = [headers];
      
      for (const student of students) {
          const multi = student.multi_scores || {};
          for (const [subject, data] of Object.entries(multi)) {
              const details = Object.entries(data.scores).map(([k,v]) => `${k}: ${v}`).join(' | ');
              rows.push([student.name, student.seat_number, student.code || '', student.national_id || '', student.grade || '', subject, details, `${data.total}/${data.max}`, `${data.percentage}%`]);
          }
      }
      
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `نتائج_${schoolData?.name}`);
      XLSX.writeFile(wb, `نتائج_${schoolData?.name}_${new Date().toISOString().slice(0,10)}.xlsx`);
      showToast("✅ تم تصدير النتائج");
  };
  
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  
  loadSchool();
</script>
</body>
</html>
