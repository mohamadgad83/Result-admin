<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة مدير المدرسة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>🏫 لوحة إدارة المدرسة</h1>
  <button onclick="sessionStorage.clear(); window.location.href='login.html'" style="background:#dc3545">تسجيل خروج</button>
  <div id="schoolName"></div>
  <hr>
  <div id="content"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';

  // جلب المدرسة من الجلسة
  let schoolId = sessionStorage.getItem('userSchoolId');
  const impersonatedId = sessionStorage.getItem('impersonatedSchoolId');
  
  if (impersonatedId) {
    schoolId = impersonatedId;
  }
  
  if (!schoolId) {
    window.location.href = 'login.html';
  }

  async function loadData() {
    // جلب اسم المدرسة
    const { data: school } = await supabase.from('schools').select('name').eq('id', schoolId).single();
    document.getElementById('schoolName').innerHTML = `<h2>🏫 ${school?.name}</h2>`;
    
    // جلب الطلاب
    const { data: students } = await supabase.from('students').select('*').eq('school_id', schoolId);
    
    let html = '<h3>📚 قائمة الطلاب</h3>';
    if (students && students.length > 0) {
      students.forEach(s => {
        html += `<div class="card"><b>${s.name}</b><br>`;
        html += `رقم الجلوس: ${s.seat_number || '-'}<br>`;
        html += `النتائج: ${Object.entries(s.results || {}).map(([k,v]) => `${k}: ${v}`).join(' | ') || 'لا توجد نتائج'}</div>`;
      });
    } else {
      html += '<p>لا يوجد طلاب حتى الآن</p>';
    }
    
    // نموذج إضافة طالب سريع
    html += `
      <hr>
      <h3>➕ إضافة طالب جديد</h3>
      <input type="text" id="studentName" placeholder="اسم الطالب" style="width:100%; margin-bottom:8px">
      <input type="text" id="studentSeat" placeholder="رقم الجلوس" style="width:100%; margin-bottom:8px">
      <button id="addStudentBtn" style="background:#28a745">➕ إضافة طالب</button>
      
      <hr>
      <h3>📝 إضافة نتيجة</h3>
      <input type="text" id="resultSeat" placeholder="رقم الجلوس" style="width:100%; margin-bottom:8px">
      <input type="text" id="subjectName" placeholder="اسم المادة" style="width:100%; margin-bottom:8px">
      <input type="number" id="subjectScore" placeholder="الدرجة" style="width:100%; margin-bottom:8px">
      <button id="addResultBtn" style="background:#28a745">📝 إضافة نتيجة</button>
    `;
    
    document.getElementById('content').innerHTML = html;
    
    // إضافة طالب
    document.getElementById('addStudentBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('studentName').value.trim();
      const seat = document.getElementById('studentSeat').value.trim();
      if (!name || !seat) return alert("❌ املأ جميع الحقول");
      
      const { error } = await supabase.from('students').insert([{
        school_id: parseInt(schoolId),
        name: name,
        seat_number: seat,
        results: {}
      }]);
      
      if (error) alert("خطأ: " + error.message);
      else {
        alert("✅ تمت الإضافة");
        document.getElementById('studentName').value = '';
        document.getElementById('studentSeat').value = '';
        loadData();
      }
    });
    
    // إضافة نتيجة
    document.getElementById('addResultBtn')?.addEventListener('click', async () => {
      const seat = document.getElementById('resultSeat').value.trim();
      const subject = document.getElementById('subjectName').value.trim();
      const score = parseInt(document.getElementById('subjectScore').value);
      
      if (!seat || !subject || isNaN(score)) return alert("❌ املأ جميع الحقول");
      
      // البحث عن الطالب
      const { data: student, error: findError } = await supabase
        .from('students')
        .select('id, results')
        .eq('school_id', schoolId)
        .eq('seat_number', seat)
        .maybeSingle();
      
      if (findError || !student) {
        alert("❌ لا يوجد طالب بهذا الرقم");
        return;
      }
      
      const newResults = { ...(student.results || {}), [subject]: score };
      const { error } = await supabase
        .from('students')
        .update({ results: newResults })
        .eq('id', student.id);
      
      if (error) alert("خطأ: " + error.message);
      else {
        alert("✅ تمت إضافة النتيجة");
        document.getElementById('resultSeat').value = '';
        document.getElementById('subjectName').value = '';
        document.getElementById('subjectScore').value = '';
        loadData();
      }
    });
  }
  
  loadData();
</script>
</body>
</html>
