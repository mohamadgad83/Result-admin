<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة مدير المدرسة</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
    .container { max-width: 1200px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
    button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
    button { background: #1e3c72; color: white; border: none; cursor: pointer; }
    button:hover { background: #0f2b4f; transform: scale(1.02); }
    .btn-success { background: #28a745; }
    .btn-danger { background: #dc3545; }
    .btn-warning { background: #ffc107; color: #333; }
    .btn-info { background: #17a2b8; }
    .student-card { background: #eef2fa; padding: 15px; margin: 10px 0; border-radius: 12px; }
    .subject-score { display: flex; flex-wrap: wrap; gap: 15px; margin: 10px 0; padding: 10px; background: white; border-radius: 8px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    @media (max-width: 768px) { .subject-score { flex-direction: column; } button, input, select { width: 100%; } }
  </style>
</head>
<body>
<div class="container">
  <div class="flex-between" style="margin-bottom: 20px">
    <h1 style="margin:0">🏫 لوحة إدارة المدرسة</h1>
    <div>
      <button onclick="window.location.href='index.html'" class="btn-info">🏠 الرئيسية</button>
      <button onclick="window.location.href='student-search.html'" class="btn-success">🔍 عرض النتائج</button>
      <button onclick="logout()" class="btn-danger">🚪 خروج</button>
    </div>
  </div>
  <div id="schoolInfo"></div>
  <div class="flex-between" style="background:#eef2fa; padding:15px; border-radius:12px; margin:15px 0">
    <h3>⚙️ الإعدادات</h3>
    <div><label>الحد الأدنى:</label><input type="number" id="minPassScore" value="50" style="width:80px"><button onclick="saveSettings()" class="btn-success">💾 حفظ</button></div>
  </div>
  <div id="gradesPanel" style="background:#f0f7ff; padding:15px; border-radius:12px; margin:15px 0"></div>
  <div class="flex-between" style="gap:20px; flex-wrap:wrap">
    <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px"><h3>📥 تحميل قالب</h3><select id="templateGradeSelect"></select><button onclick="downloadTemplate()" class="btn-info">📥 تحميل</button></div>
    <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px"><h3>📤 رفع ملف</h3><input type="file" id="excelFile" accept=".xlsx,.xls,.csv"><button onclick="uploadExcel()" class="btn-success">📊 استيراد</button><div id="uploadResult"></div></div>
  </div>
  <h2>➕ إضافة طالب</h2>
  <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
    <input type="text" id="studentName" placeholder="الاسم" style="width:100%"><input type="text" id="studentSeat" placeholder="رقم الجلوس" style="width:100%"><select id="studentGradeSelect" style="width:100%"></select><div id="studentCustomFields"></div><button onclick="addStudent()" class="btn-success">➕ إضافة</button>
  </div>
  <h2>📝 إضافة نتيجة</h2>
  <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
    <input type="text" id="resultSeat" placeholder="رقم الجلوس"><select id="resultSubject"></select><div class="flex-between"><input type="number" id="workScore" placeholder="أعمال سنة"><input type="number" id="examScore" placeholder="امتحان نهائي"></div><button onclick="addResult()" class="btn-success">📝 إضافة</button>
  </div>
  <h2>📚 الطلاب</h2>
  <div id="studentsList"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';
  let schoolId = sessionStorage.getItem('userSchoolId') || sessionStorage.getItem('impersonatedSchoolId');
  if (!schoolId) window.location.href = 'login.html';
  let schoolSubjects = [], schoolGrades = [], studentCustomFields = [];
  async function loadSchool() {
    const { data: school } = await supabase.from('schools').select('*, stages(name)').eq('id', schoolId).single();
    document.getElementById('schoolInfo').innerHTML = `<h2>🏫 ${school?.name}</h2><p>المرحلة: ${school?.stages?.name}</p>`;
    studentCustomFields = school?.student_custom_fields || [];
    const studentFieldsDiv = document.getElementById('studentCustomFields');
    if (studentCustomFields.length) studentFieldsDiv.innerHTML = studentCustomFields.map(f => `<input type="text" id="custom_${f.name}" placeholder="${f.name}" style="width:100%; margin-bottom:5px">`).join('');
    schoolSubjects = school.custom_subjects || [];
    const selectedGrades = school.selected_grades || [];
    schoolGrades = selectedGrades.length ? selectedGrades : [...new Set(schoolSubjects.map(s => s.grade))];
    document.getElementById('gradesPanel').innerHTML = `<h3>📚 الصفوف المتاحة</h3><div class="flex-between">${schoolGrades.map(g => `<span style="background:#1e3c72;color:white;padding:5px 15px;border-radius:20px">${g}</span>`).join('')}</div>`;
    const templateSelect = document.getElementById('templateGradeSelect');
    templateSelect.innerHTML = schoolGrades.map(g => `<option value="${g}">${g}</option>`).join('');
    document.getElementById('studentGradeSelect').innerHTML = schoolGrades.map(g => `<option value="${g}">${g}</option>`).join('');
    const allSubjects = [...new Set(schoolSubjects.map(s => s.subject))];
    document.getElementById('resultSubject').innerHTML = allSubjects.map(s => `<option value="${s}">${s}</option>`).join('');
  }
  window.saveSettings = async () => { alert("تم الحفظ"); };
  // ---------- نافذة تحميل قالب Excel (نسخة احترافية ومضبوطة) ----------
window.downloadTemplate = () => {
  const grade = document.getElementById('templateGradeSelect').value;
  if (!grade) {
    alert("❌ من فضلك اختر الصف أولاً.");
    return;
  }

  // 1. جلب المواد الخاصة بالصف المختار
  const subjects = schoolSubjects.filter(s => s.grade === grade).map(s => s.subject);
  if (subjects.length === 0) {
    alert("❌ لا توجد مواد مسجلة لهذا الصف. يرجى إضافة المواد أولاً من لوحة السوبر أدمن.");
    return;
  }

  // 2. إنشاء رؤوس الأعمدة بشكل احترافي
  const headers = [
    "اسم الطالب",
    "رقم الجلوس",
    "المادة",
    "أعمال السنة (من 100)",
    "الامتحان النهائي (من 100)",
    "المجموع (يحسب تلقائياً)",
    "النسبة المئوية (تحسب تلقائياً)",
    "التقدير (يظهر تلقائياً)"
  ];

  // --- إضافة الحقول المخصصة للطلاب (إذا وجدت) ---
  if (studentCustomFields && studentCustomFields.length > 0) {
    studentCustomFields.forEach(field => {
      headers.push(`${field.name} (بيانات إضافية)`);
    });
  }

  // 3. إنشاء صف بيانات نموذجي (Example) لتوضيح طريقة التعبئة
  let exampleRow = [
    "مثال: أحمد محمد",
    "101",
    "رياضيات",
    "15",     // مثال لأعمال السنة
    "40",     // مثال للامتحان النهائي
    "55",     // المجموع (مثال)
    "55%",    // النسبة (مثال)
    "مقبول"   // التقدير (مثال)
  ];

  // --- إضافة قيم فارغة للحقول المخصصة في المثال ---
  if (studentCustomFields && studentCustomFields.length > 0) {
    studentCustomFields.forEach(() => {
      exampleRow.push("مثال: ولي الأمر");
    });
  }

  // 4. تحضير البيانات للورقة الأولى (القالب الأساسي)
  const sheetData = [headers, exampleRow];

  // --- إضافة 10 صفوف فارغة جاهزة لإدخال البيانات (للتسهيل على المستخدم) ---
  for (let i = 0; i < 10; i++) {
    let emptyRow = ["", "", "", "", "", "", "", ""];
    if (studentCustomFields && studentCustomFields.length > 0) {
      studentCustomFields.forEach(() => emptyRow.push(""));
    }
    sheetData.push(emptyRow);
  }

  // إنشاء ورقة العمل الرئيسية
  const ws = XLSX.utils.aoa_to_sheet(sheetData);

  // ضبط عرض الأعمدة (لجعلها مناسبة وجميلة)
  ws['!cols'] = [
    { wch: 25 }, // اسم الطالب
    { wch: 15 }, // رقم الجلوس
    { wch: 20 }, // المادة
    { wch: 20 }, // أعمال السنة
    { wch: 22 }, // الامتحان النهائي
    { wch: 20 }, // المجموع
    { wch: 20 }, // النسبة المئوية
    { wch: 15 }  // التقدير
  ];
  // إضافة عرض مبدئي للحقول المخصصة (إذا وجدت)
  if (studentCustomFields && studentCustomFields.length > 0) {
    for (let i = 0; i < studentCustomFields.length; i++) {
      ws['!cols'].push({ wch: 20 });
    }
  }

  // تلوين رأس الجدول (اختياري - عبر CSS، لكنه يظهر بشكل أفضل في Excel)
  // يمكن إضافة تعليق أو نص توضيحي للخلية الأولى
  if (ws['A1']) ws['A1'].c = [{ a: "Center", t: "هذا العمود خاص باسم الطالب" }];

  // 5. إنشاء ورقة منفصلة للتعليمات (بلغة عربية واضحة)
  const instructionsData = [
    ["📘 دليل استخدام قالب استيراد النتائج"],
    [" "],
    ["🔹 1. لا تقم بتعديل أو حذف الصف الأول (رؤوس الأعمدة) بأي حال من الأحوال."],
    ["🔹 2. قم بإدخال بيانات الطلاب بدءاً من الصف الثالث (بعد الصف النموذجي)."],
    ["🔹 3. طريقة ملء البيانات الصحيحة:"],
    ["   - أدخل اسم الطالب ورقم جلوسه."],
    ["   - أدخل اسم المادة كما هي مسجلة في النظام."],
    ["   - أدخل درجة 'أعمال السنة' ودرجة 'الامتحان النهائي' (كل منهما من 100)."],
    ["   - سيتم حساب المجموع والنسبة المئوية والتقدير تلقائياً بعد الرفع."],
    ["🔹 4. إذا كان الطالب لديه عدة مواد، قم بإضافة سطر جديد لكل مادة بنفس رقم الجلوس."],
    ["🔹 5. الحقول الإضافية (مثل ولي الأمر) اختيارية: يمكنك ملؤها أو تركها فارغة."],
    ["🔹 6. بعد الانتهاء من التعبئة، قم برفع الملف مرة أخرى من خلال قسم 'رفع ملف Excel' في نفس الصفحة."],
    [" "],
    ["💡 مثال صحيح للتعبئة:"],
    ["   الصف A (العمود الأول): أحمد محمد"],
    ["   الصف B (العمود الثاني): 101"],
    ["   الصف C (العمود الثالث): رياضيات"],
    ["   الصف D (العمود الرابع): 18"],
    ["   الصف E (العمود الخامس): 45"],
    [" "],
    ["© نظام إدارة النتائج المدرسية - جميع الحقوق محفوظة"]
  ];

  const wsInstructions = XLSX.utils.aoa_to_sheet(instructionsData);
  wsInstructions['!cols'] = [{ wch: 70 }]; // عرض كبير لورقة التعليمات

  // 6. إنشاء المصنف وإضافة الأوراق
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `قالب_استيراد_${grade}`);
  XLSX.utils.book_append_sheet(wb, wsInstructions, "تعليمات_الاستخدام");

  // 7. تحميل الملف
  XLSX.writeFile(wb, `قالب_استيراد_الطلاب_${grade}_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.xlsx`);
};
  window.uploadExcel = async () => {
    const file = document.getElementById('excelFile').files[0];
    if (!file) return;
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data);
    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
    if (rows.length < 2) return;
    const headers = rows[0];
    let success = 0, fail = 0;
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const name = row[0]?.toString().trim();
      const seat = row[1]?.toString().trim();
      if (!name || !seat) { fail++; continue; }
      let { data: student } = await supabase.from('students').select('id, multi_scores').eq('school_id', schoolId).eq('seat_number', seat).single();
      if (!student) {
        const { data: newStudent } = await supabase.from('students').insert([{ school_id: schoolId, name, seat_number: seat, multi_scores: {} }]).select().single();
        student = newStudent;
      }
      const multiScores = student.multi_scores || {};
      let col = 2;
      const subjects = schoolSubjects.filter(s => s.grade === 'all' || true).map(s => s.subject);
      for (let s = 0; s < subjects.length && col + 1 < headers.length; s++) {
        const subject = subjects[s];
        const work = parseFloat(row[col]) || 0;
        const exam = parseFloat(row[col + 1]) || 0;
        const total = work + exam;
        multiScores[subject] = { scores: { 'أعمال سنة': { score: work, max: 100 }, 'امتحان نهائي': { score: exam, max: 100 } }, total, max: 200, percentage: (total / 200 * 100).toFixed(1) };
        col += 2;
      }
      await supabase.from('students').update({ multi_scores: multiScores }).eq('id', student.id);
      success++;
    }
    alert(`✅ تم استيراد ${success} طالب\n❌ فشل ${fail}`);
    loadStudents();
  };
  window.addStudent = async () => {
    const name = document.getElementById('studentName').value.trim();
    const seat = document.getElementById('studentSeat').value.trim();
    const grade = document.getElementById('studentGradeSelect').value;
    if (!name || !seat || !grade) return alert("املأ الحقول");
    const customData = {};
    studentCustomFields.forEach(f => { const val = document.getElementById(`custom_${f.name}`)?.value.trim(); if (val) customData[f.name] = val; });
    await supabase.from('students').insert([{ school_id: schoolId, name, seat_number: seat, grade, multi_scores: {}, custom_data: customData }]);
    alert("✅ تمت الإضافة");
    loadStudents();
  };
  window.addResult = async () => {
    const seat = document.getElementById('resultSeat').value.trim();
    const subject = document.getElementById('resultSubject').value;
    const work = parseFloat(document.getElementById('workScore').value) || 0;
    const exam = parseFloat(document.getElementById('examScore').value) || 0;
    if (!seat || !subject) return;
    const { data: student } = await supabase.from('students').select('id, multi_scores').eq('school_id', schoolId).eq('seat_number', seat).single();
    if (!student) return alert("لا يوجد طالب");
    const multiScores = student.multi_scores || {};
    const total = work + exam;
    multiScores[subject] = { scores: { 'أعمال سنة': { score: work, max: 100 }, 'امتحان نهائي': { score: exam, max: 100 } }, total, max: 200, percentage: (total / 200 * 100).toFixed(1) };
    await supabase.from('students').update({ multi_scores: multiScores }).eq('id', student.id);
    alert("✅ تمت الإضافة");
    loadStudents();
  };
  async function loadStudents() {
    const { data: students } = await supabase.from('students').select('*').eq('school_id', schoolId);
    const container = document.getElementById('studentsList');
    if (!students?.length) { container.innerHTML = '<p>لا يوجد طلاب</p>'; return; }
    container.innerHTML = students.map(s => {
      const multi = s.multi_scores || {};
      return `<div class="student-card"><div class="flex-between"><div><strong>${s.name}</strong><br>رقم الجلوس: ${s.seat_number} | الصف: ${s.grade}<br>${studentCustomFields.map(f => `${f.name}: ${s.custom_data?.[f.name] || '-'}`).join(' | ')}</div><div><button onclick="viewStudent('${s.id}')" class="btn-info">📊</button><button onclick="deleteStudent(${s.id})" class="btn-danger">🗑️</button></div></div>${Object.entries(multi).map(([sub, d]) => `<div class="subject-score"><strong>${sub}:</strong> أعمال سنة: ${d.scores['أعمال سنة']?.score || 0} | امتحان نهائي: ${d.scores['امتحان نهائي']?.score || 0} | المجموع: ${d.total} (${d.percentage}%)</div>`).join('')}</div>`;
    }).join('');
  }
  window.viewStudent = (id) => { sessionStorage.setItem('viewStudentId', id); window.location.href = 'student-result.html'; };
  window.deleteStudent = async (id) => { if (confirm("حذف؟")) await supabase.from('students').delete().eq('id', id); loadStudents(); };
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  loadSchool(); loadStudents();
</script>
</body>
</html>
