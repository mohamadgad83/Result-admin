<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مدير المدرسة</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
        button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #1e3c72; color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0f2b4f; transform: scale(1.02); }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-info { background: #17a2b8; }
        .student-card { background: #eef2fa; padding: 15px; margin: 10px 0; border-radius: 12px; }
        .subject-score { display: flex; flex-wrap: wrap; gap: 15px; margin: 10px 0; padding: 10px; background: white; border-radius: 8px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        @media (max-width: 768px) { .subject-score { flex-direction: column; } button, input, select { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between" style="margin-bottom: 20px">
        <h1 style="margin:0">🏫 لوحة إدارة المدرسة</h1>
        <div>
            <button onclick="window.location.href='index.html'" class="btn-info">الرئيسية</button>
            <button onclick="window.location.href='student-search.html'" class="btn-success">عرض النتائج</button>
            <button onclick="logout()" class="btn-danger">خروج</button>
        </div>
    </div>
    <div id="schoolInfo"></div>
    <div id="gradesPanel" style="background:#f0f7ff; padding:15px; border-radius:12px; margin:15px 0"></div>
    <div class="flex-between" style="gap:20px; flex-wrap:wrap">
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📥 تحميل قالب Excel</h3>
            <select id="templateGradeSelect" style="width:100%"></select>
            <button onclick="downloadTemplate()" class="btn-info" style="width:100%; margin-top:10px">تحميل القالب</button>
        </div>
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📤 رفع ملف Excel</h3>
            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" style="width:100%">
            <button onclick="uploadExcel()" class="btn-success" style="width:100%; margin-top:10px">استيراد البيانات</button>
            <div id="uploadResult"></div>
        </div>
    </div>
    <h2>➕ إضافة طالب</h2>
    <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
        <input type="text" id="studentName" placeholder="الاسم" style="width:100%">
        <input type="text" id="studentSeat" placeholder="رقم الجلوس" style="width:100%">
        <input type="text" id="studentCode" placeholder="الكود" style="width:100%">
        <input type="text" id="studentNationalId" placeholder="الرقم القومي" style="width:100%">
        <select id="studentGradeSelect" style="width:100%"></select>
        <div id="studentCustomFields"></div>
        <button onclick="addStudent()" class="btn-success">إضافة طالب</button>
    </div>
    <h2>📝 إضافة نتيجة</h2>
    <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
        <input type="text" id="resultSeat" placeholder="رقم الجلوس" style="width:100%">
        <select id="resultSubject" style="width:100%"></select>
        <div class="flex-between"><input type="number" id="workScore" placeholder="أعمال سنة"><input type="number" id="examScore" placeholder="امتحان نهائي"></div>
        <button onclick="addResult()" class="btn-success">إضافة نتيجة</button>
    </div>
    <h2>📚 الطلاب</h2>
    <div id="studentsList"></div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  let schoolId = sessionStorage.getItem('userSchoolId') || sessionStorage.getItem('impersonatedSchoolId');
  if (!schoolId) window.location.href = 'login.html';
  let schoolSubjects = [], schoolGrades = [], studentCustomFields = [];
  
  async function loadSchool() {
    const { data: school } = await supabase.from('schools').select('*, stages(name)').eq('id', schoolId).single();
    document.getElementById('schoolInfo').innerHTML = `<h2>🏫 ${school?.name}</h2><p>المرحلة: ${school?.stages?.name}</p>`;
    
    studentCustomFields = school?.student_custom_fields || [];
    const studentFieldsDiv = document.getElementById('studentCustomFields');
    if (studentCustomFields.length) studentFieldsDiv.innerHTML = studentCustomFields.map(f => `<input type="text" id="custom_${f.name}" placeholder="${f.name}" style="width:100%; margin-bottom:5px">`).join('');
    
    schoolSubjects = school.custom_subjects || [];
    const selectedGrades = school.selected_grades || [];
    schoolGrades = selectedGrades.length ? selectedGrades : [...new Set(schoolSubjects.map(s => s.grade))];
    
    document.getElementById('gradesPanel').innerHTML = `<h3>📚 الصفوف المتاحة</h3><div class="flex-between">${schoolGrades.map(g => `<span style="background:#1e3c72;color:white;padding:5px 15px;border-radius:20px">${g}</span>`).join('')}</div>`;
    
    const templateSelect = document.getElementById('templateGradeSelect');
    templateSelect.innerHTML = schoolGrades.map(g => `<option value="${g}">${g}</option>`).join('');
    document.getElementById('studentGradeSelect').innerHTML = schoolGrades.map(g => `<option value="${g}">${g}</option>`).join('');
    
    const allSubjects = [...new Set(schoolSubjects.map(s => s.subject))];
    document.getElementById('resultSubject').innerHTML = allSubjects.map(s => `<option value="${s}">${s}</option>`).join('');
  }
  
  // تحميل القالب - يحتوي على الاسم + رقم الجلوس + الكود + الرقم القومي + المواد
  window.downloadTemplate = () => {
    const grade = document.getElementById('templateGradeSelect').value;
    if (!grade) { alert("❌ اختر الصف أولاً"); return; }
    
    const subjects = schoolSubjects.filter(s => s.grade === grade).map(s => s.subject);
    if (subjects.length === 0) { alert("❌ لا توجد مواد لهذا الصف"); return; }
    
    // رؤوس الأعمدة الأساسية
    const headers = ["اسم الطالب", "رقم الجلوس", "الكود", "الرقم القومي"];
    // إضافة المواد (لكل مادة عمودين)
    subjects.forEach(s => {
        headers.push(`${s} (أعمال سنة)`, `${s} (امتحان نهائي)`);
    });
    // إضافة الحقول المخصصة إن وجدت
    if (studentCustomFields.length > 0) {
        studentCustomFields.forEach(f => headers.push(f.name));
    }
    
    const sheetData = [headers];
    // صف مثال
    let exampleRow = ["مثال: أحمد محمد", "101", "A123", "12345678901234"];
    subjects.forEach(() => { exampleRow.push("", ""); });
    if (studentCustomFields.length > 0) studentCustomFields.forEach(() => exampleRow.push(""));
    sheetData.push(exampleRow);
    // 10 صفوف فارغة
    for (let i = 0; i < 10; i++) {
        let emptyRow = ["", "", "", ""];
        subjects.forEach(() => { emptyRow.push("", ""); });
        if (studentCustomFields.length > 0) studentCustomFields.forEach(() => emptyRow.push(""));
        sheetData.push(emptyRow);
    }
    
    const ws = XLSX.utils.aoa_to_sheet(sheetData);
    ws['!cols'] = headers.map(() => ({ wch: 18 }));
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, `قالب_${grade}`);
    XLSX.writeFile(wb, `قالب_استيراد_الطلاب_${grade}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };
  
  // استيراد البيانات
  window.uploadExcel = async () => {
    const file = document.getElementById('excelFile').files[0];
    if (!file) return alert("اختر ملف أولاً");
    
    const grade = document.getElementById('templateGradeSelect').value;
    if (!grade) { alert("❌ اختر الصف أولاً"); return; }
    
    const subjects = schoolSubjects.filter(s => s.grade === grade).map(s => s.subject);
    if (subjects.length === 0) { alert("❌ لا توجد مواد لهذا الصف"); return; }
    
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data);
    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
    if (rows.length < 3) return alert("الملف فارغ");
    
    let success = 0, fail = 0;
    
    for (let i = 2; i < rows.length; i++) {
        const row = rows[i];
        if (!row || !row[0] || !row[1]) continue;
        
        const name = row[0]?.toString().trim();
        const seat = row[1]?.toString().trim();
        const code = row[2]?.toString().trim() || null;
        const nationalId = row[3]?.toString().trim() || null;
        
        if (!name || !seat) { fail++; continue; }
        
        // البحث عن الطالب
        let { data: student } = await supabase
            .from('students')
            .select('id, multi_scores, custom_data')
            .eq('school_id', schoolId)
            .eq('seat_number', seat)
            .single();
        
        // جمع البيانات المخصصة
        const customData = {};
        if (studentCustomFields.length > 0) {
            for (let j = 0; j < studentCustomFields.length; j++) {
                const fieldName = studentCustomFields[j].name;
                const colIndex = 4 + (subjects.length * 2) + j;
                const fieldValue = row[colIndex]?.toString().trim();
                if (fieldValue) customData[fieldName] = fieldValue;
            }
        }
        
        if (!student) {
            const { data: newStudent } = await supabase
                .from('students')
                .insert([{ 
                    school_id: schoolId, 
                    name, 
                    seat_number: seat, 
                    code: code,
                    national_id: nationalId,
                    grade: grade, 
                    multi_scores: {}, 
                    custom_data: customData 
                }])
                .select()
                .single();
            student = newStudent;
        } else {
            // تحديث البيانات الإضافية
            await supabase
                .from('students')
                .update({ code: code, national_id: nationalId, custom_data: customData })
                .eq('id', student.id);
        }
        
        const multiScores = student.multi_scores || {};
        let colIndex = 4; // بعد الأعمدة الأساسية الأربعة
        
        for (let s = 0; s < subjects.length; s++) {
            const subject = subjects[s];
            const work = parseFloat(row[colIndex]) || 0;
            const exam = parseFloat(row[colIndex + 1]) || 0;
            const total = work + exam;
            const percentage = (total / 200) * 100;
            
            multiScores[subject] = {
                scores: { 'أعمال سنة': { score: work, max: 100 }, 'امتحان نهائي': { score: exam, max: 100 } },
                total: total,
                max: 200,
                percentage: percentage.toFixed(1)
            };
            colIndex += 2;
        }
        
        await supabase.from('students').update({ multi_scores: multiScores }).eq('id', student.id);
        success++;
    }
    
    alert(`✅ تم استيراد ${success} طالب\n❌ فشل ${fail}`);
    loadStudents();
  };
  
  window.addStudent = async () => {
    const name = document.getElementById('studentName').value.trim();
    const seat = document.getElementById('studentSeat').value.trim();
    const code = document.getElementById('studentCode').value.trim();
    const nationalId = document.getElementById('studentNationalId').value.trim();
    const grade = document.getElementById('studentGradeSelect').value;
    
    if (!name || !seat || !grade) return alert("املأ الحقول الأساسية (الاسم، رقم الجلوس، الصف)");
    
    const customData = {};
    studentCustomFields.forEach(f => { 
        const val = document.getElementById(`custom_${f.name}`)?.value.trim(); 
        if (val) customData[f.name] = val; 
    });
    
    await supabase.from('students').insert([{ 
        school_id: schoolId, 
        name, 
        seat_number: seat, 
        code: code || null,
        national_id: nationalId || null,
        grade, 
        multi_scores: {}, 
        custom_data: customData 
    }]);
    
    alert("✅ تمت إضافة الطالب");
    document.getElementById('studentName').value = '';
    document.getElementById('studentSeat').value = '';
    document.getElementById('studentCode').value = '';
    document.getElementById('studentNationalId').value = '';
    studentCustomFields.forEach(f => { 
        const input = document.getElementById(`custom_${f.name}`); 
        if (input) input.value = ''; 
    });
    loadStudents();
  };
  
  window.addResult = async () => {
    const seat = document.getElementById('resultSeat').value.trim();
    const subject = document.getElementById('resultSubject').value;
    const work = parseFloat(document.getElementById('workScore').value) || 0;
    const exam = parseFloat(document.getElementById('examScore').value) || 0;
    
    if (!seat || !subject) return alert("املأ البيانات");
    
    const { data: student } = await supabase
        .from('students')
        .select('id, multi_scores')
        .eq('school_id', schoolId)
        .eq('seat_number', seat)
        .single();
    
    if (!student) return alert("لا يوجد طالب بهذا الرقم");
    
    const multiScores = student.multi_scores || {};
    const total = work + exam;
    multiScores[subject] = {
        scores: { 'أعمال سنة': { score: work, max: 100 }, 'امتحان نهائي': { score: exam, max: 100 } },
        total: total,
        max: 200,
        percentage: ((total / 200) * 100).toFixed(1)
    };
    
    await supabase.from('students').update({ multi_scores: multiScores }).eq('id', student.id);
    alert("✅ تمت إضافة النتيجة");
    document.getElementById('resultSeat').value = '';
    document.getElementById('workScore').value = '';
    document.getElementById('examScore').value = '';
    loadStudents();
  };
  
  async function loadStudents() {
    const { data: students } = await supabase.from('students').select('*').eq('school_id', schoolId);
    const container = document.getElementById('studentsList');
    if (!students?.length) { container.innerHTML = '<p>لا يوجد طلاب</p>'; return; }
    
    container.innerHTML = students.map(s => {
        const multi = s.multi_scores || {};
        return `<div class="student-card">
            <div class="flex-between">
                <div>
                    <strong>${s.name}</strong><br>
                    <small>رقم الجلوس: ${s.seat_number} | الكود: ${s.code || '-'} | الرقم القومي: ${s.national_id || '-'}</small><br>
                    <small>الصف: ${s.grade || '-'}</small><br>
                    ${studentCustomFields.map(f => `<small>${f.name}: ${s.custom_data?.[f.name] || '-'}</small><br>`).join('')}
                </div>
                <div>
                    <button onclick="viewStudent('${s.id}')" class="btn-info">عرض النتيجة</button>
                    <button onclick="deleteStudent(${s.id})" class="btn-danger">حذف</button>
                </div>
            </div>
            ${Object.entries(multi).map(([sub, d]) => `
                <div class="subject-score">
                    <strong>${sub}:</strong>
                    أعمال سنة: ${d.scores['أعمال سنة']?.score || 0} | 
                    امتحان نهائي: ${d.scores['امتحان نهائي']?.score || 0} | 
                    المجموع: ${d.total} (${d.percentage}%)
                </div>
            `).join('')}
        </div>`;
    }).join('');
  }
  
  window.viewStudent = (id) => { sessionStorage.setItem('viewStudentId', id); window.location.href = 'student-result.html'; };
  window.deleteStudent = async (id) => { if (confirm("حذف؟")) await supabase.from('students').delete().eq('id', id); loadStudents(); };
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  
  loadSchool(); 
  loadStudents();
</script>
</body>
</html>
