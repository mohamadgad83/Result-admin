<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مدير المدرسة</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
        button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #1e3c72; color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0f2b4f; transform: scale(1.02); }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-info { background: #17a2b8; }
        
        .info-card { background: #eef2fa; border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .info-header { font-size: 18px; font-weight: bold; color: #1e3c72; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #1e3c72; }
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
        .subject-card { background: white; border-radius: 12px; padding: 12px; border-right: 3px solid #1e3c72; }
        .subject-name { font-weight: bold; margin-bottom: 8px; }
        .fields-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .field-tag { background: #1e3c72; color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; }
        
        .student-card { background: #eef2fa; padding: 15px; margin: 10px 0; border-radius: 12px; }
        .subject-score { background: white; border-radius: 8px; padding: 10px; margin: 8px 0; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .loading { display: none; text-align: center; padding: 20px; background: #eef2fa; border-radius: 12px; margin: 10px 0; }
        .danger-zone { background: #fff5f5; border: 1px solid #dc3545; border-radius: 12px; padding: 15px; margin: 15px 0; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #28a745; color: white; padding: 12px; border-radius: 10px; text-align: center; z-index: 1000; animation: fadeOut 3s ease forwards; }
        .toast.error { background: #dc3545; }
        @keyframes fadeOut { 0% { opacity: 0; transform: translateY(20px); } 10% { opacity: 1; transform: translateY(0); } 90% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @media (max-width: 768px) { .subjects-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between" style="margin-bottom: 20px">
        <h1 style="margin:0">🏫 لوحة إدارة المدرسة</h1>
        <div>
            <button onclick="window.location.href='index.html'" class="btn-info">🏠 الرئيسية</button>
            <button onclick="window.location.href='student-search.html'" class="btn-success">🔍 عرض النتائج</button>
            <button onclick="logout()" class="btn-danger">🚪 خروج</button>
        </div>
    </div>
    
    <div id="schoolInfo"></div>
    
    <!-- إعدادات البحث -->
    <div class="info-card">
        <div class="info-header">🔍 إعدادات البحث للطلاب</div>
        <div class="flex-between">
            <select id="searchFieldSelect" style="flex:2">
                <option value="seat_number">رقم الجلوس</option>
                <option value="code">الكود</option>
                <option value="national_id">الرقم القومي</option>
            </select>
            <input type="text" id="searchFieldLabel" placeholder="التسمية الظاهرة (مثال: رقم الجلوس)" style="flex:3">
            <button onclick="saveSearchSettings()" class="btn-success">💾 حفظ إعدادات البحث</button>
        </div>
    </div>
    
    <!-- اختيار الصف -->
    <div class="info-card">
        <div class="info-header">📚 اختيار الصف الدراسي</div>
        <div class="flex-between">
            <select id="selectedGrade" style="flex:3">
                <option value="">-- اختر الصف --</option>
            </select>
            <button onclick="syncFromStage()" class="btn-info">🔄 مزامنة المواد من المرحلة</button>
        </div>
    </div>
    
    <!-- عرض المواد حسب الصف -->
    <div id="subjectsContainer"></div>
    
    <!-- تحميل ورفع Excel -->
    <div class="flex-between" style="gap:20px; flex-wrap:wrap; margin: 20px 0">
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📥 تحميل قالب Excel</h3>
            <button id="downloadTemplateBtn" class="btn-info" style="width:100%">📥 تحميل القالب</button>
        </div>
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📤 رفع ملف Excel</h3>
            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" style="width:100%">
            <button id="uploadExcelBtn" class="btn-success" style="width:100%; margin-top:10px">📊 استيراد البيانات</button>
            <div id="uploadResult" style="margin-top:10px; font-size:12px; color:#666"></div>
        </div>
    </div>
    
    <!-- قائمة الطلاب -->
    <h2>📚 قائمة الطلاب</h2>
    <div id="studentsList">جاري التحميل...</div>
    
    <!-- منطقة الحذف والتصدير -->
    <div class="danger-zone">
        <h3 style="color:#dc3545">⚠️ إدارة البيانات</h3>
        <div class="flex-between">
            <button onclick="clearAllStudentResults()" class="btn-danger">🗑️ مسح نتائج جميع الطلاب</button>
            <button onclick="deleteAllStudents()" class="btn-danger">💀 حذف جميع الطلاب نهائياً</button>
            <button onclick="exportSchoolResults()" class="btn-info">📥 تصدير نتائج المدرسة</button>
        </div>
    </div>
    
    <div class="loading" id="loadingIndicator">⏳ جاري المعالجة...</div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  let schoolId = sessionStorage.getItem('userSchoolId') || sessionStorage.getItem('impersonatedSchoolId');
  if (!schoolId) window.location.href = 'login.html';
  
  let schoolData = null;
  let schoolSubjects = [];
  let schoolGrades = [];
  let subjectFields = {};
  let currentGrade = '';
  
  function showToast(msg, isErr = false) {
      let t = document.createElement('div');
      t.className = `toast ${isErr ? 'error' : ''}`;
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
  }
  
  async function loadSchool() {
      let { data: school } = await supabase.from('schools').select('*, stages(name)').eq('id', schoolId).single();
      if (!school) return;
      schoolData = school;
      document.getElementById('schoolInfo').innerHTML = `<h2>🏫 ${school.name}</h2><p>المرحلة: ${school.stages?.name}</p>`;
      
      // تحميل إعدادات البحث الحالية
      document.getElementById('searchFieldSelect').value = school.search_field || 'seat_number';
      document.getElementById('searchFieldLabel').value = school.search_field_label || '';
      
      schoolSubjects = school.custom_subjects || [];
      subjectFields = school.subject_fields || {};
      schoolGrades = [...new Set(schoolSubjects.map(s => s.grade))];
      
      let gradeSelect = document.getElementById('selectedGrade');
      gradeSelect.innerHTML = '<option value="">-- اختر الصف --</option>' + schoolGrades.map(g => `<option value="${g}">${g}</option>`).join('');
      
      gradeSelect.onchange = () => {
          currentGrade = gradeSelect.value;
          if (currentGrade) {
              renderSubjectsByGrade();
              loadStudents();
          } else {
              document.getElementById('subjectsContainer').innerHTML = '';
          }
      };
      
      await loadStudents();
  }
  
  // حفظ إعدادات البحث
  window.saveSearchSettings = async () => {
      let searchField = document.getElementById('searchFieldSelect').value;
      let searchLabel = document.getElementById('searchFieldLabel').value.trim();
      if (!searchLabel) {
          searchLabel = searchField === 'seat_number' ? 'رقم الجلوس' : searchField === 'code' ? 'الكود' : 'الرقم القومي';
      }
      let { error } = await supabase.from('schools').update({ 
          search_field: searchField, 
          search_field_label: searchLabel 
      }).eq('id', schoolId);
      if (error) showToast("خطأ: " + error.message, true);
      else showToast("✅ تم حفظ إعدادات البحث");
  };
  
  // مزامنة المواد من المرحلة
  window.syncFromStage = async () => {
      if (!confirm("سيتم استبدال المواد الحالية بمواد المرحلة الأساسية. استمر؟")) return;
      
      let { data: stage } = await supabase.from('stages').select('grades, subject_fields').eq('id', schoolData.stage_id).single();
      let grades = typeof stage.grades === 'string' ? JSON.parse(stage.grades) : (stage.grades || []);
      
      let allSubjects = [];
      grades.forEach(grade => {
          grade.subjects.forEach(subject => {
              allSubjects.push({ grade: grade.grade, subject: subject });
          });
      });
      
      let { error } = await supabase.from('schools').update({ 
          custom_subjects: allSubjects,
          subject_fields: stage.subject_fields || {}
      }).eq('id', schoolId);
      
      if (error) showToast("خطأ: " + error.message, true);
      else { showToast("✅ تمت مزامنة المواد"); setTimeout(() => location.reload(), 1500); }
  };
  
  function renderSubjectsByGrade() {
      let subjects = schoolSubjects.filter(s => s.grade === currentGrade);
      let container = document.getElementById('subjectsContainer');
      if (subjects.length === 0) {
          container.innerHTML = '<div class="info-card"><p style="color:#dc3545">⚠️ لا توجد مواد لهذا الصف</p></div>';
          return;
      }
      
      container.innerHTML = `
          <div class="info-card">
              <div class="info-header">📚 مواد الصف ${currentGrade}</div>
              <div class="subjects-grid">
                  ${subjects.map(sub => {
                      let fields = subjectFields[sub.subject] || ['أعمال سنة', 'امتحان نهائي'];
                      return `
                          <div class="subject-card">
                              <div class="subject-name">📖 ${sub.subject}</div>
                              <div class="fields-list">
                                  ${fields.map(f => `<span class="field-tag">${f}</span>`).join('')}
                              </div>
                          </div>
                      `;
                  }).join('')}
              </div>
          </div>
      `;
  }
  
  // تحميل قالب Excel
  window.downloadTemplate = () => {
      if (!currentGrade) { showToast("اختر الصف أولاً", true); return; }
      
      let subjects = schoolSubjects.filter(s => s.grade === currentGrade);
      if (subjects.length === 0) { showToast("لا توجد مواد لهذا الصف", true); return; }
      
      let headers = ["اسم الطالب", "رقم الجلوس", "الكود", "الرقم القومي"];
      subjects.forEach(subject => {
          let fields = subjectFields[subject.subject] || ['أعمال سنة', 'امتحان نهائي'];
          fields.forEach(field => { headers.push(`${subject.subject} (${field})`); });
      });
      
      let sheetData = [headers];
      let exampleRow = ["مثال: أحمد محمد", "101", "A123", "12345678901234"];
      subjects.forEach(subject => {
          let fields = subjectFields[subject.subject] || ['أعمال سنة', 'امتحان نهائي'];
          fields.forEach(() => { exampleRow.push(""); });
      });
      sheetData.push(exampleRow);
      
      for (let i = 0; i < 15; i++) {
          let emptyRow = ["", "", "", ""];
          subjects.forEach(subject => {
              let fields = subjectFields[subject.subject] || ['أعمال سنة', 'امتحان نهائي'];
              fields.forEach(() => { emptyRow.push(""); });
          });
          sheetData.push(emptyRow);
      }
      
      let ws = XLSX.utils.aoa_to_sheet(sheetData);
      ws['!cols'] = headers.map(() => ({ wch: 18 }));
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `قالب_${currentGrade}`);
      XLSX.writeFile(wb, `قالب_استيراد_الطلاب_${currentGrade}_${new Date().toISOString().slice(0,10)}.xlsx`);
      showToast("✅ تم تحميل القالب");
  };
  
  // استيراد البيانات من Excel
  window.uploadExcel = async () => {
      let file = document.getElementById('excelFile').files[0];
      if (!file) { showToast("اختر ملف Excel أولاً", true); return; }
      if (!currentGrade) { showToast("اختر الصف أولاً", true); return; }
      
      let subjects = schoolSubjects.filter(s => s.grade === currentGrade);
      if (subjects.length === 0) { showToast("لا توجد مواد لهذا الصف", true); return; }
      
      document.getElementById('loadingIndicator').style.display = 'block';
      
      try {
          let data = await file.arrayBuffer();
          let workbook = XLSX.read(data);
          let rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" });
          
          let successCount = 0, errorCount = 0;
          
          for (let i = 2; i < rows.length; i++) {
              let row = rows[i];
              if (!row || !row[0] || !row[1]) continue;
              
              let name = row[0]?.toString().trim();
              let seat = row[1]?.toString().trim();
              let code = row[2]?.toString().trim() || null;
              let nationalId = row[3]?.toString().trim() || null;
              
              if (!name || !seat) { errorCount++; continue; }
              
              let { data: student } = await supabase
                  .from('students')
                  .select('id, multi_scores')
                  .eq('school_id', schoolId)
                  .eq('seat_number', seat)
                  .maybeSingle();
              
              if (!student) {
                  let { data: newStudent } = await supabase
                      .from('students')
                      .insert([{ school_id: schoolId, name, seat_number: seat, code, national_id: nationalId, grade: currentGrade, multi_scores: {} }])
                      .select()
                      .single();
                  student = newStudent;
              } else {
                  await supabase.from('students').update({ code, national_id: nationalId }).eq('id', student.id);
              }
              
              let multiScores = student.multi_scores || {};
              let colIndex = 4;
              
              for (let s = 0; s < subjects.length; s++) {
                  let subject = subjects[s].subject;
                  let fields = subjectFields[subject] || ['أعمال سنة', 'امتحان نهائي'];
                  let scores = {};
                  let total = 0, maxTotal = 0;
                  
                  for (let f = 0; f < fields.length; f++) {
                      let value = parseFloat(row[colIndex + f]) || 0;
                      scores[fields[f]] = value;
                      total += value;
                      maxTotal += 100;
                  }
                  
                  multiScores[subject] = {
                      scores: scores,
                      total: total,
                      max: maxTotal,
                      percentage: maxTotal > 0 ? ((total / maxTotal) * 100).toFixed(1) : 0
                  };
                  colIndex += fields.length;
              }
              
              await supabase.from('students').update({ multi_scores: multiScores }).eq('id', student.id);
              successCount++;
          }
          
          showToast(`✅ تم استيراد ${successCount} طالب\n⚠️ فشل ${errorCount}`);
          document.getElementById('excelFile').value = '';
          loadStudents();
      } catch (err) {
          showToast("❌ خطأ: " + err.message, true);
      } finally {
          document.getElementById('loadingIndicator').style.display = 'none';
      }
  };
  
  async function loadStudents() {
      let { data: students } = await supabase.from('students').select('*').eq('school_id', schoolId);
      let container = document.getElementById('studentsList');
      if (!students?.length) { container.innerHTML = '<p>لا يوجد طلاب</p>'; return; }
      
      let filtered = currentGrade ? students.filter(s => s.grade === currentGrade) : students;
      if (filtered.length === 0) { container.innerHTML = '<p>لا يوجد طلاب في هذا الصف</p>'; return; }
      
      container.innerHTML = filtered.map(s => {
          let multi = s.multi_scores || {};
          let hasResults = Object.keys(multi).length > 0;
          return `
              <div class="student-card">
                  <div class="flex-between">
                      <div>
                          <strong>${s.name}</strong><br>
                          <small>رقم الجلوس: ${s.seat_number} | الكود: ${s.code || '-'} | الرقم القومي: ${s.national_id || '-'}</small><br>
                          <small>الصف: ${s.grade || '-'}</small>
                          ${!hasResults ? '<small style="color:#dc3545">⚠️ لا توجد نتائج مسجلة</small>' : ''}
                      </div>
                      <div>
                          <button onclick="viewStudentResult('${s.id}')" class="btn-info">📊 عرض النتيجة</button>
                          <button onclick="deleteStudent(${s.id})" class="btn-danger">🗑️ حذف</button>
                      </div>
                  </div>
                  ${hasResults ? Object.entries(multi).map(([sub, d]) => `
                      <div class="subject-score">
                          <strong>${sub}:</strong> ${Object.entries(d.scores).map(([k,v]) => `${k}: ${v}`).join(' | ')} | المجموع: ${d.total}/${d.max} (${d.percentage}%)
                      </div>
                  `).join('') : ''}
              </div>
          `;
      }).join('');
  }
  
  window.viewStudentResult = (studentId) => {
      sessionStorage.setItem('viewStudentId', studentId);
      window.open('student-result.html', '_blank');
  };
  
  window.deleteStudent = async (id) => { if (confirm("حذف الطالب؟")) { await supabase.from('students').delete().eq('id', id); loadStudents(); } };
  
  window.clearAllStudentResults = async () => {
      if (!confirm("مسح نتائج جميع الطلاب؟")) return;
      let { data: students } = await supabase.from('students').select('id').eq('school_id', schoolId);
      for (let student of students) { await supabase.from('students').update({ multi_scores: {} }).eq('id', student.id); }
      showToast("✅ تم مسح النتائج"); loadStudents();
  };
  
  window.deleteAllStudents = async () => {
      if (!confirm("حذف جميع الطلاب نهائياً؟")) return;
      await supabase.from('students').delete().eq('school_id', schoolId);
      showToast("✅ تم حذف جميع الطلاب"); loadStudents();
  };
  
  window.exportSchoolResults = async () => {
      let { data: students } = await supabase.from('students').select('*').eq('school_id', schoolId);
      if (!students?.length) return showToast("لا يوجد طلاب", true);
      
      let headers = ['اسم الطالب', 'رقم الجلوس', 'الكود', 'الرقم القومي', 'الصف', 'المادة', 'التفاصيل', 'المجموع', 'النسبة'];
      let rows = [headers];
      
      for (let student of students) {
          let multi = student.multi_scores || {};
          for (let [subject, data] of Object.entries(multi)) {
              let details = Object.entries(data.scores).map(([k,v]) => `${k}: ${v}`).join(' | ');
              rows.push([student.name, student.seat_number, student.code || '', student.national_id || '', student.grade || '', subject, details, `${data.total}/${data.max}`, `${data.percentage}%`]);
          }
      }
      
      let ws = XLSX.utils.aoa_to_sheet(rows);
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `نتائج_${schoolData?.name}`);
      XLSX.writeFile(wb, `نتائج_${schoolData?.name}_${new Date().toISOString().slice(0,10)}.xlsx`);
      showToast("✅ تم تصدير النتائج");
  };
  
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  
  document.getElementById('downloadTemplateBtn').onclick = window.downloadTemplate;
  document.getElementById('uploadExcelBtn').onclick = window.uploadExcel;
  
  loadSchool();
</script>
</body>
</html>
