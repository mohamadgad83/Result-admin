<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مدير المدرسة</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 20px; padding: 25px; }
        h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
        button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #1e3c72; color: white; border: none; cursor: pointer; }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-info { background: #17a2b8; }
        .btn-warning { background: #ffc107; color: #333; }
        .info-card { background: #eef2fa; border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        /* الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .stat-card h2 { font-size: 32px; margin: 0; color: white; }
        .stat-card p { margin-top: 5px; font-size: 13px; opacity: 0.9; }
        
        .student-card { background: #eef2fa; padding: 15px; margin: 10px 0; border-radius: 12px; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
        }
        .toast.error { background: #dc3545; }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .loading { display: none; text-align: center; padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between" style="margin-bottom: 20px">
        <h1>🏫 لوحة إدارة المدرسة</h1>
        <div>
            <button onclick="window.location.href='index.html'" class="btn-info">🏠 الرئيسية</button>
            <button onclick="window.location.href='student-search.html'" class="btn-success">🔍 عرض النتائج</button>
            <button onclick="logout()" class="btn-danger">🚪 خروج</button>
        </div>
    </div>
    
    <div id="schoolInfo"></div>
    
    <!-- الإحصائيات السريعة -->
    <div class="stats-grid" id="statsContainer"></div>
    
    <div class="info-card">
        <div class="flex-between">
            <select id="selectedGrade" style="flex:3">
                <option value="">-- اختر الصف --</option>
            </select>
            <select id="academicYear" style="flex:1">
                <option value="2023/2024">2023/2024</option>
                <option value="2024/2025" selected>2024/2025</option>
                <option value="2025/2026">2025/2026</option>
            </select>
        </div>
    </div>
    
    <div id="subjectsContainer"></div>
    
    <div class="flex-between" style="gap:20px; flex-wrap:wrap; margin: 20px 0">
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📥 تحميل قالب Excel</h3>
            <button id="downloadBtn" class="btn-info" style="width:100%">📥 تحميل القالب</button>
        </div>
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px">
            <h3>📤 رفع ملف Excel</h3>
            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">
            <button id="uploadBtn" class="btn-success" style="width:100%; margin-top:10px">📊 استيراد البيانات</button>
            <div id="uploadResult" style="margin-top:10px; font-size:12px"></div>
        </div>
    </div>
    
    <div class="loading" id="loadingIndicator">⏳ جاري المعالجة...</div>
    
    <!-- قائمة الطلاب (في نافذة منبثقة) -->
    <div id="studentsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; border-radius:20px; padding:20px; width:90%; max-width:800px; max-height:80%; overflow:auto;">
            <div class="flex-between"><h3>📚 قائمة الطلاب</h3><button onclick="closeStudentsModal()" class="btn-danger">✖</button></div>
            <div id="studentsList" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  const schoolId = 1; // مدرسة دشنا الثانوية ثابتة
  let currentGradeId = null;
  let currentSubjects = [];
  let currentYear = '2024/2025';
  
  function showToast(msg, isErr = false) {
      let t = document.createElement('div');
      t.className = `toast ${isErr ? 'error' : ''}`;
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
  }
  
  // تحميل الإحصائيات
  async function loadStats() {
      if (!currentGradeId) return;
      
      let { count: totalStudents } = await supabase
          .from('student_results')
          .select('*', { count: 'exact', head: true })
          .eq('school_id', schoolId)
          .eq('grade_id', currentGradeId)
          .eq('academic_year', currentYear);
      
      document.getElementById('statsContainer').innerHTML = `
          <div class="stat-card"><h2>${totalStudents || 0}</h2><p>إجمالي الطلاب</p></div>
          <div class="stat-card"><h2>${currentSubjects.length}</h2><p>المواد الدراسية</p></div>
      `;
  }
  
  // طباعة كشف درجات للطالب
  window.printStudentReport = async (studentId, studentName) => {
      let { data: student } = await supabase
          .from('student_results')
          .select('*')
          .eq('id', studentId)
          .single();
      
      let scores = student.scores || {};
      let printWindow = window.open('', '_blank');
      printWindow.document.write(`
          <html dir="rtl">
          <head><title>نتيجة ${studentName}</title>
          <style>
              body { font-family: 'Segoe UI', sans-serif; padding: 30px; }
              .header { text-align: center; margin-bottom: 30px; }
              .school { font-size: 24px; font-weight: bold; color: #1e3c72; }
              .student { font-size: 20px; margin: 10px 0; }
              table { width: 100%; border-collapse: collapse; margin-top: 20px; }
              th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
              th { background: #1e3c72; color: white; }
              .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #666; }
          </style>
          </head>
          <body>
          <div class="header">
              <div class="school">🏫 مدرسة دشنا الثانوية</div>
              <div class="student">👨‍🎓 ${student.student_name}</div>
              <div>📌 رقم الجلوس: ${student.seat_number} | 🔑 الكود: ${student.code || '-'}</div>
              <div>📅 السنة الدراسية: ${student.academic_year || '2024/2025'}</div>
          </div>
          <table>
              <thead><tr><th>المادة</th><th>الدرجة</th></tr></thead>
              <tbody>
                  ${currentSubjects.map(sub => `<tr><td>${sub.name}</td><td>${scores[sub.name] !== undefined ? scores[sub.name] : '—'}</td></tr>`).join('')}
              </tbody>
          </table>
          <div class="footer">تم الطباعة من نظام النتائج المدرسية - مدرسة دشنا الثانوية</div>
          </body>
          </html>
      `);
      printWindow.document.close();
      printWindow.print();
  };
  
  async function loadSchool() {
      let { data: school } = await supabase.from('schools').select('*').eq('id', schoolId).single();
      document.getElementById('schoolInfo').innerHTML = `<h2>🏫 ${school.name}</h2>`;
      
      let { data: grades } = await supabase.from('grades').select('*').order('id');
      let select = document.getElementById('selectedGrade');
      select.innerHTML = '<option value="">-- اختر الصف --</option>' + grades.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
      
      document.getElementById('academicYear').onchange = () => {
          currentYear = document.getElementById('academicYear').value;
          if (currentGradeId) loadStats();
      };
      
      select.onchange = () => {
          currentGradeId = select.value;
          if (currentGradeId) {
              let grade = grades.find(g => g.id == currentGradeId);
              currentSubjects = (grade.subjects || []).sort((a,b)=>a.order-b.order);
              renderSubjects();
              loadStats();
          }
      };
  }
  
  function renderSubjects() {
      let container = document.getElementById('subjectsContainer');
      if (!currentSubjects.length) {
          container.innerHTML = '<div class="info-card"><p>⚠️ لا توجد مواد لهذا الصف</p></div>';
          return;
      }
      container.innerHTML = `
          <div class="info-card">
              <h3>📚 المواد (درجة واحدة لكل مادة)</h3>
              ${currentSubjects.map(sub => `
                  <div style="background:white; border-radius:10px; padding:10px; margin:10px 0">
                      <strong>📖 ${sub.name}</strong>
                  </div>
              `).join('')}
          </div>
      `;
  }
  
  document.getElementById('downloadBtn').onclick = () => {
      if (!currentGradeId) { showToast("اختر الصف أولاً", true); return; }
      if (!currentSubjects.length) { showToast("لا توجد مواد", true); return; }
      let headers = ["اسم الطالب", "رقم الجلوس", "الكود", "الرقم القومي"];
      currentSubjects.forEach(sub => headers.push(`${sub.name} (الدرجة)`));
      let sheetData = [headers];
      let exampleRow = ["مثال: أحمد محمد", "101", "A123", "12345678901234"];
      currentSubjects.forEach(() => exampleRow.push(""));
      sheetData.push(exampleRow);
      for (let i = 0; i < 15; i++) sheetData.push(["", "", "", "", ...currentSubjects.map(() => "")]);
      let ws = XLSX.utils.aoa_to_sheet(sheetData);
      ws['!cols'] = headers.map(() => ({ wch: 18 }));
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `قالب_${currentGradeId}`);
      XLSX.writeFile(wb, `قالب_استيراد_${currentGradeId}_${currentYear}.xlsx`);
      showToast("✅ تم تحميل القالب");
  };
  
  document.getElementById('uploadBtn').onclick = async () => {
      let file = document.getElementById('excelFile').files[0];
      if (!file) { showToast("اختر ملف Excel أولاً", true); return; }
      if (!currentGradeId) { showToast("اختر الصف أولاً", true); return; }
      if (!currentSubjects.length) { showToast("لا توجد مواد", true); return; }
      document.getElementById('loadingIndicator').style.display = 'block';
      try {
          let data = await file.arrayBuffer();
          let workbook = XLSX.read(data);
          let rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" });
          let success = 0, error = 0;
          for (let i = 2; i < rows.length; i++) {
              let row = rows[i];
              if (!row || !row[0] || !row[1]) continue;
              let name = row[0]?.toString().trim();
              let seat = row[1]?.toString().trim();
              let code = row[2]?.toString().trim() || null;
              let nationalId = row[3]?.toString().trim() || null;
              if (!name || !seat) { error++; continue; }
              let scores = {};
              let col = 4;
              for (let sub of currentSubjects) {
                  let val = parseFloat(row[col]);
                  if (!isNaN(val)) scores[sub.name] = val;
                  col++;
              }
              let { data: existing } = await supabase.from('student_results').select('id').eq('school_id', schoolId).eq('seat_number', seat).maybeSingle();
              if (existing) {
                  await supabase.from('student_results').update({ 
                      student_name: name, code, national_id: nationalId, 
                      grade_id: currentGradeId, scores, academic_year: currentYear,
                      updated_at: new Date() 
                  }).eq('id', existing.id);
              } else {
                  await supabase.from('student_results').insert({ 
                      school_id: schoolId, student_name: name, seat_number: seat, 
                      code, national_id: nationalId, grade_id: currentGradeId, 
                      scores, academic_year: currentYear 
                  });
              }
              success++;
          }
          showToast(`✅ تم استيراد ${success} طالب${error ? `, ❌ فشل ${error}` : ''}`, error>0);
          loadStats();
      } catch(err) { showToast("❌ خطأ: "+err.message, true); }
      finally { document.getElementById('loadingIndicator').style.display = 'none'; }
  };
  
  window.closeStudentsModal = () => { document.getElementById('studentsModal').style.display = 'none'; };
  window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  
  loadSchool();
</script>
</body>
</html>
