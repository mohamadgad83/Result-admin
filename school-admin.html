<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة مدير المدرسة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>🏫 لوحة إدارة المدرسة</h1>
  <button id="logoutBtn">تسجيل خروج</button>
  <div id="schoolName"></div>
  <hr>
  <div id="content"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';

  let currentSchoolId = null;

  async function init() {
    const impersonatedId = sessionStorage.getItem('impersonatedSchoolId');
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    const { data: userData, error: userError } = await supabase
      .from('users')
      .select('role, school_id')
      .eq('id', user.id)
      .single();
    if (userError || !userData) {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
      return;
    }
    if (userData.role === 'superAdmin' && impersonatedId) {
      currentSchoolId = parseInt(impersonatedId);
      document.body.insertAdjacentHTML('afterbegin', '<div style="background:#ff9800;padding:8px;text-align:center">وضع التقمص - <button id="exitImp">خروج</button></div>');
      document.getElementById('exitImp').onclick = () => {
        sessionStorage.removeItem('impersonatedSchoolId');
        window.location.href = 'admin.html';
      };
    } else if (userData.role === 'schoolAdmin') {
      currentSchoolId = userData.school_id;
    } else {
      window.location.href = 'login.html';
      return;
    }
    loadSchoolData();
  }

  async function loadSchoolData() {
    const { data: school, error } = await supabase.from('schools').select('*').eq('id', currentSchoolId).single();
    if (error) return;
    document.getElementById('schoolName').innerHTML = `<h2>${school.name}</h2>`;
    const { data: students, error: studentsError } = await supabase.from('students').select('*').eq('school_id', currentSchoolId);
    if (!studentsError) {
      let html = `<h3>الطلاب</h3>${students.map(s => `<div class="card"><b>${s.name}</b> - نتائجه: ${JSON.stringify(s.results)}</div>`).join('')}`;
      html += `<hr><h3>رفع CSV</h3><input type="file" id="csvUpload" accept=".csv"><button id="importCsv">استيراد</button>`;
      document.getElementById('content').innerHTML = html;
      document.getElementById('importCsv').onclick = () => importCSV(currentSchoolId);
    }
  }

  async function importCSV(schoolId) {
    const file = document.getElementById('csvUpload').files[0];
    if (!file) return;
    const text = await file.text();
    const rows = text.split('\n').filter(r => r.trim());
    const students = [];
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(',');
      if (cols.length < 5) continue;
      const [name, seat, subject, score, gradeId] = cols.map(c => c.trim());
      students.push({
        school_id: schoolId,
        name,
        seat_number: seat,
        grade_id: gradeId,
        results: { [subject]: parseInt(score) }
      });
    }
    const { error } = await supabase.from('students').upsert(students);
    if (error) return alert("فشل الاستيراد: " + error.message);
    alert("تم الاستيراد بنجاح");
    loadSchoolData();
  }

  document.getElementById('logoutBtn').onclick = () => supabase.auth.signOut().then(() => {
    sessionStorage.removeItem('impersonatedSchoolId');
    window.location.href = 'login.html';
  });

  init();
</script>
</body>
</html>
