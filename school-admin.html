<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مدير المدرسة</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #1e3c72; margin-bottom: 15px; }
        button, input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #1e3c72; color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0f2b4f; transform: scale(1.02); }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-info { background: #17a2b8; }
        .student-card { background: #eef2fa; padding: 15px; margin: 10px 0; border-radius: 12px; }
        .subject-score { display: flex; flex-wrap: wrap; gap: 15px; margin: 10px 0; padding: 10px; background: white; border-radius: 8px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        @media (max-width: 768px) { .subject-score { flex-direction: column; } button, input, select { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between" style="margin-bottom: 20px">
        <h1 style="margin:0">🏫 لوحة إدارة المدرسة</h1>
        <div>
            <button onclick="window.location.href='index.html'" class="btn-info">الرئيسية</button>
            <button onclick="window.location.href='student-search.html'" class="btn-success">عرض النتائج</button>
            <button onclick="logout()" class="btn-danger">خروج</button>
        </div>
    </div>
    <div id="schoolInfo"></div>
    <div class="flex-between" style="background:#eef2fa; padding:15px; border-radius:12px; margin:15px 0">
        <h3>الإعدادات</h3>
        <div><label>الحد الأدنى:</label><input type="number" id="minPassScore" value="50" style="width:80px"><button onclick="saveSettings()" class="btn-success">حفظ</button></div>
    </div>
    <div id="gradesPanel" style="background:#f0f7ff; padding:15px; border-radius:12px; margin:15px 0"></div>
    <div class="flex-between" style="gap:20px; flex-wrap:wrap">
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px"><h3>تحميل قالب Excel</h3><select id="templateGradeSelect"></select><button onclick="downloadTemplate()" class="btn-info">تحميل القالب</button></div>
        <div style="flex:1; background:#f0f7ff; padding:15px; border-radius:12px"><h3>رفع ملف Excel</h3><input type="file" id="excelFile" accept=".xlsx,.xls,.csv"><button onclick="uploadExcel()" class="btn-success">استيراد البيانات</button><div id="uploadResult"></div></div>
    </div>
    <h2>➕ إضافة طالب</h2>
    <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
        <input type="text" id="studentName" placeholder="الاسم" style="width:100%"><input type="text" id="studentSeat" placeholder="رقم الجلوس" style="width:100%"><select id="studentGradeSelect" style="width:100%"></select><div id="studentCustomFields"></div><button onclick="addStudent()" class="btn-success">إضافة طالب</button>
    </div>
    <h2>📝 إضافة نتيجة</h2>
    <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin:10px 0">
        <input type="text" id="resultSeat" placeholder="رقم الجلوس"><select id="resultSubject"></select><div class="flex-between"><input type="number" id="workScore" placeholder="أعمال سنة"><input type="number" id="examScore" placeholder="امتحان نهائي"></div><button onclick="addResult()" class="btn-success">إضافة نتيجة</button>
    </div>
    <h2>📚 الطلاب</h2>
    <div id="studentsList"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';
  let schoolId = sessionStorage.getItem('userSchoolId') || sessionStorage.getItem('impersonatedSchoolId');
  if (!schoolId) window.location.href = 'login.html';
  let schoolSubjects = [], schoolGrades = [], studentCustomFields = [];
  async function loadSchool() {
    const { data: school } = await supabase.from('schools').select('*, stages(name)').eq('id', schoolId).single();
    document.getElementById('schoolInfo').innerHTML = `<h2>🏫 ${school?.name}</h2><p>المرحلة: ${school?.stages?.name}</p>`;
    studentCustomFields = school?.student_custom_fields || [];
    const studentFieldsDiv = document.getElementById('studentCustomFields');
    if (studentCustomFields.length) studentFieldsDiv.innerHTML = studentCustomFields.map(f => `<input type="text" id="custom_${f.name}" placeholder="${f.name}" style="width:100%; margin-bottom:5px">`).join('');
    schoolSubjects = school.custom_subjects || [];
    const selectedGrades = school.selected_grades || [];
