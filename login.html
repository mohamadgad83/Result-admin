<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="max-width:400px">
  <h1>🔐 تسجيل الدخول</h1>
  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button id="loginBtn">دخول</button>
  <div id="errorMsg" style="color:red"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';

  document.getElementById('loginBtn').onclick = async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      document.getElementById('errorMsg').innerText = "❌ املأ جميع الحقول";
      return;
    }

    // استعلام مباشر بدون maybeSingle
    const { data, error } = await supabase
      .from('users')
      .select('*')
      .eq('username', username);

    console.log("البيانات:", data);
    console.log("الخطأ:", error);

    if (error) {
      document.getElementById('errorMsg').innerText = "❌ خطأ في قاعدة البيانات: " + error.message;
      return;
    }

    if (!data || data.length === 0) {
      document.getElementById('errorMsg').innerText = "❌ اسم المستخدم غير صحيح";
      return;
    }

    const user = data[0];

    if (user.password !== password) {
      document.getElementById('errorMsg').innerText = "❌ كلمة المرور غير صحيحة";
      return;
    }

    // حفظ الجلسة
    sessionStorage.setItem('userRole', user.role);
    sessionStorage.setItem('userSchoolId', user.school_id || '');
    sessionStorage.setItem('username', user.username);
    
    alert("✅ دخول ناجح!");
    
    if (user.role === 'superAdmin') {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'school-admin.html';
    }
  };
</script>
</body>
</html>
