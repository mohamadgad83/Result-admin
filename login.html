<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="max-width:400px">
  <h1>🔐 تسجيل الدخول</h1>
  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button id="loginBtn">دخول</button>
  <div id="errorMsg" style="color:red"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';

  // أولاً: جلب كل المستخدمين عشان نشوف
  const { data: allUsers, error: listError } = await supabase.from('users').select('*');
  console.log("جميع المستخدمين:", allUsers);
  
  if (listError) {
    alert("خطأ في جلب المستخدمين: " + listError.message);
  } else if (!allUsers || allUsers.length === 0) {
    alert("⚠️ لا يوجد مستخدمين في قاعدة البيانات!");
    // إضافة مستخدم تلقائياً
    const { error: insertError } = await supabase.from('users').insert([{
      username: 'admin',
      password: 'admin123',
      role: 'superAdmin'
    }]);
    if (insertError) {
      alert("فشل إضافة مستخدم: " + insertError.message);
    } else {
      alert("✅ تم إضافة مستخدم admin تلقائياً! حاول تسجيل الدخول مرة أخرى.");
    }
  } else {
    alert(`✅ يوجد ${allUsers.length} مستخدم في قاعدة البيانات`);
  }

  document.getElementById('loginBtn').onclick = async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    const { data: user, error } = await supabase
      .from('users')
      .select('*')
      .eq('username', username)
      .maybeSingle();

    if (error || !user) {
      document.getElementById('errorMsg').innerText = "❌ اسم المستخدم غير صحيح";
      return;
    }

    if (user.password !== password) {
      document.getElementById('errorMsg').innerText = "❌ كلمة المرور غير صحيحة";
      return;
    }

    sessionStorage.setItem('userRole', user.role);
    sessionStorage.setItem('userSchoolId', user.school_id || '');
    window.location.href = 'admin.html';
  };
</script>
</body>
</html>
