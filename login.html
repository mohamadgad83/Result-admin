<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #1e3c72; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #1e3c72; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0f2b4f; }
        .error { color: red; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 نظام النتائج المدرسية</h1>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <div id="errorMsg" class="error"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';
  window.login = async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { document.getElementById('errorMsg').innerText = "❌ املأ جميع الحقول"; return; }
    const { data: user } = await supabase.from('users').select('*').eq('username', username).maybeSingle();
    if (!user) { document.getElementById('errorMsg').innerText = "❌ اسم المستخدم غير صحيح"; return; }
    if (user.password !== password) { document.getElementById('errorMsg').innerText = "❌ كلمة المرور غير صحيحة"; return; }
    sessionStorage.setItem('userId', user.id); sessionStorage.setItem('userRole', user.role); sessionStorage.setItem('userSchoolId', user.school_id || ''); sessionStorage.setItem('username', user.username);
    if (user.role === 'superAdmin') window.location.href = 'admin.html';
    else window.location.href = 'school-admin.html';
  };
</script>
</body>
</html>
