<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="max-width:400px">
  <h1>🔐 تسجيل الدخول</h1>
  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button id="loginBtn">دخول</button>
  <div id="errorMsg" style="color:red; margin-top:10px"></div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    console.log("محاولة تسجيل الدخول:", email);
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    
    if (error) {
      console.error("خطأ في التسجيل:", error);
      document.getElementById('errorMsg').innerText = "خطأ في البريد أو كلمة المرور: " + error.message;
      return;
    }
    
    console.log("تم تسجيل الدخول بنجاح:", data.user.id);
    
    const userId = data.user.id;
    const { data: userData, error: userError } = await supabase
      .from('users')
      .select('role')
      .eq('id', userId)
      .single();
    
    if (userError) {
      console.error("خطأ في جلب الدور:", userError);
      document.getElementById('errorMsg').innerText = "ليس لديك صلاحية";
      await supabase.auth.signOut();
      return;
    }
    
    console.log("دور المستخدم:", userData.role);
    
    if (userData.role === 'superAdmin') {
      window.location.href = 'admin.html';
    } else if (userData.role === 'schoolAdmin') {
      window.location.href = 'school-admin.html';
    } else {
      document.getElementById('errorMsg').innerText = "دور غير معروف";
      await supabase.auth.signOut();
    }
  };
</script>
</body>
</html>
