<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بحث النتيجة - نظام النتائج</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 500px; margin: auto; }
    .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    h1 { color: #1e3c72; text-align: center; margin-bottom: 10px; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
    button { background: #1e3c72; color: white; border: none; cursor: pointer; }
    button:hover { background: #0f2b4f; }
    .error { color: red; text-align: center; margin-top: 15px; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>🏫 نظام النتائج المدرسية</h1>
    <p style="text-align:center; margin-bottom:20px">أدخل بياناتك لعرض النتيجة</p>
    <select id="schoolSelect"><option>-- تحميل المدارس --</option></select>
    <label id="searchLabel">رقم الجلوس:</label>
    <input type="text" id="searchValue" placeholder="أدخل رقم الجلوس">
    <button onclick="search()">🔍 عرض النتيجة</button>
    <div id="errorMsg" class="error"></div>
  </div>
</div>
<script type="module">
  import { supabase } from './supabase-config.js';
  async function loadSchools() {
    const { data: schools } = await supabase.from('schools').select('id, name, search_field, search_field_label');
    const select = document.getElementById('schoolSelect');
    select.innerHTML = '<option value="">-- اختر مدرسة --</option>' + schools.map(s => `<option value="${s.id}" data-field="${s.search_field||'seat_number'}" data-label="${s.search_field_label||'رقم الجلوس'}">${s.name}</option>`).join('');
    select.onchange = () => {
      const opt = select.options[select.selectedIndex];
      if (opt.value) { document.getElementById('searchLabel').innerHTML = (opt.dataset.label || 'رقم الجلوس') + ':'; document.getElementById('searchValue').placeholder = `أدخل ${opt.dataset.label}`; }
    };
  }
  window.search = async () => {
    const select = document.getElementById('schoolSelect');
    const schoolId = select.value;
    const searchVal = document.getElementById('searchValue').value.trim();
    if (!schoolId || !searchVal) { document.getElementById('errorMsg').innerText = "املأ البيانات"; return; }
    const field = select.options[select.selectedIndex].dataset.field;
    const { data: student } = await supabase.from('students').select('id').eq('school_id', schoolId).eq(field, searchVal).single();
    if (!student) { document.getElementById('errorMsg').innerText = "⚠️ لا يوجد طالب"; return; }
    sessionStorage.setItem('viewStudentId', student.id);
    window.location.href = 'student-result.html';
  };
  loadSchools();
</script>
</body>
</html>
