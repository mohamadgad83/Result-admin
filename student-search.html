<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتائج الطلاب - نظام النتائج المدرسية</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; padding: 20px; }
    .container { max-width: 800px; margin: auto; }
    .search-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .result-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .result-header { text-align: center; border-bottom: 3px solid #1e3c72; padding-bottom: 15px; margin-bottom: 20px; }
    .school-name { font-size: 22px; font-weight: bold; color: #1e3c72; }
    .student-name { font-size: 20px; margin: 10px 0; }
    .result-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    .result-table th, .result-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
    .result-table th { background: #1e3c72; color: white; }
    .total-row { background: #eef2fa; font-weight: bold; }
    .grade-A { color: #28a745; font-weight: bold; }
    .grade-B { color: #17a2b8; font-weight: bold; }
    .grade-C { color: #ffc107; font-weight: bold; }
    .grade-D { color: #fd7e14; font-weight: bold; }
    .grade-F { color: #dc3545; font-weight: bold; }
    h1, h2, h3 { color: #1e3c72; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
    button { background: #1e3c72; color: white; border: none; cursor: pointer; }
    button:hover { background: #0f2b4f; }
    .print-btn { background: #28a745; margin-top: 20px; }
    @media print {
      body { background: white; padding: 0; }
      .no-print { display: none; }
      .result-card { box-shadow: none; padding: 0; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="search-card no-print">
    <h1>🏫 نظام النتائج المدرسية</h1>
    <label>اختر المدرسة:</label>
    <select id="schoolSelect"></select>
    <label id="searchLabel">رقم الجلوس:</label>
    <input type="text" id="searchValue" placeholder="أدخل رقم الجلوس">
    <button onclick="searchResult()">🔍 عرض النتيجة</button>
    <div id="errorMsg" style="color: red; margin-top: 10px; text-align: center"></div>
  </div>
  <div id="resultContainer"></div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  let currentSchool = null;
  let currentStudent = null;
  
  async function loadSchools() {
    const { data: schools } = await supabase.from('schools').select('id, name, search_field, search_field_label, grading_system');
    const select = document.getElementById('schoolSelect');
    select.innerHTML = '<option value="">-- اختر مدرسة --</option>';
    schools.forEach(school => {
      const option = document.createElement('option');
      option.value = school.id;
      option.dataset.searchField = school.search_field || 'seat_number';
      option.dataset.searchLabel = school.search_field_label || 'رقم الجلوس';
      option.textContent = school.name;
      select.appendChild(option);
    });
  }
  
  document.getElementById('schoolSelect').addEventListener('change', (e) => {
    const option = e.target.options[e.target.selectedIndex];
    if (!option.value) return;
    const label = option.dataset.searchLabel;
    document.getElementById('searchLabel').innerHTML = label + ':';
    document.getElementById('searchValue').placeholder = `أدخل ${label}`;
  });
  
  function getGradeClass(percentage) {
    if (percentage >= 90) return 'grade-A';
    if (percentage >= 80) return 'grade-B';
    if (percentage >= 70) return 'grade-C';
    if (percentage >= 60) return 'grade-D';
    return 'grade-F';
  }
  
  function getGradeText(percentage) {
    if (percentage >= 90) return 'ممتاز';
    if (percentage >= 80) return 'جيد جداً';
    if (percentage >= 70) return 'جيد';
    if (percentage >= 60) return 'مقبول';
    return 'راسب';
  }
  
  window.searchResult = async () => {
    const schoolId = document.getElementById('schoolSelect').value;
    const searchValue = document.getElementById('searchValue').value.trim();
    if (!schoolId || !searchValue) {
      document.getElementById('errorMsg').innerText = "يرجى اختيار المدرسة وإدخال البيانات";
      return;
    }
    
    const { data: school } = await supabase.from('schools').select('*').eq('id', schoolId).single();
    const searchField = school.search_field || 'seat_number';
    
    const { data: student } = await supabase
      .from('students')
      .select('*')
      .eq('school_id', schoolId)
      .eq(searchField, searchValue)
      .single();
    
    if (!student) {
      document.getElementById('errorMsg').innerText = "⚠️ لا يوجد طالب بهذه البيانات";
      document.getElementById('resultContainer').innerHTML = '';
      return;
    }
    
    document.getElementById('errorMsg').innerText = '';
    currentSchool = school;
    currentStudent = student;
    
    const multiScores = student.multi_scores || {};
    const gradingSystem = school.grading_system || { max: 100, min_pass: 50 };
    
    let totalScore = 0, totalMax = 0;
    let subjectsHtml = '';
    
    for (const [subject, data] of Object.entries(multiScores)) {
      const percentage = parseFloat(data.percentage);
      const gradeClass = getGradeClass(percentage);
      const gradeText = getGradeText(percentage);
      const isPass = percentage >= gradingSystem.min_pass;
      subjectsHtml += `
        <tr>
          <td><strong>${subject}</strong></td>
          <td>${Object.entries(data.scores || {}).map(([type, val]) => `${type}: ${val.score}/${val.max}`).join('<br>')}</td>
          <td>${data.total}/${data.max}</td>
          <td class="${gradeClass}">${percentage}%</td>
          <td class="${gradeClass}">${gradeText}</td>
        </tr>
      `;
      totalScore += data.total;
      totalMax += data.max;
    }
    
    const overallPercentage = totalMax > 0 ? (totalScore / totalMax * 100).toFixed(1) : 0;
    const overallGradeClass = getGradeClass(overallPercentage);
    const overallGradeText = getGradeText(overallPercentage);
    const overallPass = overallPercentage >= gradingSystem.min_pass;
    
    const resultHtml = `
      <div class="result-card">
        <div class="result-header">
          <div class="school-name">🏫 ${school.name}</div>
          <div class="student-name">👨‍🎓 ${student.name}</div>
          <div>📌 ${school.search_field_label || 'رقم الجلوس'}: ${student[searchField]}</div>
          <div>📚 الصف: ${student.grade || '-'}</div>
        </div>
        
        <table class="result-table">
          <thead>
            <tr>
              <th>المادة</th>
              <th>تفاصيل الدرجات</th>
              <th>المجموع</th>
              <th>النسبة</th>
              <th>التقدير</th>
            </tr>
          </thead>
          <tbody>
            ${subjectsHtml}
            <tr class="total-row">
              <td colspan="2"><strong>النتيجة الإجمالية</strong></td>
              <td><strong>${totalScore}/${totalMax}</strong></td>
              <td class="${overallGradeClass}"><strong>${overallPercentage}%</strong></td>
              <td class="${overallGradeClass}"><strong>${overallGradeText}</strong></td>
            </tr>
          </tbody>
        </table>
        
        <div style="text-align: center; margin-top: 20px">
          <p>الحد الأدنى للنجاح: ${gradingSystem.min_pass}% | الدرجة العظمى: ${gradingSystem.max}</p>
          <p style="font-size: 12px; color: #666">تم إنشاء هذه النتيجة بواسطة نظام النتائج المدرسية</p>
        </div>
        
        <button onclick="window.print()" class="print-btn no-print">🖨️ طباعة النتيجة</button>
      </div>
    `;
    
    document.getElementById('resultContainer').innerHTML = resultHtml;
  };
  
  loadSchools();
</script>
</body>
</html>
