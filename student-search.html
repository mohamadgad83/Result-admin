<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحث عن نتيجة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 500px; width: 100%; margin: auto; }
        .search-card { background: white; border-radius: 30px; padding: 35px; box-shadow: 0 25px 45px rgba(0,0,0,0.2); text-align: center; }
        h1 { color: #1e3c72; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .input-group { margin: 20px 0; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 14px; border: 2px solid #eef2fa; border-radius: 15px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .error { color: #dc3545; margin-top: 15px; }
        .loading { margin-top: 15px; color: #1e3c72; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="search-card">
        <h1>🏫 نظام النتائج المدرسية</h1>
        <p class="subtitle">أدخل بياناتك لعرض النتيجة</p>
        <div class="input-group">
            <label id="searchLabel">🔍 رقم الجلوس / الكود / الرقم القومي</label>
            <input type="text" id="searchValue" placeholder="أدخل رقم الجلوس أو الكود أو الرقم القومي">
        </div>
        <button onclick="searchResult()">🔍 عرض النتيجة</button>
        <div id="errorMsg" class="error"></div>
        <div id="loading" class="loading">⏳ جاري البحث...</div>
    </div>
</div>

<script type="module">
  import { supabase } from './supabase-config.js';
  
  const schoolId = 1; // مدرسة ديشن الثانوية ثابتة
  let searchFields = ['code', 'national_id']; // افتراضي
  
  async function loadSearchSettings() {
      let { data: school } = await supabase.from('schools').select('search_fields').eq('id', schoolId).single();
      if (school?.search_fields && school.search_fields.length > 0) {
          searchFields = school.search_fields;
      }
      // تحديث التسمية
      let labels = { seat_number: 'رقم الجلوس', code: 'الكود', national_id: 'الرقم القومي' };
      let labelText = searchFields.map(f => labels[f]).join(' / ');
      document.getElementById('searchLabel').innerHTML = `🔍 ${labelText}`;
      document.getElementById('searchValue').placeholder = `أدخل ${labelText}`;
  }
  
  window.searchResult = async () => {
      let searchValue = document.getElementById('searchValue').value.trim();
      if (!searchValue) { document.getElementById('errorMsg').innerText = "⚠️ يرجى إدخال البيانات"; return; }
      document.getElementById('errorMsg').innerText = '';
      document.getElementById('loading').style.display = 'block';
      
      // بناء شرط OR بناءً على الحقول المختارة
      let orConditions = searchFields.map(field => `${field}.eq.${searchValue}`).join(',');
      let { data: student, error } = await supabase
          .from('student_results')
          .select('id')
          .eq('school_id', schoolId)
          .or(orConditions)
          .single();
      
      document.getElementById('loading').style.display = 'none';
      if (error || !student) {
          document.getElementById('errorMsg').innerHTML = "⚠️ لا يوجد طالب بهذه البيانات";
          return;
      }
      sessionStorage.setItem('viewStudentId', student.id);
      window.location.href = 'student-result.html';
  };
  
  loadSearchSettings();
</script>
</body>
</html>
